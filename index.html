  }

  function App() {
    const [defaults, setDefaults]   = useState(null);
    const [dataSource, setDataSource] = useState("loading");
    const [crew, setCrew]           = useState([]);
    const crewRef = useRef(crew); crewRef.current = crew;   // live roster for field-scoped diffing
    const sawByIdRef = useRef(false);   // true once the keyed map has loaded — guards the self-heal
    const [crewLoaded, setCrewLoaded] = useState(false);
    const migratedRef = useRef(false);   // guards the one-time roster → Firebase migration write
    const purgedRef = useRef(false);   // guards the one-time PIN purge from the crew doc
    const [locks, setLocks]         = useState({});
    const [statsOpen, setStatsOpen] = useState(false);   // YTD stats overlay
    const [sync, setSync]           = useState("connecting");
    const [avail, setAvail]         = useState({});   // crew availability, kept separate from the roster
    const [tab, setTab]             = useState("sched");   // schedule sub-tab: sched | crew | avail
    const [topTab, setTopTab]       = useState("dashboard"); // top nav: dashboard | schedule | links
    const now = new Date();
    const [vYear, setVYear]         = useState(now.getFullYear());
    const [vMonth, setVMonth]       = useState(now.getMonth());
    const [toast, setToast]         = useState("");
    const [lastErr, setLastErr]     = useState("");
    const [busy, setBusy]           = useState(false);
    const [burnBan, setBurnBan]           = useState(null);   // 7.1 live weather (Cloudflare Worker → TFS / NWS)
    const [redFlag, setRedFlag]           = useState(null);
    const [floodWarning, setFloodWarning] = useState(null);
    const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };

    // ── 4.1 access control: PIN → role detection (remember-login via localStorage) ──
    const [authId, setAuthId]     = useState(() => { try { const s = localStorage.getItem("firehawk_dev_session"); return s ? Number(s) : null; } catch (e) { return null; } });
    const [showPin, setShowPin]   = useState(false);
    const [pinInput, setPinInput] = useState("");
    const [pinError, setPinError] = useState(false);
    const [sessionPin, setSessionPin] = useState("");   // manager's own PIN, held in memory this session to authorize PIN changes
    const pinTimer = useRef(null);
    useEffect(() => {
      try { if (authId == null) localStorage.removeItem("firehawk_dev_session"); else localStorage.setItem("firehawk_dev_session", String(authId)); } catch (e) {}
    }, [authId]);

    // ── 7.1 live weather: Red Flag / Burn Ban / Flood via Cloudflare Worker (fail-silent) ──
    const WX = "https://firehawk-wx.usafsentinel-45e.workers.dev";
    useEffect(() => {   // burn ban — TFS, cached hourly
      const f = async () => { try { const r = await fetch(WX + "/burnban"); if (r.ok) setBurnBan(await r.json()); } catch (e) {} };
      f(); const t = setInterval(f, 3600000); return () => clearInterval(t);
    }, []);
    useEffect(() => {   // red flag warning — NWS, every 30 min
      const f = async () => { try { const r = await fetch(WX + "/redflag"); if (r.ok) setRedFlag(await r.json()); } catch (e) {} };
      f(); const t = setInterval(f, 1800000); return () => clearInterval(t);
    }, []);
    useEffect(() => {   // flood alerts — NWS Bexar zone + FIPS, every 30 min
      const f = async () => {
        try {
          const r = await fetch(WX + "/?url=" + encodeURIComponent("https://api.weather.gov/alerts/active?zone=TXZ205,TXC029"));
          if (!r.ok) return;
          const data = await r.json();
          const floodTypes = ["Flood Warning","Flash Flood Warning","Flood Watch","Flash Flood Watch","Flash Flood Statement"];
          const hit = (data.features || []).find(x => x && x.properties && floodTypes.indexOf(x.properties.event) !== -1);
          setFloodWarning(hit ? {
            active: true,
            event: hit.properties.event,
            ends: hit.properties.ends ? new Date(hit.properties.ends).toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit" }) : "further notice",
            updated: new Date().toISOString()
          } : null);
        } catch (e) {}
      };
      f(); const t = setInterval(f, 1800000); return () => clearInterval(t);
    }, []);

    const me        = crew.find(c => c.id === authId && !c.archived) || null;  // archived members are locked out; unarchive restores access (PIN preserved)
    const tier      = me ? me.tier : null;                  // "owner" | "admin" | "staff" | null
    const canEdit   = tier === "owner" || tier === "admin"; // full edit — both ADMIN-level signers
    const isOwner   = tier === "owner";                     // program owner (Sanchez) — additional permissions
    // Schedule sub-tabs only matter signed in; collapse to the read-only calendar when signed out (or on a now-invalid tab).
    const schedTab  = ((tab === "crew" && !canEdit) || (tab === "myshifts" && (canEdit || !me)) || (tab === "avail" && !me)) ? "sched" : tab;
    const submitPin = async (val, silent) => {
      const entered = (val != null ? val : pinInput).trim();
      if (!entered) { if (!silent) setPinError(true); return; }
      let found = null;
      try {
        const r = await fetch(AUTH + "/auth", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ pin: entered }) });
        if (r.ok) { const j = await r.json(); if (j && j.ok) { const m = crew.find(c => c.id === j.id) || null; found = (m && !m.archived) ? m : null; } }  // archived = locked out (PIN kept for restore)
      } catch (e) {}
      if (!found) { if (!silent) setPinError(true); return; }
      setSessionPin(entered);
      setAuthId(found.id); setShowPin(false); setPinInput(""); setPinError(false);
      const now = new Date();
      const second = (found.title && found.title.trim()) ? found.title : found.role;
      const label = (found.first ? found.first.trim() + " " : "") + found.name + " (" + (found.rank || found.role) + " - " + second + ")";
      const entry = { name: label, color: found.color || "#FFFFFF", time: now.toISOString(), ts: now.getTime() };
      fsGet(DEV_COL, "access_log").then(log => {
        const entries = (log && Array.isArray(log.entries)) ? log.entries : [];
        entries.unshift(entry);
        fsSet(DEV_COL, "access_log", { entries: entries.slice(0, 10) });
      }).catch(() => {});
    };
    const logout = () => { setAuthId(null); setSessionPin(""); };

    useEffect(() => {
      setDefaults(FALLBACK_ROSTER); setDataSource("fallback");
    }, []);

    useEffect(() => {
      if (!defaults) return;
      const unsubCrew = fsListen(DEV_COL, "crew", data => {
        setAvail((data && data.availability && typeof data.availability === "object") ? data.availability : {});
        const hasNew    = !!(data && data.membersById && typeof data.membersById === "object");
        const hasLegacy = !!(data && Array.isArray(data.members) && data.members.length);
        // SELF-HEAL: if the keyed map loaded earlier this session and has now vanished, a stale
        // (old-version) client overwrote the doc in the legacy shape. Re-assert our last-known-good
        // roster from local state rather than reverting to the stale leftover data.
        if (sawByIdRef.current && !hasNew && crewRef.current && crewRef.current.length) {
          writeCrewDoc(crewRef.current);   // restore membersById from good local state
          setSync("synced");
          return;                          // keep local crew; do not overwrite with stale data
        }
        let arr = membersToArray(data);                       // prefers the map shape; falls back to legacy array
        if (arr.length === 0) {                               // empty read → run on the embedded roster LOCALLY
          arr = (defaults || FALLBACK_ROSTER).map(normalizeMember);
          // Seed-write ONLY when the doc provably exists and is truly empty (fresh install).
          // A null/failed/timed-out read must NEVER author the database — that exact path
          // once overwrote live crew records (incl. Part 107 dates) with defaults.
          const docTrulyEmpty = !!data && !data.membersById && !(Array.isArray(data.members) && data.members.length);
          if (docTrulyEmpty && !migratedRef.current) { migratedRef.current = true; writeCrewDoc(arr); }
        } else if (!hasNew && hasLegacy) {                    // legacy array only → migrate to map shape once (non-destructive)
          if (!migratedRef.current) { migratedRef.current = true; writeCrewDoc(arr).then(r => { if (r && r.ok) flash("Roster upgraded"); }); }
        }
        if (hasNew) sawByIdRef.current = true;                // remember the keyed map has been seen
        setCrew(arr);
        if (!purgedRef.current && rawHasPin(data)) { purgedRef.current = true; writeCrewDoc(arr); }   // one-time plaintext-PIN purge
        setCrewLoaded(true); setSync("synced");
      });
      const unsubLocks = fsListen(DEV_COL, "availability_locks", data => { setLocks((data && typeof data === "object") ? data : {}); });
      return () => { unsubCrew(); unsubLocks(); };
    }, [defaults]);

    const navMonth = (delta) => {
      let m = vMonth + delta, y = vYear;
      if (m < 0) { m = 11; y--; } else if (m > 11) { m = 0; y++; }
      setVMonth(m); setVYear(y);
    };

    const saveMemberMonth = async (memberId, mk, rec) => {
      // Atomic field-scoped write: patches ONLY this member's month under "availability",
      // so two crew (or a member and the manager) editing the same month cannot overwrite each other.
      const path = "availability." + fpSeg(String(memberId)) + "." + fpSeg(mk);
      const res = await fsUpdate(DEV_COL, "crew", { availability: { [String(memberId)]: { [mk]: rec } } }, [path]);
      if (res.ok) { setAvail(a => ({ ...a, [memberId]: { ...(a[memberId] || {}), [mk]: rec } })); setLastErr(""); }
      else { setLastErr("Availability save failed (" + res.status + "): " + res.detail); }
      return res;
    };

    const saveCrew = async (updated) => {
      // Diff against the live roster and patch ONLY what changed (each member is its own
      // field path), plus memberOrder if it changed. Concurrent admin edits to different
      // people never collide, and an edit can no longer wipe a sibling's data.
      const prev = crewRef.current || [];
      const body = { membersById: {} }; const masks = [];
      updated.forEach(u => {
        const p = prev.find(x => x.id === u.id);
        if (!p || JSON.stringify(memberShape(p)) !== JSON.stringify(memberShape(u))) {
          body.membersById[String(u.id)] = memberShape(u);
          masks.push("membersById." + fpSeg(String(u.id)));
        }
      });
      const removedIds = prev.filter(p => !updated.find(u => u.id === p.id)).map(p => p.id);
      removedIds.forEach(id => { masks.push("membersById." + fpSeg(String(id))); masks.push("availability." + fpSeg(String(id))); });   // removed → delete slot + their availability
      if (prev.map(c => String(c.id)).join(",") !== updated.map(c => String(c.id)).join(",")) { body.memberOrder = updated.map(c => c.id); masks.push("memberOrder"); }
      if (masks.length === 0) { setCrew(updated); return { ok: true, status: 200, detail: "" }; }
      const res = await fsUpdate(DEV_COL, "crew", body, masks);
      if (res.ok) { setCrew(updated); if (removedIds.length) setAvail(a => { const n = { ...a }; removedIds.forEach(id => { delete n[id]; }); return n; }); }
      else setLastErr("Crew save failed (" + res.status + "): " + res.detail);
      return res;
    };

    const k = monthKey(vYear, vMonth);
    const locked = !(locks[k] && locks[k].locked === false);   // locked by default; open only when explicitly unlocked


    const toggleLock = async () => {
      setBusy(true);
      const next = { ...locks };
      next[k] = { locked: !locked, lockedBy: "UAS Manager", lockedAt: new Date().toISOString() };
      const res = await fsSet(DEV_COL, "availability_locks", next);
      setBusy(false);
      if (res.ok) { setLocks(next); setLastErr(""); flash(locked ? "Unlocked " + MONTHS[vMonth] : "Locked " + MONTHS[vMonth]); }
      else { setLastErr("Lock write failed (" + res.status + "): " + res.detail); flash("Lock failed — see error below"); }
    };

    const syncColor = sync === "synced" ? C.green : C.amber;
    const shift = todayShift();
    const shiftHue = SHIFT_COLORS[shift].color;
    const dateStr = DAYS_SHORT[now.getDay()] + ", " + MONTHS[now.getMonth()].slice(0,3) + " " + now.getDate();
    const tabBtn = (id, label) => h("button", { onClick: () => setTab(id),
      style: { flex:1, padding:"10px 0", fontSize:12, letterSpacing:1, borderRadius:9, border:"1px solid "+(tab===id?C.blue:C.border), background: tab===id?"rgba(59,130,246,0.16)":C.panel, color: tab===id?C.blue:C.dim } }, label);
    const topBtn = (id, label) => h("button", { onClick: () => setTopTab(id),
      style: { flex:1, padding:"10px 0", fontSize:12, letterSpacing:1, borderRadius:9, border:"1px solid "+(topTab===id?C.accent:C.border), background: topTab===id?"rgba(255,107,53,0.16)":C.panel, color: topTab===id?C.accent:C.dim } }, label);
    const fmtWxTime = (iso) => { if (!iso) return ""; try { return new Date(iso).toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit" }); } catch (e) { return ""; } };
    const wxBanner = (icon, label, sub, hue, bg, brd, meta) => h("div", {
      style: { display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, background:bg, border:"1px solid "+brd, borderRadius:10, padding:"9px 13px", marginBottom:10 }
    },
      h("div", { style:{ display:"flex", alignItems:"center", gap:10, minWidth:0 } },
        h("span", { style:{ fontSize:16, flexShrink:0 } }, icon),
        h("div", { style:{ minWidth:0 } },
          h("div", { style:{ fontSize:11, fontWeight:700, color:hue, letterSpacing:1.5 } }, label),
          h("div", { style:{ fontSize:9, color:C.dim, letterSpacing:0.5, marginTop:1 } }, sub))),
      meta ? h("div", { style:{ fontSize:8, color:C.dim, letterSpacing:0.5, flexShrink:0, textAlign:"right" } }, meta) : null);
    const monthNav = h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 } },
      h("button", { onClick: () => navMonth(-1), style: navBtn() }, "‹"),
      h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:22, letterSpacing:1 } }, MONTHS[vMonth] + " " + vYear),
      h("button", { onClick: () => navMonth(1), style: navBtn() }, "›"));

    return h("div", { style:{ minHeight:"100vh" } },
      h("div", { className: "fh-wrap" },

        // Header — date/shift (left) · sign-in + sync (right) · shield centered
        h("div", { style:{ marginBottom:12 } },
          h("div", { style:{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" } },
            h("div", null,
              h("div", { style:{ fontSize:12, color:C.text, fontWeight:500, letterSpacing:0.5 } }, dateStr),
              h("div", { style:{ display:"flex", alignItems:"center", gap:5, marginTop:4, fontSize:9, color:C.dim, letterSpacing:1 } },
                "TODAY",
                h("span", { style:{ fontSize:10, fontWeight:700, letterSpacing:1, color:shiftHue, background:shiftHue+"22", border:"1px solid "+shiftHue+"55", borderRadius:5, padding:"1px 7px" } }, shift + " SHIFT"))),
            h("div", { style:{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 } },
              me
                ? h("div", { style:{ display:"flex", alignItems:"center", gap:6 } },
                    h("span", { style:{ fontSize:11, color:C.text } }, me.name),
                    h("span", { style:{ fontSize:9, letterSpacing:1, padding:"1px 6px", borderRadius:10, border:"1px solid "+C.border, color: tier==="staff" ? C.dim : C.accent } }, tier === "staff" ? "STAFF" : "ADMIN"),
                    h("button", { onClick: logout, style:{ fontSize:10, color:C.dim, background:"none", border:"none", textDecoration:"underline", cursor:"pointer", padding:0 } }, "Sign Out"))
                : h("button", { onClick: () => { setPinInput(""); setPinError(false); setShowPin(true); }, style:{ fontSize:11, color:C.accent, background:"rgba(255,107,53,0.12)", border:"1px solid "+C.border, borderRadius:8, padding:"3px 10px", cursor:"pointer" } }, "\uD83D\uDD12 Sign In"),
              h("div", { style:{ display:"flex", alignItems:"center", gap:6, fontSize:10, color:C.dim } },
                h("span", { style:{ width:8, height:8, borderRadius:"50%", background:syncColor, display:"inline-block" } }),
                sync === "synced" ? "SYNCED" : "CONNECTING"))),
          h("img", { src: SHIELD_SRC, alt:"Firehawk Ops — BC2FD", style:{ display:"block", width:84, height:84, margin:"6px auto 5px" } }),
          h("div", { style:{ textAlign:"center", fontFamily:"'Bebas Neue', sans-serif", fontSize:25, letterSpacing:2, lineHeight:1, color:C.text } }, "FIREHAWK OPS"),
          h("div", { style:{ textAlign:"center", fontSize:9, color:C.accent, letterSpacing:3, marginTop:3 } }, "BC2FD · DISTRICTS 2 & 6")),

        // 7.1 live weather alert banners — show only when active; visible on every tab
        (redFlag && redFlag.active) ? wxBanner("\uD83D\uDEA9", "RED FLAG WARNING", "Extreme fire weather conditions", C.red,
          "linear-gradient(135deg,rgba(255,59,48,0.20),rgba(180,0,0,0.10))", "rgba(255,59,48,0.5)",
          "NWS" + (fmtWxTime(redFlag.updated) ? " · " + fmtWxTime(redFlag.updated) : "")) : null,
        (burnBan && burnBan.underBan) ? wxBanner("\uD83D\uDD25", "BURN BAN IN EFFECT", "Unincorporated Bexar County", C.accent,
          "linear-gradient(135deg,rgba(255,107,53,0.16),rgba(204,32,32,0.10))", "rgba(255,107,53,0.4)",
          "TFS" + (fmtWxTime(burnBan.updated) ? " · " + fmtWxTime(burnBan.updated) : "")) : null,
        (floodWarning && floodWarning.active) ? wxBanner("\uD83D\uDEA7", floodWarning.event ? floodWarning.event.toUpperCase() : "FLOOD WARNING",
          "Bexar County · until " + floodWarning.ends, "#4A90D9",
          "linear-gradient(135deg,rgba(74,144,217,0.20),rgba(0,80,180,0.10))", "rgba(74,144,217,0.5)", "NWS" + (fmtWxTime(floodWarning.updated) ? " · " + fmtWxTime(floodWarning.updated) : "")) : null,

        // Top nav (Increment 6 shell)
        h("div", { style:{ display:"flex", gap:8, marginBottom:14 } },
          topBtn("dashboard", "DASHBOARD"), topBtn("schedule", "SCHEDULE"), topBtn("links", "LINKS")),

        // Top-level view switch (Increment 6 shell)
        topTab === "dashboard"
          ? h(DashboardView, { crew, isOwner, flash, me })
          : topTab === "links"
            ? h(LinksView, null)
            : h("div", null,   // SCHEDULE area: sub-nav · month nav · view · dev controls
                me ? h("div", { style:{ display:"flex", gap:8, marginBottom:12 } },
                  tabBtn("sched", "CALENDAR"), canEdit ? tabBtn("crew", "CREW") : (me ? tabBtn("myshifts", "MY SHIFTS") : null), tabBtn("avail", "AVAILABILITY")) : null,
                (schedTab !== "crew" && schedTab !== "myshifts") ? monthNav : null,
                schedTab === "avail"
                  ? h(AvailabilityView, { crew, avail, locks, vYear, vMonth, saveMemberMonth, flash, setLastErr, canEdit, me })
                  : schedTab === "myshifts"
                    ? h(MyAssignments, { myId: me ? me.id : null, crew, compact: false })
                    : (schedTab === "crew" && canEdit)
                      ? h(CrewMgmtView, { crew, saveCrew, flash, isOwner, myId: me ? me.id : null, sessionPin })
                      : h("div", null,
                          (canEdit && me) ? h(MyAssignments, { myId: me.id, crew, compact: true }) : null,
                          h(ScheduleView, { crew, avail, vYear, vMonth, flash, setLastErr, canEdit })),
                canEdit ? h("div", { style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:12, padding:12, marginTop:14, marginBottom:10 } },
                  h("div", { style:{ fontSize:10, color:C.dim, letterSpacing:1, marginBottom:8 } }, "MANAGER CONTROLS"),
                  h("div", { style:{ display:"flex", gap:8 } },
                    h("button", { onClick: toggleLock, disabled: busy, style: ghostBtn(busy) }, locked ? "Unlock " + MONTHS[vMonth] + " Avail" : "Lock " + MONTHS[vMonth] + " Avail"),
                    h("button", { onClick: () => setStatsOpen(true), style: ghostBtn(false) }, "YTD Stats"))) : null,
                (me && !canEdit) ? h("div", { style:{ marginTop:14, marginBottom:10 } },
                  h("button", { onClick: () => setStatsOpen(true), style: ghostBtn(false) }, "YTD Stats")) : null),

        // YTD stats overlay
        statsOpen ? h(YtdStatsModal, { crew, year: vYear, onClose: () => setStatsOpen(false) }) : null,

        // Error line
        lastErr ? h("div", { style:{ background:"rgba(255,59,48,0.12)", border:"1px solid "+C.red, borderRadius:8, padding:"9px 11px", fontSize:11, color:C.red, marginBottom:10, lineHeight:1.5, wordBreak:"break-word" } }, "⚠ " + lastErr) : null,

        // Footer
        h("div", { style:{ fontSize:10, color:C.dim, textAlign:"center", marginTop:6, lineHeight:1.6 } },
          "Firehawk Ops · ", h("b", null, "v" + APP_VERSION),
          h(WhatsNew)),

        // Toast
        toast ? h("div", { style:{ position:"fixed", left:"50%", bottom:24, transform:"translateX(-50%)", background:C.panel2, border:"1px solid "+C.accent, color:C.text, padding:"9px 16px", borderRadius:20, fontSize:12, boxShadow:"0 6px 24px rgba(0,0,0,0.5)", zIndex:60 } }, toast) : null,

        // PIN modal (4.1 access control)
        showPin ? h("div", { style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:80, padding:16 } },
          h("div", { style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:14, padding:18, width:"100%", maxWidth:300, boxShadow:"0 10px 40px rgba(0,0,0,0.6)" } },
            h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:20, letterSpacing:1, color:C.text, marginBottom:4 } }, "SIGN IN"),
            h("div", { style:{ fontSize:11, color:C.dim, marginBottom:12 } }, "Enter your PIN"),
            h("input", { type:"password", inputMode:"numeric", autoFocus:true, value:pinInput,
              onChange: e => { const v = e.target.value; setPinInput(v); setPinError(false); if (pinTimer.current) clearTimeout(pinTimer.current); if (v.trim().length >= 4) pinTimer.current = setTimeout(() => submitPin(v, true), 450); },
              onKeyDown: e => { if (e.key === "Enter") submitPin(); },
              style:{ width:"100%", boxSizing:"border-box", background:C.bg, color:C.text, border:"1px solid "+(pinError?C.red:C.border), borderRadius:8, padding:"10px 12px", fontSize:18, letterSpacing:3, textAlign:"center", colorScheme:"dark" } }),
            pinError ? h("div", { style:{ fontSize:11, color:C.red, marginTop:8 } }, "PIN not recognized") : null,
            h("div", { style:{ display:"flex", gap:8, marginTop:14 } },
              h("button", { onClick: () => { setShowPin(false); setPinInput(""); setPinError(false); }, style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background:C.panel2, border:"1px solid "+C.border, color:C.dim } }, "Cancel"),
              h("button", { onClick: submitPin, style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background:"rgba(255,107,53,0.16)", border:"1px solid "+C.accent, color:C.accent } }, "Sign In")))) : null
      )
    );
  }

  // ════════════════════════════════════════════════════════════════════════════
  // YTD STATS  (finalized days only · one tally per person per day · all units)
  // ════════════════════════════════════════════════════════════════════════════
  function YtdStatsModal({ crew, year, onClose }) {
    const [data, setData]       = useState(null);    // { byId, totalDays }
    const [loading, setLoading] = useState(true);
    const MS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const nowMonth = new Date().getMonth();

    useEffect(() => {
      let alive = true;
      (async () => {
        const byId = {};
        crew.forEach(c => { byId[c.id] = { total:0, byMonth:{} }; });
        for (let m = 0; m <= 11; m++) {
          let res = null;
          try { res = await fsGetPath(DEV_COL + "/schedule_" + year + "_" + m); } catch (e) { res = null; }
          const days = (res && res.days) ? res.days : {};
          Object.keys(days).forEach(k => {
            const day = days[k];
            if (!day || !day.confirmed) return;          // finalized only
            const du = decodeDay(day, crew);
            const ids = new Set();                        // one tally per person per day, any unit/role
            if (du.u121.active)        ids.add(LEAD_PILOT_ID);
            if (du.u121.vo   != null)  ids.add(du.u121.vo);
            if (du.u124.rpic != null)  ids.add(du.u124.rpic);
            if (du.u124.vo   != null)  ids.add(du.u124.vo);
            (du.upstaff || []).forEach(id => ids.add(id));
            ids.forEach(id => {
              if (!byId[id]) byId[id] = { total:0, byMonth:{} };
              byId[id].total++;
              byId[id].byMonth[m] = (byId[id].byMonth[m] || 0) + 1;
            });
          });
        }
        if (!alive) return;
        const totalDays = Object.values(byId).reduce((s,v) => s + v.total, 0);
        setData({ byId, totalDays });
        setLoading(false);
      })();
      return () => { alive = false; };
    }, []);

    const active   = crew.filter(c => !c.archived);
    const archived = data ? crew.filter(c => c.archived && data.byId[c.id] && data.byId[c.id].total > 0) : [];
    const maxDays  = data ? Math.max(...crew.map(c => (data.byId[c.id] ? data.byId[c.id].total : 0)), 1) : 1;

    const card = (c, muted) => {
      const st = (data && data.byId[c.id]) || { total:0, byMonth:{} };
      const col = muted ? C.dim : (c.color || C.dim);
      return h("div", { key:c.id, style:{ background:"rgba(255,255,255,0.055)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:12, padding:"14px 16px" } },
        h("div", { style:{ display:"flex", alignItems:"center", gap:10, marginBottom:10 } },
          h("div", { style:{ width:32, height:32, borderRadius:"50%", background:col, border:"2px solid rgba(255,255,255,0.15)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, color:"#fff", fontWeight:700, flexShrink:0 } }, c.initials || "—"),
          h("div", { style:{ flex:1, minWidth:0 } },
            h("div", { style:{ fontSize:13, color:C.text, fontWeight:600 } }, c.name),
            h("div", { style:{ fontSize:9, color: muted ? C.dim : (c.role === "RPIC" ? C.blue : C.green), letterSpacing:1 } }, muted ? "ARCHIVED" : c.role)),
          h("div", { style:{ textAlign:"right" } },
            h("div", { style:{ fontSize:22, fontFamily:"'Bebas Neue', sans-serif", color:col, lineHeight:1 } }, st.total),
            h("div", { style:{ fontSize:7, color:C.dim, letterSpacing:1 } }, "DAYS WORKED"))),
        h("div", { style:{ height:4, background:"rgba(255,255,255,0.11)", borderRadius:2, marginBottom:10, overflow:"hidden" } },
          h("div", { style:{ height:"100%", width:(maxDays>0 ? st.total/maxDays*100 : 0)+"%", background:col, borderRadius:2 } })),
        h("div", { style:{ display:"flex", gap:3, alignItems:"flex-end", height:28 } },
          MS.map((mn, mi) => {
            const v = st.byMonth[mi] || 0;
            const bh = maxDays > 0 ? Math.max(2, v/maxDays*28) : 2;
            const isCur = mi === nowMonth;
            return h("div", { key:mi, style:{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2 } },
              h("div", { style:{ width:"100%", height:bh, background:isCur ? col : col+"66", borderRadius:2 } }),
              h("div", { style:{ fontSize:5.5, color:isCur ? col : C.dim } }, mn));
          })));
    };

    return h("div", { style:{ position:"fixed", inset:0, background:C.bg, zIndex:999, display:"flex", flexDirection:"column" } },
      h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px", borderBottom:"1px solid "+C.border, flexShrink:0 } },
        h("div", null,
          h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:22, letterSpacing:2, color:C.text, lineHeight:1 } }, "YTD STATS"),
          h("div", { style:{ fontSize:9, color:C.dim, letterSpacing:2, marginTop:3 } }, "CALENDAR YEAR " + year + " · FINALIZED DAYS")),
        h("button", { onClick: onClose, style:{ width:34, height:34, borderRadius:8, background:C.panel2, border:"1px solid "+C.border, color:C.text, fontSize:16, lineHeight:1, cursor:"pointer" } }, "\u2715")),
      h("div", { style:{ flex:1, overflowY:"auto", padding:16 } },
        h("div", { style:{ maxWidth:560, margin:"0 auto", display:"flex", flexDirection:"column", gap:14 } },
          loading
            ? h("div", { style:{ textAlign:"center", color:C.dim, fontSize:12, padding:"40px 0", letterSpacing:1 } }, "Loading " + year + " schedule…")
            : [
                h("div", { key:"sum", style:{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8 } },
                  [{ label:"TOTAL CREW-DAYS", value:data.totalDays, color:C.blue },
                   { label:"ACTIVE CREW", value:active.length, color:C.accent }].map(s =>
                    h("div", { key:s.label, style:{ background:"rgba(255,255,255,0.12)", border:"1px solid "+s.color+"44", borderRadius:10, padding:12, textAlign:"center" } },
                      h("div", { style:{ fontSize:26, fontFamily:"'Bebas Neue', sans-serif", color:s.color, lineHeight:1 } }, s.value),
                      h("div", { style:{ fontSize:7, color:C.dim, letterSpacing:1.5, marginTop:2 } }, s.label)))),
                h("div", { key:"hdr", style:{ fontSize:9, color:C.dim, letterSpacing:2 } }, "CREW COVERAGE"),
                active.map(c => card(c, false)),
                archived.length ? h("div", { key:"ahdr", style:{ fontSize:9, color:C.dim, letterSpacing:2, marginTop:4 } }, "ARCHIVED") : null,
                archived.map(c => card(c, true))
              ])));
  }

  // ── shared button styles ──
  function navBtn() { return { width:40, height:40, borderRadius:8, background:C.panel2, border:"1px solid "+C.border, color:C.text, fontSize:20, lineHeight:1 }; }
  function actionBtn(kind, disabled) {
    const base = { borderRadius:8, padding:"9px 16px", fontSize:13, fontWeight:500, opacity:disabled?0.4:1, border:"1px solid " };
    if (kind === "save") return { ...base, borderColor:C.accent, background:"rgba(255,107,53,0.16)", color:C.accent };
    return { ...base, borderColor:C.red, background:"rgba(255,59,48,0.12)", color:C.red };
  }
  function ghostBtn(disabled) { return { flex:1, borderRadius:8, padding:"9px 10px", fontSize:12, background:C.panel2, border:"1px solid "+C.border, color:C.dim, opacity:disabled?0.5:1 }; }
  function timeInput() { return { background:C.bg, color:C.text, border:"1px solid "+C.border, borderRadius:6, padding:"6px 8px", fontSize:12, colorScheme:"dark" }; }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));

  /* ---- PWA update detection + one-tap Reload (see sw.js) ---- */
  var swSkipping = false, updShown = false;
  function fhShowUpdateUI(onReload){
    if (document.getElementById('fhUpdateBar')) return;
    var bar = document.createElement('div');
    bar.id = 'fhUpdateBar';
    bar.style.cssText = "position:fixed;left:0;right:0;bottom:0;z-index:2147483647;background:#0B1220;border-top:1px solid #3B82F6;padding:calc(12px + env(safe-area-inset-bottom,0px)) 16px 12px;display:flex;align-items:center;gap:12px;font-family:'DM Mono',monospace;box-shadow:0 -4px 24px rgba(0,0,0,0.55)";
    var txt = document.createElement('div');
    txt.style.cssText = "flex:1;color:#E5E7EB;font-size:13px;line-height:1.3";
    txt.innerHTML = '<div style="color:#3B82F6;font-size:10px;letter-spacing:2px;margin-bottom:3px">UPDATE AVAILABLE</div>A newer build is ready to load.';
    var reload = document.createElement('button');
    reload.textContent = 'Reload';
    reload.style.cssText = "background:#3B82F6;color:#fff;border:none;border-radius:8px;padding:11px 20px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer";
    reload.onclick = function(){ bar.remove(); onReload(); };
    var later = document.createElement('button');
    later.textContent = 'Later';
    later.style.cssText = "background:transparent;color:#64748B;border:none;font-family:inherit;font-size:12px;padding:8px;cursor:pointer";
    later.onclick = function(){ bar.remove(); };
    bar.appendChild(txt); bar.appendChild(reload); bar.appendChild(later);
    document.body.appendChild(bar);
  }
  function fhOnUpdate(reg){
    if (updShown) return;
    updShown = true;   // once per session; reopening the app re-checks
    fhShowUpdateUI(function(){
      swSkipping = true;
      try { if (reg.waiting) reg.waiting.postMessage('skipWaiting'); } catch(e){}
      setTimeout(function(){ location.reload(); }, 1000);   // fallback if the swap is slow (iOS PWA)
    });
  }
  function fhRegisterSW(){
    if (!('serviceWorker' in navigator)) return;
    // Reload only when WE trigger the swap (avoids a spurious reload the first
    // time a worker ever takes control of the page).
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if (swSkipping){ swSkipping = false; location.reload(); }
    });
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      function watch(sw){
        if (!sw) return;
        sw.addEventListener('statechange', function(){
          if (sw.state === 'installed' && navigator.serviceWorker.controller) fhOnUpdate(reg);
        });
      }
      if (reg.waiting && navigator.serviceWorker.controller) fhOnUpdate(reg);
      reg.addEventListener('updatefound', function(){ watch(reg.installing); });
      // Background trigger: re-check on every foreground (fetches only sw.js).
      document.addEventListener('visibilitychange', function(){
        if (!document.hidden){ try { reg.update().catch(function(){}); } catch(_){} }
      });
      // Silent periodic re-check for devices left open (e.g. station iPad on shift):
      // every 15 min while visible, fetch sw.js (~3KB) and surface the Reload banner
      // if a new build is waiting. Skipped while hidden - the foreground handler covers that.
      setInterval(function(){
        if (!document.hidden){ try { reg.update().catch(function(){}); } catch(_){} }
      }, 15 * 60 * 1000);
    }).catch(function(){});
  }
  fhRegisterSW();
  </script>
