// ── Firebase REST API ──────────────────────────────────────────────────────
const FS_PROJECT = "firehawk-scheduler";
const FS_API_KEY = "AIzaSyAWbzE0k8p4WDyrUaBfIRDqyLoklkfu8nQ";
const FS_BASE = "https://firestore.googleapis.com/v1/projects/" + FS_PROJECT + "/databases/(default)/documents";
// Store schedule as a single JSON string to avoid Firestore field name restrictions
const USE_JSON_STRING = true;
function fromFSVal(v) {
  if (!v) return null;
  if ("stringValue" in v) return v.stringValue;
  if ("integerValue" in v) return parseInt(v.integerValue);
  if ("doubleValue" in v) return v.doubleValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("nullValue" in v) return null;
  if ("mapValue" in v) return fromFSFields(v.mapValue.fields || {});
  if ("arrayValue" in v) return (v.arrayValue.values || []).map(fromFSVal);
  return null;
}
function fromFSFields(fields) {
  if (!fields) return null;
  const out = {};
  for (const k in fields) out[k] = fromFSVal(fields[k]);
  return out;
}
function toFSVal(v) {
  if (v === null || v === undefined) return {
    nullValue: null
  };
  if (typeof v === "boolean") return {
    booleanValue: v
  };
  if (typeof v === "number") return Number.isInteger(v) ? {
    integerValue: String(v)
  } : {
    doubleValue: v
  };
  if (typeof v === "string") return {
    stringValue: v
  };
  if (Array.isArray(v)) return {
    arrayValue: {
      values: v.map(toFSVal)
    }
  };
  if (typeof v === "object") {
    const fields = {};
    for (const k in v) fields[k] = toFSVal(v[k]);
    return {
      mapValue: {
        fields
      }
    };
  }
  return {
    stringValue: String(v)
  };
}
function toFSFields(obj) {
  const fields = {};
  for (const k in obj) fields[k] = toFSVal(obj[k]);
  return fields;
}
async function fsGet(col, doc) {
  try {
    const url = FS_BASE + "/" + col + "/" + doc + "?key=" + FS_API_KEY;
    const res = await fetch(url, {
      method: "GET",
      headers: {
        "Accept": "application/json"
      }
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.fields ? fromFSFields(data.fields) : null;
  } catch (e) {
    return null;
  }
}
async function fsSet(col, doc, obj) {
  try {
    const url = FS_BASE + "/" + col + "/" + doc + "?key=" + FS_API_KEY;
    const body = JSON.stringify({
      fields: toFSFields(obj)
    });
    const res = await fetch(url, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body
    });
    if (!res.ok) {
      const t = await res.text();
      console.error("fsSet FAIL", res.status, t.slice(0, 200));
    }
    return res.ok;
  } catch (e) {
    console.error("fsSet ERROR", e.message);
    return false;
  }
}
function fsListen(col, doc, callback) {
  let active = true,
    lastSig = "";
  const poll = async () => {
    if (!active) return;
    try {
      const data = await fsGet(col, doc);
      const sig = JSON.stringify(data);
      if (sig !== lastSig) {
        lastSig = sig;
        callback(data);
      }
    } catch (e) {}
    if (active) setTimeout(poll, 5000);
  };
  poll();
  return () => {
    active = false;
  };
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const exp = new Date(dateStr);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return Math.ceil((exp - today) / 86400000);
}
function certStatus(dateStr) {

  if (days < 0) return "expired";
  if (days <= 30) return "warning";
  return "current";
}

function parseAvailability(rawText, daysInMonth) {

    length: daysInMonth

      return allDays.filter(d => !excluded.includes(d));
