const FS_PROJECT = "firehawk-scheduler";
const FS_API_KEY = "AIzaSyAWbzE0k8p4WDyrUaBfIRDqyLoklkfu8nQ";
const FS_BASE = "https://firestore.googleapis.com/v1/projects/" + FS_PROJECT + "/databases/(default)/documents";
// Store schedule as a single JSON string to avoid Firestore field name restrictions
const USE_JSON_STRING = true;
function fromFSVal(v) {
  if (!v) return null;
  if ("stringValue" in v) return v.stringValue;
  if ("integerValue" in v) return parseInt(v.integerValue);
  if ("doubleValue" in v) return v.doubleValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("nullValue" in v) return null;
  if ("mapValue" in v) return fromFSFields(v.mapValue.fields || {});
  if ("arrayValue" in v) return (v.arrayValue.values || []).map(fromFSVal);
  return null;
}
function fromFSFields(fields) {
  if (!fields) return null;
  const out = {};
  for (const k in fields) out[k] = fromFSVal(fields[k]);
  return out;
}
function toFSVal(v) {
  if (v === null || v === undefined) return {
    nullValue: null
  };
  if (typeof v === "boolean") return {
    booleanValue: v
  };
  if (typeof v === "number") return Number.isInteger(v) ? {
    integerValue: String(v)
  } : {
    doubleValue: v
  };
  if (typeof v === "string") return {
    stringValue: v
  };
  if (Array.isArray(v)) return {
    arrayValue: {
      values: v.map(toFSVal)
    }
  };
  if (typeof v === "object") {
    const fields = {};
    for (const k in v) fields[k] = toFSVal(v[k]);
    return {
      mapValue: {
        fields
      }
    };
  }
  return {
    stringValue: String(v)
  };
}
function toFSFields(obj) {
  const fields = {};
  for (const k in obj) fields[k] = toFSVal(obj[k]);
  return fields;
}
async function fsGet(col, doc) {
  try {
    const url = FS_BASE + "/" + col + "/" + doc + "?key=" + FS_API_KEY;
    const res = await fetch(url, {
      method: "GET",
      headers: {
        "Accept": "application/json"
      }
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.fields ? fromFSFields(data.fields) : null;
  } catch (e) {
    return null;
  }
}
async function fsSet(col, doc, obj) {
  try {
    const url = FS_BASE + "/" + col + "/" + doc + "?key=" + FS_API_KEY;
    const body = JSON.stringify({
      fields: toFSFields(obj)
    });
    const res = await fetch(url, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body
    });
    if (!res.ok) {
      const t = await res.text();
      console.error("fsSet FAIL", res.status, t.slice(0, 200));
    }
    return res.ok;
  } catch (e) {
    console.error("fsSet ERROR", e.message);
    return false;
  }
}
function fsListen(col, doc, callback) {
  let active = true,
    lastSig = "";
  const poll = async () => {
    if (!active) return;
    try {
      const data = await fsGet(col, doc);
      const sig = JSON.stringify(data);
      if (sig !== lastSig) {
        lastSig = sig;
        callback(data);
      }
    } catch (e) {}
    if (active) setTimeout(poll, 5000);
  };
  poll();
  return () => {
    active = false;
  };
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const exp = new Date(dateStr);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return Math.ceil((exp - today) / 86400000);
}
function certStatus(dateStr) {
  const days = daysUntil(dateStr);
  if (days === null) return "unknown";
  if (days < 0) return "expired";
  if (days <= 30) return "warning";
  return "current";
}

// Path-based wrappers so SchedulerPanel can use "col/doc" style paths
async function fsGetPath(docPath) {
  const [c, d] = docPath.split("/");
  const data = await fsGet(c, d);
  // Schedule days stored as JSON string to avoid Firestore field name issues
  if (data && data.daysJson) {
    try {
      return {
        days: JSON.parse(data.daysJson)
      };
    } catch {
      return {
        days: {}
      };
    }
  }
  if (data && data.days) return data;
  return data;
}
async function fsSetPath(docPath, obj) {
  const [c, d] = docPath.split("/");
  // Store schedule days as a JSON string — avoids all numeric field name issues
  if (obj && obj.days !== undefined) {
    return fsSet(c, d, {
      daysJson: JSON.stringify(obj.days)
    });
  }
  return fsSet(c, d, obj);
}
function fsListenPath(docPath, callback) {
  const [c, d] = docPath.split("/");
  return fsListen(c, d, data => {
    if (data && data.daysJson) {
      try {
        callback({
          days: JSON.parse(data.daysJson)
        });
      } catch {
        callback({
          days: {}
        });
      }
    } else {
      callback(data);
    }

function groupAssignmentByUnit(a, crewList) {
  if (!a) return { uav121: null, uav124: null };
  // Coerce IDs to int — Firebase may return strings
  const rpicM  = a.rpic != null ? crewList.find(c => c.id === parseInt(a.rpic)) : null;
  const voM    = a.vo   != null ? crewList.find(c => c.id === parseInt(a.vo))   : null;
  const vo2M   = a.vo2  != null ? crewList.find(c => c.id === parseInt(a.vo2))  : null;
  const extraM = (a.extra || []).map(id => crewList.find(c => c.id === parseInt(id))).filter(Boolean);

  // Sanchez (LEAD_PILOT_ID) always flies UAV121, regardless of whether he is
  // in rpic, vo, or extra[]. Everyone else flies UAV124.
  const sanchez = crewList.find(c => c.id === LEAD_PILOT_ID);
  const allAssigned = [rpicM, voM, vo2M, ...extraM].filter(Boolean);
  const sanchezPresent = allAssigned.some(c => c && c.id === LEAD_PILOT_ID);

  // UAV121: Sanchez as RPIC if he is the rpic, otherwise as crew if present
  const uav121rpic = sanchezPresent ? sanchez : null;

  // UAV124: the primary RPIC if it isn't Sanchez, or first non-Sanchez RPIC in extra[]
  const uav124rpic = (rpicM && rpicM.id !== LEAD_PILOT_ID)
    ? rpicM
    : extraM.find(c => c.role === "RPIC" && c.id !== LEAD_PILOT_ID) || null;

  // VO pairing depends on whether both units are active
  // Single-unit day: voM goes with whichever unit is active
  // Two-unit day: VO2 (vo2) → UAV121 (Sanchez), VO1 (vo) → UAV124
  const bothUnits = uav121rpic && uav124rpic;
  const uav121vo = uav121rpic ? (bothUnits ? vo2M : (uav124rpic ? null : voM)) : null;
  const uav124vo = uav124rpic ? voM : null;

  // remaining extra crew go to UAV124
  const uav124extra = extraM.filter(c => c.id !== LEAD_PILOT_ID && c !== uav124rpic);

  return {
    uav121: uav121rpic ? { rpic: uav121rpic, vo: uav121vo } : null,
    uav124: uav124rpic ? { rpic: uav124rpic, vo: uav124vo, extra: uav124extra } : null
  };
}

function getMonthHistory(year, month, daysInMonth) {
  const result = {};
  for (let d = 1; d <= daysInMonth; d++) {
    const h = HISTORY[`${year}_${month}_${d}`];
    if (h) result[d] = {
      ...h
    };
  }
  return Object.keys(result).length ? result : null;
}

// US Federal Holidays — computed per year
function getFederalHolidays(year) {
  const nthWeekday = (n, weekday, month) => {
    let count = 0;
    for (let d = 1; d <= 31; d++) {
      const date = new Date(year, month, d);
      if (date.getMonth() !== month) break;
      if (date.getDay() === weekday) {
        count++;
        if (count === n) return d;
      }
    }
    return null;
  };
  const lastWeekday = (weekday, month) => {
    let last = null;

function parseMetar(raw) {
  if (!raw) return null;
  var r = {};
  var wm = raw.match(/\b(\d{3}|VRB)(\d{2,3})(G(\d{2,3}))?KT\b/);
  if (wm) {
    r.windDir = wm[1] === "VRB" ? null : parseInt(wm[1]);
    r.windSpd = parseInt(wm[2]);
    r.windGust = wm[4] ? parseInt(wm[4]) : null;
    r.windVrb = wm[1] === "VRB";
  }
  var vm = raw.match(/\bM?(\d+(?:\/\d+)?)SM\b/);
  if (vm) r.vis = vm[1].includes("/") ? 0.5 : parseFloat(vm[1]);
  var cm = raw.match(/\b(BKN|OVC)(\d{3})\b/);
  if (cm) r.ceiling = parseInt(cm[2]) * 100;
  var tm = raw.match(/\b(M?)(\d{2})\/(M?)(\d{2})\b/);
  if (tm) {
    r.tempC = tm[1] === "M" ? -parseInt(tm[2]) : parseInt(tm[2]);
    r.dewC  = tm[3] === "M" ? -parseInt(tm[4]) : parseInt(tm[4]);
  }
  var am = raw.match(/\bA(\d{4})\b/);
  if (am) r.altim = parseInt(am[1]) / 100;
  var vis = r.vis != null ? r.vis : 10;
  var ceil = r.ceiling != null ? r.ceiling : 99999;
  if      (ceil < 500  || vis < 1) r.cat = "LIFR";
  else if (ceil < 1000 || vis < 3) r.cat = "IFR";
  else if (ceil <= 3000 || vis <= 5) r.cat = "MVFR";
  else r.cat = "VFR";
  return r;
}

function catCol(cat) {
  return cat === "VFR" ? "#34C759" : cat === "MVFR" ? "#4A90D9" : "#FF3B30";
}

function dirLbl(d) {
  if (d == null) return "VRB";
  var dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(d/22.5) % 16];
}

function pad3(n) {
  return n == null ? "VRB" : String(n).padStart(3, "0");
}
