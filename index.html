  function fromFSVal(v) {
    if (!v) return null;
    if ("stringValue" in v) return v.stringValue;
    if ("integerValue" in v) return parseInt(v.integerValue);
    if ("doubleValue" in v) return v.doubleValue;
    if ("booleanValue" in v) return v.booleanValue;

  function fromFSFields(fields) {

    const out = {};
    for (const k in fields) out[k] = fromFSVal(fields[k]);

  function toFSVal(v) {

    return { stringValue: String(v) };

  async function fsSet(col, doc, obj) {
    try {
      const url = FS_BASE + "/" + col + "/" + doc + "?key=" + FS_API_KEY;
      const body = JSON.stringify({ fields: toFSFields(obj) });
      const res = await fetch(url, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body
      });
      if (!res.ok) {
        const t = await res.text();
        console.error("fsSet FAIL", res.status, t.slice(0, 300));
        return { ok: false, status: res.status, detail: fsErr(t) };
      }
      return { ok: true, status: res.status, detail: "" };

  // Backtick-quote a field-path segment that is not a bare identifier (e.g. digit-leading map keys).
  function fpSeg(seg) { return /^[A-Za-z_][A-Za-z0-9_]*$/.test(seg) ? seg : "`" + String(seg).replace(/[`\\]/g, "\\$&") + "`"; }

  // This makes nested-map writes atomic, so concurrent writers to different paths never collide.
  async function fsUpdate(col, doc, obj, fieldPaths) {
    try {

      const url = FS_BASE + "/" + col + "/" + doc + "?" + (mask ? mask + "&" : "") + "key=" + FS_API_KEY;
      const body = JSON.stringify({ fields: toFSFields(obj) });
      const res = await fetch(url, { method: "PATCH", headers: { "Content-Type": "application/json", "Accept": "application/json" }, body });
      if (!res.ok) { const t = await res.text(); console.error("fsUpdate FAIL", res.status, t.slice(0, 300)); return { ok: false, status: res.status, detail: fsErr(t) }; }
      return { ok: true, status: res.status, detail: "" };

  // Resilient listener — fires on FIRST poll even on error/null so sync resolves.
  function fsListen(col, doc, callback) {
    let active = true, lastSig = "", firstPoll = true;
    const poll = async () => {
      if (!active) return;
      let data = null;
      try { data = await fsGet(col, doc); } catch (e) { data = null; }
      const sig = JSON.stringify(data);
      if (firstPoll || sig !== lastSig) {
        firstPoll = false; lastSig = sig;
        try { callback(data); } catch (e) {}
      }
      if (active) setTimeout(poll, 5000);
    };
    poll();
    return () => { active = false; };
  }
  // Path helpers for schedule months (stored as a JSON string under daysJson to

    const s = new Date(Date.now() - 7 * 3600000);   // shift flips at 0700; -7h keeps the prior shift until then
    const d = Math.floor((Date.UTC(s.getFullYear(), s.getMonth(), s.getDate()) - ANCHOR_DATE) / 86400000);
    return SHIFT_PATTERN[(d % 6 + 6) % 6];

  const SHIFT_PATTERN = ["A","A","B","B","C","C"];

    A: { color:"#FF3B30", bg:"rgba(255,59,48,0.15)", border:"rgba(255,59,48,0.35)" },

    C: { color:"#34C759", bg:"rgba(52,199,89,0.15)", border:"rgba(52,199,89,0.35)" }
  };
  function getShift(year, month, day) {
    const utcDay = Date.UTC(year, month, day);

    return SHIFT_PATTERN[(diff % 6 + 6) % 6];

  function monthKey(year, month) { return year + "_" + month; }

  // US Federal Holidays — computed per year (month keys are 0-indexed, matching vMonth)
  function getFederalHolidays(year) {
    const nthWeekday = (n, weekday, month) => {
      let count = 0;
      for (let d = 1; d <= 31; d++) {
        const date = new Date(year, month, d);
        if (date.getMonth() !== month) break;
        if (date.getDay() === weekday) { count++; if (count === n) return d; }
      }
      return null;
    };
    const lastWeekday = (weekday, month) => {
      let last = null;
      for (let d = 1; d <= 31; d++) {
        const date = new Date(year, month, d);
        if (date.getMonth() !== month) break;
        if (date.getDay() === weekday) last = d;
      }
      return last;
    };
    return {
      ["0-1"]: "New Year's Day",
      ["0-" + nthWeekday(3, 1, 0)]: "MLK Jr. Day",
      ["1-" + nthWeekday(3, 1, 1)]: "Presidents' Day",
      ["4-" + lastWeekday(1, 4)]: "Memorial Day",
      ["5-19"]: "Juneteenth",
      ["6-4"]: "Independence Day",
      ["8-" + nthWeekday(1, 1, 8)]: "Labor Day",
      ["9-" + nthWeekday(2, 1, 9)]: "Columbus Day",
      ["10-11"]: "Veterans Day",
      ["10-" + nthWeekday(4, 4, 10)]: "Thanksgiving",
      ["11-25"]: "Christmas Day"
    };
  }
  function getHoliday(year, month, day) { return getFederalHolidays(year)[month + "-" + day] || null; }

  function memberShape(c) {

      hasPin: !!c.hasPin, color: c.color,

  // Ordered crew array the UI uses — prefers the map shape, falls back to the legacy array.
  function membersToArray(data) {

      const byId = data.membersById;
      const order = Array.isArray(data.memberOrder) ? data.memberOrder.map(String) : [];
      const seen = {}, out = [];
      order.forEach(id => { if (byId[id] && !seen[id]) { seen[id] = 1; out.push(byId[id]); } });
      Object.keys(byId).forEach(id => { if (!seen[id]) out.push(byId[id]); });   // any not in order, appended

  // ════════════════════════════════════════════════════════════════════════════
  function ScheduleView(props) {
    const { crew, avail, vYear, vMonth, flash, setLastErr, canEdit } = props;
    const [monthDays, setMonthDays] = useState({});
    const [loaded, setLoaded]       = useState(false);
    const [selDay, setSelDay]       = useState(null);

    const daysRef  = useRef(monthDays); daysRef.current = monthDays;
    const saveTimer = useRef(null);

    // Load this month's schedule once per month (manager is the single editor;
    // a one-time read + auto-save avoids a poll clobbering an in-progress edit).
    useEffect(() => {
      let alive = true; setLoaded(false); setProposal(null); setConfirmReset(false);
      fsGetPath(DEV_COL + "/schedule_" + vYear + "_" + vMonth).then(r => {
        if (!alive) return;
        setMonthDays((r && r.days) ? r.days : {});

      return () => { alive = false; };
    }, [vYear, vMonth]);

    const scheduleSave = (daysObj) => {
      if (saveTimer.current) clearTimeout(saveTimer.current);

  // SOURCE DIAGNOSTICS (owner) — live-tests EVERY external dependency the program
  // relies on, from this device. Fixed district reference point; no GPS required.
  // ════════════════════════════════════════════════════════════════════════════
  function SourceDiagnostics() {
    const [rows, setRows] = useState(null);
    const [lastRun, setLastRun] = useState(null);
    const REF = { lat: 29.591, lon: -98.600 };   // district reference point
    const run = async () => {
      const out = []; setRows([{ name: "RUNNING\u2026", ok: null, note: "" }]);
      const prox = (u) => "https://firehawk-wx.usafsentinel-45e.workers.dev/?url=" + encodeURIComponent(u);
      const TT = (p, ms) => Promise.race([p, new Promise((_, rj) => setTimeout(() => rj(new Error("timeout")), ms))]);
      const gp = "geometry=" + REF.lon + "%2C" + REF.lat + "&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&returnGeometry=false&f=json&outFields=*";
      const probe = async (name, url, kind) => {
        const t0 = Date.now();
        try {
          const r = await TT(fetch(url), 8000);
          const ms = Date.now() - t0;
          let note = "HTTP " + r.status, ok = r.ok;
          if (kind === "reach") { ok = true; note = "reachable \u00b7 HTTP " + r.status; }
          else if (r.ok) {
            const tx = await r.text();
            if (kind === "arcgis") { try { const d = JSON.parse(tx); if (d.error) { ok = false; note = "ArcGIS: " + (d.error.message || ("code " + d.error.code)); } else if (Array.isArray(d.features)) note = "OK \u00b7 " + d.features.length + " feat"; else { ok = false; note = "no features[]"; } } catch (e2) { ok = false; note = "bad JSON"; } }
            else if (kind === "tfrlist") { try { const d = JSON.parse(tx); const tx2 = (Array.isArray(d) ? d : []).filter(x => x && x.state === "TX"); note = "OK \u00b7 " + (Array.isArray(d) ? d.length : "?") + " rows \u00b7 " + tx2.length + " TX"; } catch (e2) { ok = false; note = "not JSON: " + tx.slice(0, 36); } }
            else if (kind === "wfs") { try { const d = JSON.parse(tx); const fl = Array.isArray(d.features) ? d.features : []; const np = fl.filter(f2 => f2.geometry && /Polygon/.test(f2.geometry.type)).length; note = "OK \u00b7 " + fl.length + " feat \u00b7 " + np + " poly"; } catch (e2) { ok = false; note = "not JSON: " + tx.slice(0, 36); } }
            else if (kind === "adsb") { try { const d = JSON.parse(tx); note = "OK \u00b7 " + ((d.ac || []).length) + " aircraft"; } catch (e2) { ok = false; note = "not JSON"; } }
            else if (kind === "w3w") { try { const d = JSON.parse(tx); note = d.words ? ("OK \u00b7 ///" + d.words) : "no words \u00b7 key?"; ok = !!d.words; } catch (e2) { ok = false; note = "not JSON"; } }
            else if (kind === "fs") { try { const d = JSON.parse(tx); note = d.fields ? "OK \u00b7 crew doc" : "OK \u00b7 json"; } catch (e2) { ok = false; note = "not JSON"; } }
            else { try { JSON.parse(tx); note = "OK \u00b7 json"; } catch (e2) { ok = false; note = "not JSON: " + tx.slice(0, 36); } }
          }
          out.push({ name, ok, note: note + " \u00b7 " + ms + "ms" });
        } catch (e) {
          const wall = Date.now() - t0;
          const susp = e && e.message === "timeout" && wall > 20000;   // timers froze — iOS suspended the page (permission prompt / backgrounded)
          out.push({ name, ok: false, note: susp ? "interrupted \u2014 app was suspended mid-check \u00b7 re-run" : (e.message || "failed") });
        }
        setRows(out.slice());
      };
      await probe("FIRESTORE \u00b7 SCHEDULE DB", FS_BASE + "/" + DEV_COL + "/crew", "fs");
      await probe("AUTH WORKER", AUTH + "/", "reach");
      await probe("WX WORKER \u00b7 /BURNBAN", "https://firehawk-wx.usafsentinel-45e.workers.dev/burnban", "json");
      await probe("WX WORKER \u00b7 /REDFLAG", "https://firehawk-wx.usafsentinel-45e.workers.dev/redflag", "json");
      await probe("NWS ALERTS (VIA WORKER)", prox("https://api.weather.gov/alerts/active?zone=TXZ205,TXC029"), "json");
      await probe("NWS GRIDPOINT \u00b7 GPS WX", "https://api.weather.gov/points/" + REF.lat + "," + REF.lon, "json");
      await probe("LAANC GRID \u00b7 FAA", "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/FAA_UAS_FacilityMap_Data/FeatureServer/0/query?" + gp, "arcgis");
      await probe("LAANC OVERLAY \u00b7 ENVELOPE", "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/FAA_UAS_FacilityMap_Data/FeatureServer/0/query?geometry=" + encodeURIComponent((REF.lon-0.06)+","+(REF.lat-0.06)+","+(REF.lon+0.06)+","+(REF.lat+0.06)) + "&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects&returnGeometry=true&outSR=4326&geometryPrecision=5&outFields=*&f=json", "arcgis");
      await probe("SUA \u00b7 FAA", "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/Special_Use_Airspace/FeatureServer/0/query?" + gp, "arcgis");
      await probe("SUA \u00b7 TAMU FALLBACK", "https://gis.nri.tamu.edu/arcgis/rest/services/SUA_MTR/SUA/MapServer/0/query?" + gp, "arcgis");
      await probe("SECURITY \u00b7 DOD 99.7", "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/DoD_Mar_13/FeatureServer/0/query?" + gp, "arcgis");
      await probe("SECURITY \u00b7 PART-TIME", "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/Part_Time_National_Security_UAS_Flight_Restrictions/FeatureServer/0/query?" + gp, "arcgis");
      await probe("CLASS AIRSPACE \u00b7 FAA", "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/Class_Airspace/FeatureServer/0/query?" + gp, "arcgis");
      await probe("TFR LIST (VIA WORKER)", prox("https://tfr.faa.gov/tfrapi/exportTfrList"), "tfrlist");
      await probe("TFR SHAPES \u00b7 WFS", prox("https://tfr.faa.gov/geoserver/TFR/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=TFR%3Aboundary&outputFormat=application%2Fjson&maxFeatures=5&bbox=" + (REF.lon - 0.4) + "," + (REF.lat - 0.4) + "," + (REF.lon + 0.4) + "," + (REF.lat + 0.4) + ",EPSG:4326"), "wfs");
      await probe("ADS-B \u00b7 AIRPLANES.LIVE", "https://api.airplanes.live/v2/point/" + REF.lat + "/" + REF.lon + "/3", "adsb");
      const probe2 = async (name, url) => {   // direct leg, then worker leg — reports both
        const t0 = Date.now();
        const leg = async (u) => { try { const r = await TT(fetch(u), 6000); if (!r.ok) return "HTTP " + r.status; JSON.parse(await r.text()); return null; } catch (e) { return e.message || "failed"; } };
        const d1 = await leg(url);
        if (d1 === null) { out.push({ name, ok: true, note: "OK \u00b7 direct \u00b7 " + (Date.now() - t0) + "ms" }); setRows(out.slice()); return; }
        const d2 = await leg(prox(url));
        out.push({ name, ok: d2 === null, note: (d2 === null ? ("OK via worker (direct: " + d1 + ")") : ("direct: " + d1 + " \u00b7 worker: " + d2)) + " \u00b7 " + (Date.now() - t0) + "ms" });
        setRows(out.slice());
      };
      await probe2("OPEN-METEO \u00b7 FORECAST", "https://api.open-meteo.com/v1/forecast?latitude=" + REF.lat + "&longitude=" + REF.lon + "&current=temperature_2m");
      await probe2("OPEN-METEO \u00b7 ELEVATION", "https://api.open-meteo.com/v1/elevation?latitude=" + REF.lat + "&longitude=" + REF.lon);
      await probe2("ELEVATION \u00b7 USGS EPQS", "https://epqs.nationalmap.gov/v1/json?x=" + REF.lon + "&y=" + REF.lat + "&units=Feet&wkid=4326&includeDate=false");
      await probe("WHAT3WORDS", "https://api.what3words.com/v3/convert-to-3wa?coordinates=" + REF.lat + "%2C" + REF.lon + "&key=J4FL5TE7", "w3w");
      await probe("METAR (VIA WORKER)", prox("https://aviationweather.gov/api/data/metar?ids=KSSF&format=json&taf=false"), "json");
      setLastRun(new Date());
    };
    const failCount = rows ? rows.filter(r => r.ok === false).length : 0;
    return h("div", { style: { background: C.panel, border: "1px solid " + C.border, borderRadius: 12, padding: 14, marginTop: 14 } },
      h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 } },
        h("div", null,
          h("div", { style: { fontSize: 10, color: C.dim, letterSpacing: 1.5 } }, "EXTERNAL SOURCE DIAGNOSTICS"),
          lastRun ? h("div", { style: { fontSize: 8, color: failCount ? C.red : C.green, letterSpacing: 1, marginTop: 3 } },
            (failCount ? failCount + " FAILING" : "ALL SOURCES OK") + " \u00b7 " + lastRun.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" })) : null),
        h("button", { onClick: run, style: { padding: "6px 14px", borderRadius: 8, background: C.panel2, border: "1px solid " + C.border, color: C.text, fontSize: 9, letterSpacing: 1.5, fontFamily: "inherit", cursor: "pointer" } }, "RUN CHECK")),
      rows ? h("div", null,
        rows.map((r, i2) => h("div", { key: i2, style: { display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8, fontSize: 9, letterSpacing: 0.5, padding: "3.5px 0", borderBottom: i2 < rows.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none" } },
          h("span", { style: { color: r.ok === false ? C.red : r.ok ? C.green : C.dim, flexShrink: 0 } }, r.name),
          h("span", { style: { color: C.dim, textAlign: "right", wordBreak: "break-all" } }, r.note))))
        : h("div", { style: { fontSize: 9, color: C.dim, fontStyle: "italic" } }, "Tap Run Check to live-test every external data source the program depends on."));
  }

  function AccessLogPanel() {

      fsGet(DEV_COL, "access_log").then(log => {
        setEntries((log && Array.isArray(log.entries)) ? log.entries : []);

      }).catch(() => setLoading(false));

        ? h("div", { style:{ fontSize:11, color:C.dim } }, "Loading…")

  function MyAssignments(props) {
    const { myId, crew, compact } = props;
    const [rows, setRows] = useState(null);   // null = loading
    const [open, setOpen] = useState(false);  // admin compact card is collapsible, starts collapsed
    useEffect(() => {
      let alive = true;
      if (myId == null) { setRows([]); return; }
      const now = new Date();
      const y0 = now.getFullYear(), m0 = now.getMonth();
      const m1 = (m0 + 1) % 12, y1 = (m0 === 11) ? y0 + 1 : y0;
      const months = [ { y:y0, m:m0 }, { y:y1, m:m1 } ];
      Promise.all(months.map(function (mm) {
        return fsGetPath(DEV_COL + "/schedule_" + mm.y + "_" + mm.m)
          .then(function (r) { return { mm: mm, days: (r && r.days) ? r.days : {} }; })
          .catch(function () { return { mm: mm, days: {} }; });
      })).then(function (results) {
        if (!alive) return;
        const out = [];
        results.forEach(function (bucket) {
          const mm = bucket.mm, days = bucket.days;
          Object.keys(days).forEach(function (k) {
            const dnum = parseInt(String(k).replace(/^d/, ""));
            if (!(dnum >= 1)) return;
            const day = days[k]; if (!day) return;
            const du = decodeDay(day, crew);
            let unit = null, role = null;
            if (du.u121.active && myId === LEAD_PILOT_ID) { unit = UNIT_LEAD; role = "RPIC"; }
            else if (du.u121.vo === myId) { unit = UNIT_LEAD; role = "VO"; }
            else if (du.u124.rpic === myId) { unit = UNIT_PRIMARY; role = "RPIC"; }
            else if (du.u124.vo === myId) { unit = UNIT_PRIMARY; role = "VO"; }
            else if ((du.upstaff || []).indexOf(myId) !== -1) { unit = UNIT_PRIMARY; role = "UPSTAFF"; }
            // Past shifts drop off automatically — the list is forward-looking from today
            const tn = new Date(); const t0 = new Date(tn.getFullYear(), tn.getMonth(), tn.getDate());
            if (new Date(mm.y, mm.m, dnum) < t0) return;
            // Planned OOS windows on this member's unit that day (unit strings normalized by digits)
            const uDig = String(unit || "").replace(/\D/g, "");
            const myOos = (Array.isArray(day.oos) ? day.oos : []).filter(w => w && String(w.unit || "").replace(/\D/g, "") === uDig);
            if (unit) out.push({ y:mm.y, m:mm.m, d:dnum, unit:unit, role:role, confirmed: !!day.confirmed, oos: myOos });
          });
        });
        out.sort(function (a, b) { return (a.y - b.y) || (a.m - b.m) || (a.d - b.d); });
        setRows(out);
      });
      return function () { alive = false; };
    }, [myId]);

    const meRec = crew.find(function (c) { return c.id === myId; }) || null;
    const wrap = function (inner) { return h("div", { style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:12, padding: compact ? "10px 12px" : 14, marginBottom: compact ? 12 : 0 } }, inner); };
    const count = rows ? rows.length : null;
    const downloadICS = function () {
      if (!rows || !rows.length) return;
      const pad = function (n) { return (n < 10 ? "0" : "") + n; };
      const BS = String.fromCharCode(92);                       // backslash, for ICS escaping
      const esc = function (t) { return String(t).split(BS).join(BS + BS).split(";").join(BS + ";").split(",").join(BS + ",").split("\n").join(BS + "n"); };
      const now = new Date();
      const stamp = "" + now.getUTCFullYear() + pad(now.getUTCMonth() + 1) + pad(now.getUTCDate()) + "T" + pad(now.getUTCHours()) + pad(now.getUTCMinutes()) + pad(now.getUTCSeconds()) + "Z";
      const LOCATION = "Station 121, 2096 Talley Rd, San Antonio, TX 78253";
      const PHONE = "(210) 861-6643";
      const dutyFull = function (role) { return role === "RPIC" ? "RPIC (Remote Pilot in Command)" : role === "VO" ? "VO (Visual Observer)" : "Upstaff"; };
      const L = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Fire Hawk UAS//Ops//EN", "CALSCALE:GREGORIAN", "METHOD:PUBLISH"];
      rows.forEach(function (r) {
        const start = "" + r.y + pad(r.m + 1) + pad(r.d);
        const e = new Date(r.y, r.m, r.d + 1);
        const end = "" + e.getFullYear() + pad(e.getMonth() + 1) + pad(e.getDate());
        const shift = getShift(r.y, r.m, r.d);
        const oosNote = (r.oos && r.oos.length) ? r.oos.map(w => "Planned OOS " + (w.from || "?") + "-" + (w.to || "?") + (w.reason ? " (" + w.reason + ")" : "")).join("; ") : null;
        const desc = ["Unit: " + r.unit, "Duty: " + dutyFull(r.role), "Shift: " + shift, "Status: " + (r.confirmed ? "Confirmed" : "Pending")].concat(oosNote ? [oosNote] : []).concat(["Contact UAS Program Manager: " + PHONE]).join("\n");
        L.push("BEGIN:VEVENT");
        L.push("UID:firehawk-" + myId + "-" + start + "-" + r.unit + "@bc2fd.org");
        L.push("DTSTAMP:" + stamp);
        L.push("DTSTART;VALUE=DATE:" + start);
        L.push("DTEND;VALUE=DATE:" + end);
        L.push("SUMMARY:" + esc("Fire Hawk UAS \u2014 " + r.unit + " " + r.role + " (" + shift + " Shift)"));
        L.push("LOCATION:" + esc(LOCATION));
        L.push("DESCRIPTION:" + esc(desc));
        L.push("END:VEVENT");
      });
      L.push("END:VCALENDAR");
      const ics = L.join("\r\n");
      const a = document.createElement("a");
      a.href = "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);
      a.download = "firehawk-shifts.ics";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    };
    const titleEl = h("span", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize: compact ? 17 : 23, letterSpacing:2, color:C.text } }, compact ? "MY UPCOMING SHIFTS" : "MY SHIFTS");
    const nameEl = meRec ? h("span", { style:{ fontSize:10, color:C.dim, letterSpacing:1 } }, "\u00B7 " + (meRec.first ? meRec.first.trim() + " " : "") + meRec.name) : null;

    let head;
    if (compact) {
      const countEl = (count != null) ? h("span", { style:{ fontSize:10, color:C.dim, letterSpacing:1, marginLeft:"auto" } }, count + (count === 1 ? " shift" : " shifts")) : null;
      head = h("button", { onClick: function () { setOpen(!open); }, style:{ display:"flex", alignItems:"center", gap:8, width:"100%", background:"none", border:"none", padding:0, cursor:"pointer", fontFamily:"inherit", color:C.text, textAlign:"left", marginBottom: open ? 10 : 0 } },
        h("span", { style:{ fontSize:11, color:C.dim, width:10 } }, open ? "\u25BE" : "\u25B8"), titleEl, nameEl, countEl);
    } else {
      head = h("div", { style:{ display:"flex", alignItems:"baseline", gap:8, marginBottom:10 } }, titleEl, nameEl);
    }

    let inner;
    if (rows === null) {
      inner = h("div", { style:{ fontSize:11, color:C.dim } }, "Loading your shifts\u2026");
    } else if (rows.length === 0) {
      const a = MONTHS[new Date().getMonth()], b = MONTHS[(new Date().getMonth() + 1) % 12];
      inner = h("div", { style:{ fontSize:11.5, color:C.dim, lineHeight:1.55 } }, "No assigned shifts in " + a + " or " + b + ". They'll show up here once the schedule is set.");
    } else {
      const groups = [];
      rows.forEach(function (r) { const key = r.y + "_" + r.m; let g = groups.find(function (x) { return x.key === key; }); if (!g) { g = { key:key, y:r.y, m:r.m, items:[] }; groups.push(g); } g.items.push(r); });
      const unitColor = function (u) { return u === UNIT_LEAD ? U121 : U124; };
      const unitShort = function (u) { return u === UNIT_LEAD ? "121" : "124"; };
      inner = groups.map(function (g) {
        return h("div", { key:g.key, style:{ marginBottom:8 } },
          h("div", { style:{ fontSize:9, letterSpacing:2, color:C.dim, marginBottom:6, marginTop:4 } }, MONTHS[g.m].toUpperCase() + " " + g.y),
          g.items.map(function (r) {
            return h("div", { key:g.key + "_" + r.d, style:{ display:"flex", alignItems:"center", gap:10, padding:"7px 4px", borderBottom:"1px solid "+C.border } },
              h("div", { style:{ width:70, fontSize:12, color:C.text, fontWeight:600 } }, DOW[new Date(r.y, r.m, r.d).getDay()] + " " + MONTHS[r.m].slice(0, 3) + " " + r.d),
              h("div", { style:{ fontSize:11, fontWeight:700, letterSpacing:1, color:unitColor(r.unit), border:"1px solid "+unitColor(r.unit)+"55", borderRadius:6, padding:"2px 7px" } }, unitShort(r.unit)),
              h("div", { style:{ fontSize:11.5, color:C.text, letterSpacing:0.5 } }, r.role),
              h("div", { style:{ flex:1, fontSize:9.5, letterSpacing:0.5, color:C.amber, textAlign:"center", padding:"0 12px" } },
                (r.oos && r.oos.length > 0)
                  ? r.oos.map(w => "\u26A0 " + unitShort(r.unit) + " planned OOS " + (w.from || "?") + "\u2013" + (w.to || "?") + (w.reason ? " \u00b7 " + w.reason : "")).join("  ")
                  : ""),
              h("div", { style:{ display:"flex", alignItems:"center", gap:5, fontSize:10, color: r.confirmed ? C.green : C.amber, flexShrink:0 } },
                h("span", { style:{ width:7, height:7, borderRadius:"50%", background: r.confirmed ? C.green : C.amber, display:"inline-block" } }),
                r.confirmed ? "Confirmed" : "Pending"));
          }));
      });
    }

    const showBody = !compact || open;
    const calBtn = (rows && rows.length) ? h("button", { onClick: downloadICS, style:{ display:"block", width:"100%", marginTop:12, padding:"9px 12px", background:"rgba(74,144,217,0.10)", border:"1px solid rgba(74,144,217,0.3)", borderRadius:10, color:"#4A90D9", fontSize:11.5, letterSpacing:0.5, cursor:"pointer", fontFamily:"inherit" } }, "\uD83D\uDCC5 Add to iOS Calendar") : null;
    return wrap(h("div", null, head, showBody ? h("div", null, inner, calBtn) : null));
  }

  function CrewMgmtView(props) {
    const { crew, saveCrew, flash, isOwner, myId, sessionPin } = props;
    const PALETTE = [
      "#7B1E17","#C0392B","#E74C3C","#FF7066",              // reds
      "#A84300","#D35400","#E67E22","#F39C12",              // oranges
      "#B7791F","#C8A84B","#F1C40F","#FDE38A",              // yellows / golds
      "#145A32","#27AE60","#2ECC71","#7BED9F",              // greens
      "#0E6655","#16A085","#1ABC9C","#00CEC9",              // teals / cyan
      "#1B4F72","#2980B9","#3498DB","#4A90D9","#74B9FF",    // blues
      "#4A235A","#7D3C98","#8E44AD","#9B59B6","#C39BD3",    // purples

    const [fColor, setFColor] = useState(PALETTE[0]);
    const [fRole, setFRole]   = useState("RPIC");
    const [fFirst, setFFirst] = useState("");
    const [fRank, setFRank]   = useState("");
    const [fTitle, setFTitle] = useState("");
    const [fInstr, setFInstr] = useState(false);      // instructor toggle draft
    const [fSenior, setFSenior] = useState(false);    // senior pilot toggle draft
    const [fNwcg, setFNwcg] = useState([]);           // NWCG quals draft (UASM/UASD/UASL)
    const [colorPop, setColorPop] = useState(false);   // color spectrum popover
    const [editId, setEditId] = useState(null);   // null = add mode; member id = edit mode
    const [certEdit, setCertEdit] = useState(null);   // pilot whose 107 is being edited
    const [certInput, setCertInput] = useState("");   // entered completion / issue date
    const [certNoInput, setCertNoInput] = useState("");   // FAA certificate number (owner-only)
    const [accessEdit, setAccessEdit] = useState(null); // owner-only: pilot whose PIN / tier is being edited
    const [tierDraft, setTierDraft]   = useState("staff");
    const [pinDraft, setPinDraft]     = useState("");
    const [authDraft, setAuthDraft]   = useState("");   // owner confirms their own PIN to authorize a PIN change
    const [clearPin, setClearPin]     = useState(false);
    const [confirmDel, setConfirmDel] = useState(null);   // member id armed for permanent removal

    const activeList   = crew.filter(c => !c.archived);
    const archivedList = crew.filter(c => c.archived);
    const usedColors   = activeList.map(c => c.color);                          // taken by active/reserve pilots
    const availColors  = PALETTE.filter(col => usedColors.indexOf(col) === -1);
    const swatchColors = availColors.length ? availColors : PALETTE;            // fallback if every color is taken
    const addYears = (s, n) => { try { const d = new Date(s + "T00:00:00Z"); d.setUTCFullYear(d.getUTCFullYear() + n); return d.toISOString().slice(0, 10); } catch (e) { return s; } };

    const doSave = async (updated, msg) => {
      setBusy(true);
      const res = await saveCrew(updated);
      setBusy(false);
      if (res && res.ok && msg) flash(msg);
      return res;
    };
    const setRole       = (c) => doSave(crew.map(x => x.id === c.id ? { ...x, role: x.role === "RPIC" ? "VO" : "RPIC" } : x));
    const setInstructor = (c) => doSave(crew.map(x => x.id === c.id ? { ...x, instructor: !x.instructor } : x), c.name + (c.instructor ? " removed as instructor" : " designated instructor"));
    const archive       = (c) => doSave(crew.map(x => x.id === c.id ? { ...x, archived: true } : x), c.name + " archived");
    const unarchive     = (c) => doSave(crew.map(x => x.id === c.id ? { ...x, archived: false } : x), c.name + " restored");
    const removeMember = async (c) => {
      if (c.hasPin) { try { await fetch(AUTH + "/remove-pin", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ authPin: sessionPin, id: c.id }) }); } catch (e) {} }
      const res = await doSave(crew.filter(x => x.id !== c.id), c.name + " removed");
      if (res && res.ok) setConfirmDel(null);

    const delBtn = (c) => (isOwner && c.id !== myId && c.tier !== "owner")
      ? h("button", { onClick: () => { if (confirmDel === c.id) removeMember(c); else { setConfirmDel(c.id); setTimeout(() => setConfirmDel(p => p === c.id ? null : p), 4000); } }, disabled:busy,
          style:{ fontSize:10, color: confirmDel === c.id ? "#fff" : C.red, background: confirmDel === c.id ? C.red : "none", border:"1px solid "+(confirmDel === c.id ? C.red : C.border), borderRadius:7, padding:"4px 8px", cursor:"pointer" } },
          confirmDel === c.id ? "Remove?" : "Remove")
      : null;
    const editBtn = (c) => isOwner
      ? h("button", { onClick: () => openEdit(c), disabled:busy, style:{ fontSize:10, color:C.dim, background:"none", border:"1px solid "+C.border, borderRadius:7, padding:"4px 8px", cursor:"pointer" } }, "Edit")
      : null;

      const geoParam = "geometry=" + lon + "%2C" + lat + "&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&returnGeometry=false&f=json";
      const BASE_SUA_FAA = "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/Special_Use_Airspace/FeatureServer/0/query?" + geoParam + "&outFields=*";
      const BASE_SUA_TAMU = "https://gis.nri.tamu.edu/arcgis/rest/services/SUA_MTR/SUA/MapServer/0/query?" + geoParam + "&outFields=NAME,TYPE,SUAS_IDENT,LOWER_ALT,UPPER_ALT,EFF_TIMES,CON_AGCY";
      // SUA provenance: FAA AIS (authoritative, 28-day NASR cycle) primary; TAMU NASR mirror only if FAA is unreachable
      const fetchSUA = async () => {
        const p = await safeFetch(BASE_SUA_FAA);
        if (!p.__failed) { p.__src = "FAA-AIS"; return p; }
        const t = await safeFetch(BASE_SUA_TAMU);
        if (!t.__failed) t.__src = "TAMU-NASR";
        return t;
      };
      const BASE_LAANC = "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/FAA_UAS_FacilityMap_Data/FeatureServer/0/query?" + geoParam + "&outFields=*";
      // National Security = full-time DoD facility restrictions (\u00a799.7, layer DoD_Mar_13)
      // + part-time NSRs. The old service name (NationalSecurityUAS_FlightRestrictions) does not
      // exist on FAA's server \u2014 confirmed via live diagnostics returning "ArcGIS: Invalid URL".
      const BASE_NSR_DOD = "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/DoD_Mar_13/FeatureServer/0/query?" + geoParam + "&outFields=*";
      const BASE_NSR_PT  = "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/Part_Time_National_Security_UAS_Flight_Restrictions/FeatureServer/0/query?" + geoParam + "&outFields=*";
      const fetchNSR = async () => {
        const a = await safeFetch(BASE_NSR_DOD);
        const b = await safeFetch(BASE_NSR_PT);
        return { features: (a.features || []).concat(b.features || []), __failed: !!(a.__failed || b.__failed) };
      };
      const BASE_CLASS = "https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/arcgis/rest/services/Class_Airspace/FeatureServer/0/query?" + geoParam + "&outFields=CLASS,NAME";
      const AGP = (u) => "https://firehawk-wx.usafsentinel-45e.workers.dev/?url=" + encodeURIComponent(u);
      const okFeatures = r => r.json().then(d => (d && Array.isArray(d.features)) ? d : Promise.reject(0));
      const safeFetch = url => fetch(url).then(okFeatures)
        .catch(() => fetch(AGP(url)).then(okFeatures).catch(() => ({ features: [], __failed: true })));
      Promise.all([safeFetch(BASE_LAANC), fetchSUA(), fetchNSR(), safeFetch(BASE_CLASS)])
        .then(([laanc, sua, nsr, cls]) => {
          const failedNames = [];
          if (laanc.__failed) failedNames.push("LAANC");
          if (sua.__failed) failedNames.push("SUA");
          if (nsr.__failed) failedNames.push("SECURITY");
          if (cls.__failed) failedNames.push("CLASS");
          const failedCount = failedNames.length;
          const laancDown = !!laanc.__failed;
          // A regulatory check that got no data must FAIL LOUD — never render as clear.
          if (failedCount === 4) { setLaancData(null); setLaancStatus("incomplete"); return; }

          // SUA floor relevance (v2.4): only surface special-use airspace a Part 107 op can actually reach.
          const FLOOR_RELEVANT_AGL = 3000;   // generous margin above the 400ft ceiling — never hides a real low-floor area
          const floorAGL = (lowerAlt) => {
            if (!lowerAlt) return 0;   // unknown floor — treat as surface, don't silently clear it
            const st = String(lowerAlt).trim().toUpperCase();
            if (st === "SFC" || st === "SURFACE" || st === "GND") return 0;
            const mm2 = st.match(/([\d.]+)/);
            if (!mm2) return 0;
            const nv0 = parseFloat(mm2[1]);
            const nv = /FL/.test(st) ? nv0 * 100 : nv0;   // FL180 → 18,000 ft MSL
            if (/AGL/.test(st)) return nv;
            const ge = groundElevRef.current != null ? groundElevRef.current : 1500;
            return nv - ge;
          };
          const typeMap = { R: "RESTRICTED", P: "PROHIBITED", M: "MOA", W: "WARNING", A: "ALERT" };
          const sevOrder = { P: 0, R: 1, W: 2, M: 3, A: 4 };
          // Normalize both schemas (FAA AIS: TYPE_CODE/LOWER_DESC · TAMU: TYPE/LOWER_ALT) to one shape
          const normSua = (feat) => {
            const a = feat.attributes;
            if (a.TYPE_CODE !== undefined) {
              const tc = String(a.TYPE_CODE || "").toUpperCase();
              const T = tc.indexOf("MOA") !== -1 ? "M"
                : (tc === "P" || tc.indexOf("PROHIB") !== -1) ? "P"
                : (tc === "R" || tc.indexOf("RESTRICT") !== -1) ? "R"
                : (tc === "A" || tc.indexOf("ALERT") !== -1) ? "A"
                : "W";   // Warning + anything unrecognized → advisory caution, never silently dropped
              const lowerStr = a.LOWER_DESC || ((a.LOWER_VAL || "") + " " + (a.LOWER_UOM || "") + " " + (a.LOWER_CODE || "")).trim() || "SFC";
              const upperStr = a.UPPER_DESC || ((a.UPPER_VAL || "") + " " + (a.UPPER_UOM || "")).trim() || "UNL";
              return { TYPE: T, IDENT: (a.NAME || "SUA"), LOWER_ALT: lowerStr, UPPER_ALT: upperStr, EFF_TIMES: a.TIMESOFUSE, CON_AGCY: a.CONT_AGENT };
            }
            return { TYPE: a.TYPE, IDENT: (a.SUAS_IDENT || a.NAME || "SUA"), LOWER_ALT: a.LOWER_ALT, UPPER_ALT: a.UPPER_ALT, EFF_TIMES: a.EFF_TIMES, CON_AGCY: a.CON_AGCY };
          };
          const relevantSua = (sua.features || []).map(normSua)
            .filter(nf => floorAGL(nf.LOWER_ALT) <= FLOOR_RELEVANT_AGL)
            .sort((a, b) => (sevOrder[a.TYPE] ?? 5) - (sevOrder[b.TYPE] ?? 5));
          const prohibitiveSua = relevantSua.filter(f => f.TYPE === "P" || f.TYPE === "R");
          const advisorySua   = relevantSua.filter(f => f.TYPE !== "P" && f.TYPE !== "R");
          const advNote = advisorySua.length > 0
            ? (advisorySua[0].IDENT.trim()
               + " " + (typeMap[advisorySua[0].TYPE] || "SUA")
               + " \u00b7 floor " + (advisorySua[0].LOWER_ALT || "SFC") + " \u2014 verify active status")
            : null;
          const suaCard = (f) => {
            const suaType = f.TYPE || "R";
            setLaancData({
              source: "sua",
              suaSrc: sua.__src || "TAMU-NASR",
              facility: f.IDENT.trim(),
              ceiling: suaType === "M" ? null : 0,
              auth: suaType === "M" ? "MOA" : "RESTRICTED",
              lower: f.LOWER_ALT || "SFC",
              upper: f.UPPER_ALT || "UNL",
              times: f.EFF_TIMES || null,
              agency: f.CON_AGCY || null,
              suaType,
              suaLabel: typeMap[suaType] || "SPECIAL USE",
              partial: failedCount, partialNames: failedNames, laancDown: laancDown
            });
            setLaancStatus("loaded");
          };

          // Layer 1 — National Security UAS Restriction: hard stop, outranks everything (incl. LAANC grids)
          if (nsr.features.length > 0) {
            const f = nsr.features[0].attributes;
            setLaancData({
              source: "nsr",
              facility: f.NAME || f.Base || f.BASE || f.FACILITY || f.Facility || "SECURITY RESTRICTION",
              ceiling: 0,
              auth: "PROHIBITED",
              lower: f.LOWER_ALT || "SFC", upper: f.UPPER_ALT || "400 AGL",
              times: "24/7", agency: "FAA/DOD", suaType: "P",
              partial: failedCount, partialNames: failedNames, laancDown: laancDown
            });
            setLaancStatus("loaded");
            return;
          }
          // Layer 2 — Prohibited / Restricted SUA with a reachable floor: outranks a LAANC grid
          if (prohibitiveSua.length > 0) { suaCard(prohibitiveSua[0]); return; }
          // Layer 3 — LAANC facility grid: controlling ceiling is the MINIMUM across overlapping grids
          if (laanc.features.length > 0) {
            const grids = laanc.features.map(ft => {
              const a = ft.attributes;
              return {
                name: a.APT1_NAME || a.APTID || a.FACILITY_NAME || "UNKNOWN",
                ceiling: a.APT1_CEILING != null ? parseInt(a.APT1_CEILING) : (a.CEILING != null ? parseInt(a.CEILING) : null),
                auth: a.APT1_LAANC || a.AUTHORIZATION || "LAANC"
              };
            }).sort((x, y) => ((x.ceiling == null ? 9999 : x.ceiling) - (y.ceiling == null ? 9999 : y.ceiling)));
            const g0 = grids[0];
            setLaancData({
              source: "laanc",
              facility: g0.name,
              ceiling: g0.ceiling,
              auth: g0.auth,
              lower: null, upper: null, times: null, agency: null, suaType: null,
              suaNote: advNote,
              partial: failedCount, partialNames: failedNames, laancDown: laancDown
            });
            setLaancStatus("loaded");
            return;
          }
          // Layer 4 — advisory SUA alone (MOA / Warning / Alert with a reachable floor)
          if (advisorySua.length > 0) { suaCard(advisorySua[0]); return; }
          // Layer 5 — Class airspace (no LAANC grid, but still controlled)
          if (cls.features && cls.features.length > 0) {
            const f = cls.features[0].attributes;
            const airClass = (f.CLASS || "?").trim();
            if (airClass !== "A") {
              const nearestApt = AIRPORT_DB
                .map(a => ({ ...a, dist: Math.sqrt(Math.pow((a.lat-lat)*60,2)+Math.pow((a.lon-lon)*60*Math.cos(lat*Math.PI/180),2)) }))
                .sort((a,b) => a.dist-b.dist)[0];
              const aptLabel = nearestApt && nearestApt.dist < 30
                ? nearestApt.id + " \u00b7 " + nearestApt.n.split(" ").slice(0,3).join(" ")
                : "CLASS " + airClass;
              const derivedClass = nearestApt && nearestApt.dist < 5 ? nearestApt.cls : airClass;
              setLaancData({
                source: "class",
                facility: aptLabel,
                ceiling: null,
                auth: "CONTROLLED",
                lower: null, upper: null, times: null, agency: null, suaType: null,
                derivedClass,
                eClear: derivedClass === "E",
                partial: failedCount, partialNames: failedNames, laancDown: laancDown
              });
              setLaancStatus("loaded");
              return;
            }
          }
          // Layer 5.5 — nearest-airport B/C sanity check before calling it Class G
          const nearestCheck = AIRPORT_DB
            .map(a => ({ ...a, dist: Math.sqrt(Math.pow((a.lat-lat)*60,2)+Math.pow((a.lon-lon)*60*Math.cos(lat*Math.PI/180),2)) }))
            .sort((a,b) => a.dist-b.dist)[0];
          if (nearestCheck && nearestCheck.dist < 5 && (nearestCheck.cls === "B" || nearestCheck.cls === "C")) {
            setLaancData({
              source: "class",
              facility: nearestCheck.id + " \u00b7 " + nearestCheck.n.split(" ").slice(0,3).join(" "),
              ceiling: null,
              auth: "CONTROLLED",
              lower: null, upper: null, times: null, agency: null, suaType: null,
              derivedClass: nearestCheck.cls,
              eClear: false,
              partial: failedCount, partialNames: failedNames, laancDown: laancDown
            });
            setLaancStatus("loaded");
            return;
          }
          // Layer 6 — clear: a green Class G verdict requires EVERY source to have answered
          if (failedCount > 0) { setLaancData(null); setLaancStatus("incomplete"); return; }
          setLaancData(null);
          setLaancStatus("uncontrolled");
        });
    }, () => setPosErr(true), { enableHighAccuracy: true, maximumAge: 5000 });
    return () => navigator.geolocation.clearWatch(watchId);
  }, []);

  // ── Audio alert helpers ──────────────────────────────────────────────────
  const audioCtxRef = React.useRef(null);
  const getAudioCtx = () => {
    if (!audioCtxRef.current) {

    if (audioCtxRef.current.state === "suspended") { try { audioCtxRef.current.resume(); } catch (e) {} }

  };

  // until the first screen touch — alerts must NOT be marked as delivered before then.
  const audioReady = () => {
    try { return getAudioCtx().state === "running"; } catch (e) { return false; }
  };

  // iOS unlock — WebAudio must be created/resumed inside a user gesture or alert tones stay silent.
  useEffect(() => {
    const prime = () => { try { getAudioCtx(); } catch (e) {} };
    window.addEventListener("touchstart", prime, { once: true });
    window.addEventListener("pointerdown", prime, { once: true });
    return () => { window.removeEventListener("touchstart", prime); window.removeEventListener("pointerdown", prime); };
  }, []);

  const playConflictTone = () => {
    try {
      const ctx = getAudioCtx();
      [0, 0.2].forEach(function(offset) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = "sine"; osc.frequency.value = 880;
        const t = ctx.currentTime + offset;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.4, t + 0.02);
        gain.gain.linearRampToValueAtTime(0, t + 0.13);
        osc.start(t); osc.stop(t + 0.15);
      });
    } catch(e) {}
  };

  const playInboundTone = () => {
    try {
      const ctx = getAudioCtx();
      [[0, 1200], [0.15, 1000], [0.30, 800]].forEach(function(pair) {
        const offset = pair[0], freq = pair[1];
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = "square"; osc.frequency.value = freq;
        const t = ctx.currentTime + offset;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.35, t + 0.01);
        gain.gain.linearRampToValueAtTime(0, t + 0.12);
        osc.start(t); osc.stop(t + 0.15);
      });
    } catch(e) {}
  };

  // ── Inbound detection — aircraft heading within 60° of bearing TO operator
  const isInbound = (ac) => {
    if (!ac.hdg || !ac.brg) return false;
    const bearingFromAc = (ac.brg + 180) % 360;
    const diff = Math.abs(((ac.hdg - bearingFromAc) + 540) % 360 - 180);
    return diff < 60 && ac.spd > 30;
  };

  // ── ADS-B refs ───────────────────────────────────────────────────────────
  const prevConflictIds = useRef(new Set());   // call signs already given their entry advisory
  const adsbBase        = useRef([]);          // last real fix per aircraft (lat/lon/gs/track/t0) for interpolation
  const fetchSeq        = useRef(0);           // drops out-of-order poll responses (slow cell fetch overtaken by a newer one)
  const lastAdsbAt      = useRef(0);           // GPS movement restarts this effect — dedupe the immediate refires

  // Dead-reckon an aircraft forward from its last real fix, then recompute range/bearing to the operator.
  const projectAircraft = (b, nowMs) => {
    const elapsedHr = Math.max(0, (nowMs - b.t0) / 3600000);
    const dNm = (b.gs || 0) * elapsedHr;                       // nm travelled since last fix
    const th  = (b.track || 0) * Math.PI / 180;
    const lat = b.lat + (dNm * Math.cos(th)) / 60;
    const lon = b.lon + (dNm * Math.sin(th)) / (60 * Math.cos(b.lat * Math.PI / 180));
    const brg = bearingTo(posCoords.lat, posCoords.lon, lat, lon);
    const ge = groundElevRef.current;
    return { call:b.call, tail:b.tail, type:b.type, alt:b.alt, spd:b.gs, hdg:b.track,
             agl: (ge != null ? Math.round(b.alt - ge) : null),
             dist: distNm(posCoords.lat, posCoords.lon, lat, lon),
             brg: Math.round(brg), dir: dirLabel(brg) };
  };

  // ── ADS-B fetch (airplanes.live, free, no key · polled every 3s) ──────────
  useEffect(() => {
    if (!posCoords) return;
    const fetchADSB = () => {
      if (Date.now() - lastAdsbAt.current < 2500) return;   // floor the real-world rate regardless of effect churn
      lastAdsbAt.current = Date.now();
      const seq = ++fetchSeq.current;
      fetch("https://api.airplanes.live/v2/point/" + posCoords.lat.toFixed(4) + "/" + posCoords.lon.toFixed(4) + "/3")
        .then(r => r.json()).then(data => {
          if (seq !== fetchSeq.current) return;   // a newer poll already landed — discard this one
          const now = Date.now();
          const base = (data.ac || [])
            .filter(a => a.alt_baro && a.alt_baro !== "ground" && a.lat && a.lon &&
              ((groundElevRef.current != null ? (a.alt_baro - groundElevRef.current) : a.alt_baro) <= altMax))
            .map(a => ({
              call: (a.flight || a.hex || "UNKN").trim(),
              tail: (a.r || "").trim(),
              type: (a.t || "").trim(),
              alt: Math.round(a.alt_baro),
              gs: Math.round(a.gs || 0),
              track: Math.round(a.track || 0),
              lat: a.lat, lon: a.lon, t0: now
            }));
          adsbBase.current = base;
          const ac = base.map(b => projectAircraft(b, now)).sort((a,b) => a.alt - b.alt);
          setAdsbTraffic(ac);
          setAdsbLoading(false);
          // ── Conflict alerting (on the real fix, not the interpolated position) ──
          const conflictAc = ac.filter(a => effAlt(a) <= CONFLICT_AGL);
          const currentIds = new Set(conflictAc.map(a => a.call));
          const newConflicts = conflictAc.filter(a => !prevConflictIds.current.has(a.call));
          const converging = conflictAc.some(a => isInbound(a));
          if (audioReady()) {
            // Converging conflict traffic re-tones on EVERY position update (3s poll)
            // until it turns away or leaves the conflict band. New non-converging
            // traffic gets a single entry advisory.
            if (converging) playInboundTone();
            else if (newConflicts.length > 0) playConflictTone();
            prevConflictIds.current = currentIds;
          } else {
            // Audio still locked (no screen touch yet) — do NOT burn the entry
            // advisory. Keep only already-alerted ids so unalerted traffic
            // retries on the next poll after the first tap unlocks audio.
            prevConflictIds.current = new Set(
              conflictAc.filter(a => prevConflictIds.current.has(a.call)).map(a => a.call)
            );
          }
        }).catch(() => setAdsbLoading(false));
    };
    fetchADSB();
    const interval = setInterval(fetchADSB, 3000);
    return () => clearInterval(interval);
  }, [posCoords, altMax]);

  // ── ADS-B interpolation — glide blips between polls (500ms, no extra API load) ──
  useEffect(() => {
    if (!posCoords) return;
    const tick = setInterval(() => {
      const base = adsbBase.current;
      if (!base || !base.length) return;
      setAdsbTraffic(base.map(b => projectAircraft(b, Date.now())).sort((a,b) => a.alt - b.alt));
    }, 500);
    return () => clearInterval(tick);
  }, [posCoords]);

  // ── Launch-site ground elevation (Open-Meteo, free, CORS) — turns traffic MSL into AGL ──
  useEffect(() => {
    if (!posCoords) return;
    const g = elevGateRef.current;
    const moved = !g || Math.abs(posCoords.lat - g.lat) > 0.005 || Math.abs(posCoords.lon - g.lon) > 0.005;   // ~0.3nm
    if (g && !moved && Date.now() - g.t < 300000) return;   // terrain doesn't change — 1 attempt / 5 min max
    // Terrain doesn't change — serve from cache first (survives Open-Meteo outages entirely)
    try {
      const cch = JSON.parse(localStorage.getItem("fh_elev_cache") || "null");
      if (cch && Math.abs(cch.lat - posCoords.lat) <= 0.005 && Math.abs(cch.lon - posCoords.lon) <= 0.005 && typeof cch.ft === "number") {
        setGroundElevFt(cch.ft);
        return;
      }
    } catch (eC) {}
    elevGateRef.current = { lat: posCoords.lat, lon: posCoords.lon, t: Date.now() };
    let alive = true;
    const TT6 = (p) => Promise.race([p, new Promise((_, rj) => setTimeout(() => rj(new Error("timeout")), 6000))]);
    const prx = (u) => "https://firehawk-wx.usafsentinel-45e.workers.dev/?url=" + encodeURIComponent(u);
    const omUrl2 = "https://api.open-meteo.com/v1/elevation?latitude=" + posCoords.lat.toFixed(4) + "&longitude=" + posCoords.lon.toFixed(4);
    const usUrl = "https://epqs.nationalmap.gov/v1/json?x=" + posCoords.lon.toFixed(5) + "&y=" + posCoords.lat.toFixed(5) + "&units=Feet&wkid=4326&includeDate=false";
    const grabOM = (u) => TT6(fetch(u)).then(r => { if (!r.ok) throw 0; return r.json(); }).then(d => {
      const m = Array.isArray(d.elevation) ? d.elevation[0] : d.elevation;
      if (typeof m !== "number" || !isFinite(m)) throw 0;
      return Math.round(m * 3.28084);
    });
    const grabUS = (u) => TT6(fetch(u)).then(r => { if (!r.ok) throw 0; return r.json(); }).then(d => {
      const v = parseFloat(d.value);
      if (!isFinite(v) || v < -1000) throw 0;
      return Math.round(v);
    });
    grabOM(omUrl2).catch(() => grabOM(prx(omUrl2)))
      .catch(() => grabUS(usUrl)).catch(() => grabUS(prx(usUrl)))
      .then(ft => {
        if (!alive) return;
        setGroundElevFt(ft);
        try { localStorage.setItem("fh_elev_cache", JSON.stringify({ lat: posCoords.lat, lon: posCoords.lon, ft: ft })); } catch (eS) {}
      })
      .catch(() => {});   // all four legs down → honest MSL-only display
    return () => { alive = false; };
  }, [posCoords]);

  // ── TFR scan (tfr.faa.gov via firehawk-wx proxy · TX list + per-NOTAM shape XML) ──
  const [tfrs, setTfrs] = useState([]);
  const [tfrStatus, setTfrStatus] = useState("checking");   // checking | ok | unavailable
  const TFR_SCAN_NM = 5;
  const tfrSeq = useRef(0);
  const tfrGate = useRef(null);   // last run {lat,lon,t} — GPS movement must not multiply worker/FAA traffic
  const tfrTypeName = useRef(null);   // WFS layer name, self-discovered from GetCapabilities once per session
  const [tfrFar, setTfrFar] = useState(null);   // nearest TFR beyond scan range — proves the pipeline sees SOMETHING
  const tfrRunSeq = useRef(0);   // increments only when a real fetch STARTS (not on every GPS-triggered effect firing)
  const tfrCandidates = useRef(null); // ranked WFS layer candidates from capabilities
  useEffect(() => {
    if (!posCoords) return;
    const prox = (u) => "https://firehawk-wx.usafsentinel-45e.workers.dev/?url=" + encodeURIComponent(u);
    const pc = (s) => { const m = String(s).trim().match(/^([\d.]+)\s*([NSEW])$/i); return m ? (/[SW]/i.test(m[2]) ? -parseFloat(m[1]) : parseFloat(m[1])) : null; };
    const run = async () => {
      const g = tfrGate.current;
      const moved = !g || Math.abs(posCoords.lat - g.lat) > 0.02 || Math.abs(posCoords.lon - g.lon) > 0.02;   // ~1.2nm
      if (g && !moved && Date.now() - g.t < 120000) return;
      tfrGate.current = { lat: posCoords.lat, lon: posCoords.lon, t: Date.now() };
      // Sequence number assigned HERE — only real fetches count, so GPS jitter during a
      // slow multi-layer fetch can no longer make a just-finished result look "stale" and
      // get silently discarded (the bug that caused a permanent "CHECKING\u2026" freeze).
      const seq = ++tfrRunSeq.current;
