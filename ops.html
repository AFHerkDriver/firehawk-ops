  // ── Firestore REST (lifted verbatim from index.html — proven encoding) ──────
  function fromFSVal(v) {
    if (!v) return null;
    if ("stringValue" in v) return v.stringValue;
    if ("integerValue" in v) return parseInt(v.integerValue);
    if ("doubleValue" in v) return v.doubleValue;
    if ("booleanValue" in v) return v.booleanValue;
    if ("nullValue" in v) return null;
    if ("mapValue" in v) return fromFSFields(v.mapValue.fields || {});
    if ("arrayValue" in v) return (v.arrayValue.values || []).map(fromFSVal);
    return null;
  }
  function fromFSFields(fields) {
    if (!fields) return null;
    const out = {};
    for (const k in fields) out[k] = fromFSVal(fields[k]);
    return out;
  }
  function toFSVal(v) {
    if (v === null || v === undefined) return { nullValue: null };
    if (typeof v === "boolean") return { booleanValue: v };
    if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
    if (typeof v === "string") return { stringValue: v };
    if (Array.isArray(v)) return { arrayValue: { values: v.map(toFSVal) } };
    if (typeof v === "object") {
      const fields = {};
      for (const k in v) fields[k] = toFSVal(v[k]);
      return { mapValue: { fields } };
    }
    return { stringValue: String(v) };
  }
  function toFSFields(obj) {
    const fields = {};
    for (const k in obj) fields[k] = toFSVal(obj[k]);
    return fields;
  }
  function fsErr(t) {
    try { const j = JSON.parse(t); return (j.error && j.error.message) || (t || "").slice(0, 140); }
    catch (e) { return (t || "").slice(0, 140); }
  }
  async function fsGet(col, doc) {
    try {
      const url = FS_BASE + "/" + col + "/" + doc + "?key=" + FS_API_KEY;
      const res = await fetch(url, { method: "GET", headers: { "Accept": "application/json" } });
      if (!res.ok) return null;
      const data = await res.json();
      return data.fields ? fromFSFields(data.fields) : null;
    } catch (e) { return null; }
  }
  async function fsSet(col, doc, obj) {
    try {
      const url = FS_BASE + "/" + col + "/" + doc + "?key=" + FS_API_KEY;
      const body = JSON.stringify({ fields: toFSFields(obj) });
      const res = await fetch(url, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body
      });
      if (!res.ok) {
        const t = await res.text();
        console.error("fsSet FAIL", res.status, t.slice(0, 300));
        return { ok: false, status: res.status, detail: fsErr(t) };
      }
      return { ok: true, status: res.status, detail: "" };
    } catch (e) {
      console.error("fsSet ERROR", e.message);
      return { ok: false, status: 0, detail: e.message || "network error" };
    }
  }
  // Resilient listener — fires on FIRST poll even on error/null so sync resolves.
  function fsListen(col, doc, callback) {
    let active = true, lastSig = "", firstPoll = true;
    const poll = async () => {
      if (!active) return;
      let data = null;
      try { data = await fsGet(col, doc); } catch (e) { data = null; }
      const sig = JSON.stringify(data);
      if (firstPoll || sig !== lastSig) {
        firstPoll = false; lastSig = sig;
        try { callback(data); } catch (e) {}
      }
      if (active) setTimeout(poll, 5000);
    };
    poll();
    return () => { active = false; };
  }
  // Path helpers for schedule months (stored as a JSON string under daysJson to
  // avoid Firestore numeric-field-name issues — same pattern as index.html).
  async function fsGetPath(docPath) {
    const [c, d] = docPath.split("/");
    const data = await fsGet(c, d);
    if (data && data.daysJson) { try { return { days: JSON.parse(data.daysJson) }; } catch (e) { return { days: {} }; } }
    if (data && data.days) return data;
    return data;
  }
  async function fsSetPath(docPath, obj) {
    const [c, d] = docPath.split("/");
    if (obj && obj.days !== undefined) return fsSet(c, d, { daysJson: JSON.stringify(obj.days) });
    return fsSet(c, d, obj);
  }

  // ── Crew identity / units (from index.html) ─────────────────────────────────
  const LEAD_PILOT_ID = 1;          // Sanchez = UAV121
  const UNIT_LEAD     = "UAV121";
  const UNIT_PRIMARY  = "UAV124";   // all other RPICs
  function unitFor(rpicId) {
    if (rpicId == null) return null;
    return rpicId === LEAD_PILOT_ID ? UNIT_LEAD : UNIT_PRIMARY;
  }
  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const exp = new Date(dateStr); const today = new Date(); today.setHours(0, 0, 0, 0);
    return Math.ceil((exp - today) / 86400000);
  }
  function certStatus(dateStr) {
    const d = daysUntil(dateStr);
    if (d === null) return "none";
    if (d < 0) return "expired";
    if (d <= 30) return "soon";
    return "current";
  }

  // ── Dates / shifts (reproduced exactly from index.html) ─────────────────────
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  function todayShift() {
    const s = new Date(Date.now() - 7 * 3600000);   // shift flips at 0700; -7h keeps the prior shift until then
    const d = Math.floor((Date.UTC(s.getFullYear(), s.getMonth(), s.getDate()) - ANCHOR_DATE) / 86400000);
    return SHIFT_PATTERN[(d % 6 + 6) % 6];
  }
  const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const ANCHOR_DATE = Date.UTC(2026, 0, 1);
  const SHIFT_PATTERN = ["A","A","B","B","C","C"];
  const SHIFT_COLORS = {
    A: { color:"#FF3B30", bg:"rgba(255,59,48,0.15)", border:"rgba(255,59,48,0.35)" },
    B: { color:"#4A90D9", bg:"rgba(74,144,217,0.15)", border:"rgba(74,144,217,0.35)" },
    C: { color:"#34C759", bg:"rgba(52,199,89,0.15)", border:"rgba(52,199,89,0.35)" }
  };
  function getShift(year, month, day) {
    const utcDay = Date.UTC(year, month, day);
    const diff = Math.floor((utcDay - ANCHOR_DATE) / 86400000);
    return SHIFT_PATTERN[(diff % 6 + 6) % 6];
  }
  function monthKey(year, month) { return year + "_" + month; }
  function daysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }
  function firstWeekday(year, month) { return new Date(year, month, 1).getDay(); }

  // US Federal Holidays — computed per year (month keys are 0-indexed, matching vMonth)
  function getFederalHolidays(year) {
    const nthWeekday = (n, weekday, month) => {
      let count = 0;
      for (let d = 1; d <= 31; d++) {
        const date = new Date(year, month, d);
        if (date.getMonth() !== month) break;
        if (date.getDay() === weekday) { count++; if (count === n) return d; }
      }
      return null;
    };
    const lastWeekday = (weekday, month) => {
      let last = null;
      for (let d = 1; d <= 31; d++) {
        const date = new Date(year, month, d);
        if (date.getMonth() !== month) break;
        if (date.getDay() === weekday) last = d;
      }
      return last;
    };
    return {
      ["0-1"]: "New Year's Day",
      ["0-" + nthWeekday(3, 1, 0)]: "MLK Jr. Day",
      ["1-" + nthWeekday(3, 1, 1)]: "Presidents' Day",
      ["4-" + lastWeekday(1, 4)]: "Memorial Day",
      ["5-19"]: "Juneteenth",
      ["6-4"]: "Independence Day",
      ["8-" + nthWeekday(1, 1, 8)]: "Labor Day",
      ["9-" + nthWeekday(2, 1, 9)]: "Columbus Day",
      ["10-11"]: "Veterans Day",
      ["10-" + nthWeekday(4, 4, 10)]: "Thanksgiving",
      ["11-25"]: "Christmas Day"
    };
  }
  function getHoliday(year, month, day) { return getFederalHolidays(year)[month + "-" + day] || null; }

  const FALLBACK_ROSTER = [

  const certColor = (s) => { const d = certDays(s); if (d == null) return C.amber; if (d < 30) return C.red; if (d < 90) return C.amber; return C.green; };
  const fmtCert   = (s) => { try { return new Date(s).toLocaleDateString("en-US", { month:"short", year:"numeric", timeZone:"UTC" }); } catch (e) { return s; } };

  // ── Shared crew write (preserves every field — no field-drop) ────────────────
  function writeCrewDoc(crewArr) {
    return fsSet(DEV_COL, "crew", {
      members: crewArr.map(c => ({

  // Normalize a raw member (from Firebase or the seed roster) into a full crew record.
  // Missing tier/pin fall back to the embedded roster so auth can't break mid-migration;
  // an explicit null from Firebase (e.g. a cleared PIN) is respected.
  function normalizeMember(src) {
    const fb = FALLBACK_ROSTER.find(x => x.id === src.id) || {};
    return {
      id: src.id,
      name: src.name || fb.name || ("Pilot " + src.id),

      part107: (src.part107 !== undefined ? src.part107 : (fb.part107 !== undefined ? fb.part107 : null)),
      reserve: !!src.reserve,
      archived: !!src.archived,
      availMonths: (src.availMonths && typeof src.availMonths === "object") ? src.availMonths : {}

  function emptyDay() { return { rpic:null, vo:null, vo2:null, extra:[], oos:[], confirmed:false }; }

  // Two-unit day model — the stored day keeps the live shape {rpic, vo, vo2, extra}
  // and units are DERIVED: Sanchez (anywhere on the crew) flies UAV121; any other
  // RPIC flies UAV124. decodeDay → explicit editor view; encodeDay → stored shape.
  function decodeDay(day, crew) {
    const N = (x) => x == null ? null : parseInt(x);
    const extra = (day.extra || []).map(N).filter(x => x != null);
    const ids = [N(day.rpic), N(day.vo), N(day.vo2)].concat(extra).filter(x => x != null);
    const sanchezPresent = ids.indexOf(LEAD_PILOT_ID) !== -1;
    const isRPIC = (id) => { const m = crew.find(c => c.id === id); return !!(m && m.role === "RPIC"); };
    let u124rpic = (N(day.rpic) != null && N(day.rpic) !== LEAD_PILOT_ID) ? N(day.rpic) : null;
    if (u124rpic == null) { const f = extra.find(id => id !== LEAD_PILOT_ID && isRPIC(id)); if (f != null) u124rpic = f; }
    const both = sanchezPresent && u124rpic != null;
    const u121vo = sanchezPresent ? (both ? N(day.vo2) : (u124rpic != null ? null : N(day.vo))) : null;
    const u124vo = u124rpic != null ? N(day.vo) : null;
    const u124extra = extra.filter(id => id !== LEAD_PILOT_ID && id !== u124rpic);
    return { u121: { active: sanchezPresent, vo: u121vo }, u124: { rpic: u124rpic, vo: u124vo, extra: u124extra } };
  }
  function encodeDay(u121, u124) {
    let rpic = null, vo = null, vo2 = null, extra = [];
    if (u124.rpic != null) {
      rpic = u124.rpic;
      vo = u124.vo != null ? u124.vo : null;
      extra = (u124.extra || []).slice();
      if (u121.active) { extra = [LEAD_PILOT_ID].concat(extra); vo2 = u121.vo != null ? u121.vo : null; }
    } else if (u121.active) {
      rpic = LEAD_PILOT_ID;
      vo = u121.vo != null ? u121.vo : null;
    }
    return { rpic: rpic, vo: vo, vo2: vo2, extra: extra };
  }

  // ════════════════════════════════════════════════════════════════════════════
  // AVAILABILITY VIEW  (increment 1 — staff calendar picker)
  // ════════════════════════════════════════════════════════════════════════════
  function AvailabilityView(props) {

    return h("div", { style: { background:C.panel, border:"1px solid "+C.border, borderRadius:12, padding:14 } },
      canEdit
        ? h("select", {

            style: { width:"100%", background:C.panel2, color:C.text, border:"1px solid "+C.border, borderRadius:8, padding:"9px 10px", fontSize:13, marginBottom:12 }
          }, crew.filter(isActive).map(c => h("option", { key:c.id, value:c.id }, c.name + " · " + c.role)))
        : isStaff
          ? h("div", { style:{ width:"100%", boxSizing:"border-box", background:C.panel2, border:"1px solid "+C.border, borderRadius:8, padding:"9px 10px", fontSize:13, color:C.text, marginBottom:12 } },
              "Your availability · ", h("b", null, me.name), h("span", { style:{ color:C.dim, fontWeight:400 } }, " · " + me.role))
          : h("div", { style:{ width:"100%", boxSizing:"border-box", background:C.panel2, border:"1px solid "+C.border, borderRadius:8, padding:"9px 10px", fontSize:13, color:C.dim, marginBottom:12, textAlign:"center" } },
              "Sign in to set your availability"),

      locked ? h("div", { style:{ textAlign:"center", fontSize:11, color:C.amber, letterSpacing:1, marginBottom:8 } },
        "🔒 LOCKED BY UAS MANAGER — READ ONLY") : null,

      h("div", { style:{ display:"grid", gridTemplateColumns:"repeat(7,minmax(0,1fr))", gap:6, marginBottom:6 } },
        DOW.map(d => h("div", { key:d, style:{ textAlign:"center", fontSize:10, color:C.dim, letterSpacing:1 } }, d))),
      h("div", { style:{ display:"grid", gridTemplateColumns:"repeat(7,minmax(0,1fr))", gap:6 } }, cells),

      h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:14 } },
        h("div", { style:{ fontSize:12, color:C.dim } },
          days.size === 0 ? "Not available this month" : days.size + (days.size === 1 ? " day available" : " days available"),
          dirty ? h("span", { style:{ color:C.accent } }, "  • Unsaved") : null),
        h("div", { style:{ display:"flex", gap:8 } },

  // ════════════════════════════════════════════════════════════════════════════
  // SCHEDULE VIEW  (increment 2 — manager grid + intra-day OOS + auto-save)
  // ════════════════════════════════════════════════════════════════════════════
  function ScheduleView(props) {
    const { crew, vYear, vMonth, flash, setLastErr, canEdit } = props;
    const [monthDays, setMonthDays] = useState({});
    const [loaded, setLoaded]       = useState(false);
    const [selDay, setSelDay]       = useState(null);
    const [saving, setSaving]       = useState(false);
    const [savedAt, setSavedAt]     = useState(0);
    const [proposal, setProposal]   = useState(null);   // increment 3: pending smart-assignment draft
    const [confirmReset, setConfirmReset] = useState(false);   // two-step guard for a full-month wipe
    const daysRef  = useRef(monthDays); daysRef.current = monthDays;
    const saveTimer = useRef(null);

    // Load this month's schedule once per month (manager is the single editor;
    // a one-time read + auto-save avoids a poll clobbering an in-progress edit).
    useEffect(() => {
      let alive = true; setLoaded(false); setProposal(null); setConfirmReset(false);
      fsGetPath(DEV_COL + "/schedule_" + vYear + "_" + vMonth).then(r => {
        if (!alive) return;
        setMonthDays((r && r.days) ? r.days : {});
        setLoaded(true);
      });
      return () => { alive = false; };
    }, [vYear, vMonth]);

    const scheduleSave = (daysObj) => {
      if (saveTimer.current) clearTimeout(saveTimer.current);
      setSaving(true);
      saveTimer.current = setTimeout(async () => {
        const res = await fsSetPath(DEV_COL + "/schedule_" + vYear + "_" + vMonth, { days: daysObj });
        setSaving(false);
        if (res.ok) { setSavedAt(Date.now()); setLastErr(""); }
        else { setLastErr("Schedule save failed (" + res.status + "): " + res.detail); }
      }, 600);
    };

    const editDay = (d, patch) => {
      const prev = daysRef.current;
      const cur = prev[d] || emptyDay();
      const nextDay = { ...cur, ...patch, lastEditedBy: "UAS Manager", lastEditedAt: new Date().toISOString() };
      const next = { ...prev, [d]: nextDay };
      setMonthDays(next);
      scheduleSave(next);
    };

    const sanchez   = crew.find(c => c.id === LEAD_PILOT_ID) || null;
    const activeCrew = crew.filter(isActive);
    const otherRPIC = activeCrew.filter(c => c.role === "RPIC" && c.id !== LEAD_PILOT_ID);
    const crewById = (id) => crew.find(c => c.id === id) || null;
    const initialsFor = (id) => { const m = crewById(id); return m ? m.initials : "—"; };
    const colorFor = (id) => { const m = crewById(id); return m ? m.color : C.dim; };
    const nameFor = (id) => { const m = crewById(id); return m ? m.name : "—"; };

    // Calendar grid
    const lead = firstWeekday(vYear, vMonth), dim = daysInMonth(vYear, vMonth);

    // ── Smart assignment (increment 3) ──────────────────────────────────────
    // One unit per open day, RPIC only, balanced across eligible pilots.
    const certValid = (p) => { const dl = daysUntil(p); return dl !== null && dl >= 0; };
    const availOn = (id, dnum) => { const m = crewById(id); const rec = m && m.availMonths && m.availMonths[monthKey(vYear, vMonth)]; return !!(rec && Array.isArray(rec.days) && rec.days.indexOf(dnum) !== -1); };
    const dayOccupied = (dd) => { if (!dd) return false; const du = decodeDay(dd, crew); return du.u121.active || du.u124.rpic != null; };
    const isOpen = (dnum) => { const dd = monthDays[dnum]; return !dayOccupied(dd) && !(dd && dd.confirmed); };

    const proposeMonth = () => {
      const counts = {}; crew.forEach(c => counts[c.id] = 0);
      for (let d = 1; d <= dim; d++) {                 // seed balance from duty already on the board
        const du = monthDays[d] ? decodeDay(monthDays[d], crew) : null;
        if (du && du.u121.active) counts[LEAD_PILOT_ID]++;
        if (du && du.u124.rpic != null) counts[du.u124.rpic] = (counts[du.u124.rpic] || 0) + 1;
      }
      const rpics = activeCrew.filter(c => c.role === "RPIC" && certValid(c.part107));
      const openDays = []; for (let d = 1; d <= dim; d++) if (isOpen(d)) openDays.push(d);
      const pilots = rpics.filter(c => openDays.some(d => availOn(c.id, d)));
      let coverable = 0; openDays.forEach(d => { if (pilots.some(c => availOn(c.id, d))) coverable++; });
      const existingTotal = Object.keys(counts).reduce((s, k) => s + counts[k], 0);
      const cap = pilots.length ? Math.ceil((existingTotal + coverable) / pilots.length) : 0;   // fair share → even totals
      const availCount = {}; pilots.forEach(c => { let n = 0; openDays.forEach(d => { if (availOn(c.id, d)) n++; }); availCount[c.id] = n; });

      const prop = {};
      let cur = null, run = 0;                          // pilot holding the current block, days into it
      openDays.forEach(d => {
        const eligAll = pilots.filter(c => availOn(c.id, d));
        if (!eligAll.length) { cur = null; run = 0; return; }         // nobody available → OOS, breaks the block
        const under = eligAll.filter(c => counts[c.id] < cap);
        const pool = under.length ? under : eligAll;                  // once everyone's at fair share, anyone available
        const keep = cur != null && pool.some(c => c.id === cur) && run < ROTATION_DAYS;
        if (!keep) {                                                  // hand off to the next pilot
          let cands = pool.slice();
          if (cur != null && run >= ROTATION_DAYS && cands.length > 1) cands = cands.filter(c => c.id !== cur);
          cands.sort((a, b) => (counts[a.id] - counts[b.id]) || (availCount[a.id] - availCount[b.id]) || (a.id - b.id));   // fewest days first, then scarcest availability
          cur = cands[0].id; run = 0;
        }

                h("select", { value:w.unit, onChange:e => editOOS(i, { unit:e.target.value }), style:{ background:C.bg, color:C.text, border:"1px solid "+C.border, borderRadius:6, padding:"6px 8px", fontSize:12 } },
                  h("option", { value:UNIT_LEAD }, UNIT_LEAD), h("option", { value:UNIT_PRIMARY }, UNIT_PRIMARY)),
                h("input", { type:"time", value:w.from, onChange:e => editOOS(i, { from:e.target.value }), style:timeInput() }),
                h("span", { style:{ color:C.dim, fontSize:12 } }, "→"),
                h("input", { type:"time", value:w.to, onChange:e => editOOS(i, { to:e.target.value }), style:timeInput() }),
                h("button", { onClick:() => removeOOS(i), style:{ marginLeft:"auto", background:"none", border:"none", color:C.red, fontSize:16 } }, "✕")),
              h("input", { type:"text", value:w.reason, placeholder:"Reason (training, appointment…)", onChange:e => editOOS(i, { reason:e.target.value }),
                style:{ width:"100%", background:C.bg, color:C.text, border:"1px solid "+C.border, borderRadius:6, padding:"7px 9px", fontSize:12 } })
            ))),

          // Finalized toggle
          h("div", { style:{ marginTop:12, borderTop:"1px solid "+C.border, paddingTop:12, display:"flex", justifyContent:"space-between", alignItems:"center" } },
            h("div", null,
              h("div", { style:{ fontSize:13, color:C.text } }, "Mark Day Finalized"),
              h("div", { style:{ fontSize:10, color:C.dim, marginTop:2 } }, "Shows a ✓ on the board for the chiefs")),
            h("button", { onClick:() => editDay(selDay, { confirmed: !day.confirmed }),
              style:{ width:54, height:30, borderRadius:15, border:"1px solid "+(day.confirmed?C.green:C.border), background: day.confirmed?"rgba(52,199,89,0.2)":C.panel2, color: day.confirmed?C.green:C.dim, fontSize:11 } },
              day.confirmed ? "ON" : "OFF")),

          h("div", { style:{ fontSize:10, color:C.dim, marginTop:14, textAlign:"center" } }, "Changes auto-save · no publish needed")
        )
      ) : h("div", {
        onClick: () => setSelDay(null),
        style: { position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:50, padding:16 }
      },
        h("div", {
          onClick: e => e.stopPropagation(),
          style: { width:"100%", maxWidth:420, maxHeight:"85vh", overflowY:"auto", background:C.panel, border:"1px solid "+C.border, borderRadius:16, padding:16, boxShadow:"0 12px 48px rgba(0,0,0,0.6)" }
        },
          h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 } },
            h("div", null,
              h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:24, letterSpacing:1, lineHeight:1 } },
                DOW[new Date(vYear, vMonth, selDay).getDay()] + " " + MONTHS[vMonth] + " " + selDay),
              h("div", { style:{ fontSize:11, color: SHIFT_COLORS[getShift(vYear,vMonth,selDay)].color, marginTop:3 } },
                "Shift " + getShift(vYear, vMonth, selDay) + (activeUnits.length ? " · " + activeUnits.join(" + ") : " · OOS"))),
            h("button", { onClick: () => setSelDay(null), style:{ background:"none", border:"none", color:C.dim, fontSize:22, lineHeight:1 } }, "✕")),
          crewRoster,
          (!activeUnits.length) ? h("div", { style:{ background:"rgba(255,59,48,0.10)", border:"1px solid rgba(255,59,48,0.4)", borderRadius:10, padding:"12px", marginBottom:8, fontSize:12.5, color:C.red, textAlign:"center", letterSpacing:1 } }, "OUT OF SERVICE — NO CREW ASSIGNED") : null,
          (day.oos && day.oos.length) ? h("div", { style:{ marginTop:4, borderTop:"1px solid "+C.border, paddingTop:10 } },
            h("div", { style:{ fontSize:10, color:C.dim, letterSpacing:1, marginBottom:6 } }, "OUT-OF-SERVICE WINDOWS"),
            day.oos.map((w, i) => h("div", { key:i, style:{ fontSize:11.5, color:C.text, marginBottom:3 } },
              w.unit + "  " + w.from + " → " + w.to + (w.reason ? "  ·  " + w.reason : "")))) : null,
          h("div", { style:{ marginTop:12, borderTop:"1px solid "+C.border, paddingTop:10, fontSize:11.5, color: day.confirmed ? C.green : C.dim } },
            day.confirmed ? "✓ Finalized" : "Not finalized"),
          h("div", { style:{ fontSize:10, color:C.dim, marginTop:12, textAlign:"center" } }, "Read-only · sign in as a manager to edit")
        )
      )) : null
    );
  }

  function AccessLogPanel() {
    const [entries, setEntries] = useState([]);
    const [loading, setLoading] = useState(true);
    useEffect(() => {
      fsGet(DEV_COL, "access_log").then(log => {
        setEntries((log && Array.isArray(log.entries)) ? log.entries : []);
        setLoading(false);
      }).catch(() => setLoading(false));
    }, []);
    return h("div", { style:{ background:"rgba(255,193,7,0.06)", border:"1px solid rgba(255,193,7,0.25)", borderRadius:12, padding:"12px 14px", marginTop:14, marginBottom:10 } },
      h("div", { style:{ fontSize:9, color:C.amber, letterSpacing:2, marginBottom:10 } }, "🔒 ACCESS LOG"),
      loading
        ? h("div", { style:{ fontSize:11, color:C.dim } }, "Loading…")
        : entries.length === 0
          ? h("div", { style:{ fontSize:11, color:C.dim } }, "No sign-ins recorded yet.")
          : entries.slice(0, 10).map((e, i) => h("div", { key:i,
              style:{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom:"1px solid rgba(255,255,255,0.04)", fontSize:11 } },
              h("span", { style:{ color:C.text } }, e.name,
                e.tier ? h("span", { style:{ fontSize:9, letterSpacing:1, color: e.tier === "staff" ? C.dim : C.accent, marginLeft:6 } }, e.tier === "staff" ? "STAFF" : "ADMIN") : null),
              h("span", { style:{ color:C.dim, fontSize:10 } },
                new Date(e.time).toLocaleString("en-US", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit", timeZone:"America/Chicago" }) + " CST"))));
  }

  function CrewMgmtView(props) {
    const { crew, saveCrew, flash, isOwner, myId } = props;
    const PALETTE = [
      "#7B1E17","#C0392B","#E74C3C","#FF7066",              // reds
      "#A84300","#D35400","#E67E22","#F39C12",              // oranges
      "#B7791F","#C8A84B","#F1C40F","#FDE38A",              // yellows / golds
      "#145A32","#27AE60","#2ECC71","#7BED9F",              // greens
      "#0E6655","#16A085","#1ABC9C","#00CEC9",              // teals / cyan
      "#1B4F72","#2980B9","#3498DB","#4A90D9","#74B9FF",    // blues
      "#4A235A","#7D3C98","#8E44AD","#9B59B6","#C39BD3",    // purples
      "#A32C6C","#E84393","#FD79A8",                        // pinks
      "#5D4037","#8B4513"                                   // brown
    ];
    const [showAdd, setShowAdd]           = useState(false);
    const [showArchived, setShowArchived] = useState(false);
    const [busy, setBusy]                 = useState(false);
    const [fName, setFName]   = useState("");
    const [fInit, setFInit]   = useState("");
    const [fColor, setFColor] = useState(PALETTE[0]);
    const [fRole, setFRole]   = useState("RPIC");
    const [certEdit, setCertEdit] = useState(null);   // pilot whose 107 is being edited
    const [certInput, setCertInput] = useState("");   // entered completion / issue date
    const [accessEdit, setAccessEdit] = useState(null); // owner-only: pilot whose PIN / tier is being edited
    const [tierDraft, setTierDraft]   = useState("staff");
    const [pinDraft, setPinDraft]     = useState("");

    const activeList   = crew.filter(c => !c.archived);
    const archivedList = crew.filter(c => c.archived);
    const usedColors   = activeList.map(c => c.color);                          // taken by active/reserve pilots
    const availColors  = PALETTE.filter(col => usedColors.indexOf(col) === -1);
    const swatchColors = availColors.length ? availColors : PALETTE;            // fallback if every color is taken
    const addYears = (s, n) => { try { const d = new Date(s + "T00:00:00Z"); d.setUTCFullYear(d.getUTCFullYear() + n); return d.toISOString().slice(0, 10); } catch (e) { return s; } };

    const doSave = async (updated, msg) => {
      setBusy(true);
      const res = await saveCrew(updated);
      setBusy(false);
      if (res && res.ok && msg) flash(msg);
      return res;
    };
    const setRole       = (c) => doSave(crew.map(x => x.id === c.id ? { ...x, role: x.role === "RPIC" ? "VO" : "RPIC" } : x));
    const archive       = (c) => doSave(crew.map(x => x.id === c.id ? { ...x, archived: true } : x), c.name + " archived");
    const unarchive     = (c) => doSave(crew.map(x => x.id === c.id ? { ...x, archived: false } : x), c.name + " restored");
    const addPilot = async () => {
      const name = fName.trim();
      if (!name) return;
      const init = (fInit.trim() || name.slice(0, 2)).toUpperCase().slice(0, 3);
      const member = { id: Date.now(), name, role: fRole, tier: "staff", pin: null, color: fColor, initials: init, part107: null, reserve: false, archived: false, availMonths: {} };
      const res = await doSave([...crew, member], "Added " + name);
      if (res && res.ok) { setShowAdd(false); setFName(""); setFInit(""); setFColor(PALETTE[0]); setFRole("RPIC"); }
    };
    const openCert = (c) => { setCertInput(""); setCertEdit(c); };
    const saveCert = async () => {
      if (!certInput || !certEdit) return;
      const res = await doSave(crew.map(x => x.id === certEdit.id ? { ...x, part107: addYears(certInput, 2) } : x), certEdit.name + " 107 updated");
      if (res && res.ok) { setCertEdit(null); setCertInput(""); }
    };
    const clearCert = async () => {
      if (!certEdit) return;
      const res = await doSave(crew.map(x => x.id === certEdit.id ? { ...x, part107: null } : x), certEdit.name + " 107 cleared");
      if (res && res.ok) { setCertEdit(null); setCertInput(""); }
    };
    const tierLabel = (t) => t === "owner" ? "Owner" : t === "admin" ? "Admin" : "Staff";
    const tierHint  = (t) => t === "owner" ? "Full control, including access and PINs." : t === "admin" ? "Edits schedule and crew — no access or PIN control." : "Own availability only — no editing.";
    const openAccess = (c) => { setTierDraft(c.tier || "staff"); setPinDraft(c.pin || ""); setAccessEdit(c); };
    const pinClash = () => { const p = pinDraft.trim(); if (!p || !accessEdit) return null; return crew.find(x => x.id !== accessEdit.id && x.pin && x.pin === p) || null; };
    const saveAccess = async () => {
      if (!accessEdit || pinClash()) return;
      const isSelf  = myId != null && accessEdit.id === myId;
      const newTier = isSelf ? accessEdit.tier : tierDraft;   // own tier is locked to prevent self-lockout
      const res = await doSave(crew.map(x => x.id === accessEdit.id ? { ...x, tier: newTier, pin: pinDraft.trim() || null } : x), accessEdit.name + " access updated");
      if (res && res.ok) { setAccessEdit(null); setPinDraft(""); }
    };

    const pillBtn = (on, hue) => { const col = hue || C.blue; return { fontSize:11, letterSpacing:1, padding:"4px 10px", borderRadius:7, border:"1px solid "+(on?col:C.border), background: on?(col+"24"):C.panel2, color: on?col:C.dim, cursor:"pointer" }; };
    const openAdd = () => { setFColor(availColors[0] || PALETTE[0]); setShowAdd(true); };

    const memberRow = (c) => h("div", { key:c.id, style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:10, padding:"10px 12px", marginBottom:8, opacity: c.archived ? 0.6 : 1 } },
      h("div", { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:8 } },
        h("span", { style:{ width:12, height:12, borderRadius:"50%", background:c.color, flexShrink:0 } }),
        h("span", { style:{ fontSize:14, color:C.text, fontWeight:500 } }, c.name),
        h("span", { style:{ fontSize:10, color:C.dim, letterSpacing:1 } }, c.initials),
        isOwner
          ? h("button", { onClick: () => openAccess(c), style:{ marginLeft:"auto", fontSize:9, letterSpacing:1, padding:"2px 7px", borderRadius:10, border:"1px solid "+C.border, background:C.panel2, color: c.tier === "staff" ? C.dim : C.accent, cursor:"pointer" } }, (c.tier === "staff" ? "STAFF" : "ADMIN") + " ▸")
          : h("span", { style:{ marginLeft:"auto", fontSize:9, letterSpacing:1, padding:"1px 6px", borderRadius:10, border:"1px solid "+C.border, color: c.tier === "staff" ? C.dim : C.accent } }, c.tier === "staff" ? "STAFF" : "ADMIN")),
      c.archived
        ? h("div", { style:{ display:"flex", alignItems:"center" } },
            h("span", { style:{ fontSize:11, color:C.dim } }, "Archived · history kept"),
            h("button", { onClick: () => unarchive(c), disabled:busy, style:{ marginLeft:"auto", fontSize:10, color:C.green, background:"none", border:"1px solid "+C.border, borderRadius:7, padding:"4px 8px", cursor:"pointer" } }, "Restore"))
        : h("div", { style:{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" } },
            h("button", { onClick: () => setRole(c), disabled:busy, style: pillBtn(c.role === "RPIC") }, c.role),
            h("button", { onClick: () => openCert(c), style: pillBtn(true, c.part107 ? certColor(c.part107) : (c.role === "RPIC" ? C.amber : C.dim)) }, c.part107 ? ((certDays(c.part107) < 0 ? "107 expired " : "107 exp ") + fmtCert(c.part107)) : "no 107"),
            h("button", { onClick: () => archive(c), disabled:busy, style:{ marginLeft:"auto", fontSize:10, color:C.red, background:"none", border:"1px solid "+C.border, borderRadius:7, padding:"4px 8px", cursor:"pointer" } }, "Archive")));

    const fieldLabel = (t) => h("div", { style:{ fontSize:10, color:C.dim, letterSpacing:1, marginBottom:5, marginTop:10 } }, t);
    const textInput = (val, set, ph, max) => h("input", { value:val, onChange: e => set(e.target.value), placeholder:ph, maxLength: max || null,
      style:{ width:"100%", boxSizing:"border-box", background:C.bg, color:C.text, border:"1px solid "+C.border, borderRadius:8, padding:"9px 11px", fontSize:13, colorScheme:"dark" } });

    const clash   = pinClash();
    const accSelf = accessEdit && myId != null && accessEdit.id === myId;
    return h("div", null,
      h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 } },
        h("div", { style:{ fontSize:11, color:C.dim, letterSpacing:1 } }, "CREW ROSTER · " + activeList.length + (activeList.length === 1 ? " PILOT" : " PILOTS")),
        h("button", { onClick: openAdd, style:{ fontSize:12, color:C.blue, background:"rgba(59,130,246,0.14)", border:"1px solid "+C.blue, borderRadius:8, padding:"6px 12px", cursor:"pointer" } }, "+ Add Pilot")),

      activeList.map(memberRow),

      archivedList.length
        ? h("div", { style:{ marginTop:8 } },
            h("button", { onClick: () => setShowArchived(s => !s), style:{ fontSize:11, color:C.dim, background:"none", border:"none", cursor:"pointer", padding:"4px 0", textDecoration:"underline" } },
              (showArchived ? "Hide" : "Show") + " archived (" + archivedList.length + ")"),
            showArchived ? h("div", { style:{ marginTop:8 } }, archivedList.map(memberRow)) : null)
        : null,

      showAdd ? h("div", { onClick: () => setShowAdd(false), style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:70, padding:16 } },
        h("div", { onClick: e => e.stopPropagation(), style:{ width:"100%", maxWidth:360, maxHeight:"88vh", overflowY:"auto", background:C.panel, border:"1px solid "+C.border, borderRadius:16, padding:18, boxShadow:"0 12px 48px rgba(0,0,0,0.6)" } },
          h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:22, letterSpacing:1, color:C.text, marginBottom:2 } }, "ADD PILOT"),
          h("div", { style:{ fontSize:11, color:C.dim } }, "New pilots start as Staff with no PIN. The owner sets PIN and tier from the badge on each row."),
          fieldLabel("Name"),
          textInput(fName, setFName, "Last name", 24),
          fieldLabel("Initials"),
          textInput(fInit, setFInit, fName.trim() ? fName.trim().slice(0, 2).toUpperCase() : "e.g. JD", 3),
          fieldLabel("Color"),
          h("div", { style:{ display:"flex", gap:8, flexWrap:"wrap" } }, swatchColors.map(col => h("button", { key:col, onClick: () => setFColor(col),
            style:{ width:26, height:26, borderRadius:"50%", background:col, border: fColor === col ? "2px solid "+C.text : "2px solid transparent", cursor:"pointer" } }))),
          fieldLabel("Role"),
          h("div", { style:{ display:"flex", gap:8 } },
            h("button", { onClick: () => setFRole("RPIC"), style: pillBtn(fRole === "RPIC") }, "RPIC"),
            h("button", { onClick: () => setFRole("VO"), style: pillBtn(fRole === "VO") }, "VO")),
          h("div", { style:{ display:"flex", gap:8, marginTop:18 } },
            h("button", { onClick: () => setShowAdd(false), style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background:C.panel2, border:"1px solid "+C.border, color:C.dim, cursor:"pointer" } }, "Cancel"),
            h("button", { onClick: addPilot, disabled: busy || !fName.trim(),
              style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background: fName.trim() ? "rgba(59,130,246,0.16)" : C.panel2, border:"1px solid "+(fName.trim()?C.blue:C.border), color: fName.trim()?C.blue:C.dim, cursor: fName.trim()?"pointer":"default" } }, busy ? "…" : "Add Pilot")))) : null,

      certEdit ? h("div", { onClick: () => setCertEdit(null), style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:70, padding:16 } },
        h("div", { onClick: e => e.stopPropagation(), style:{ width:"100%", maxWidth:340, background:C.panel, border:"1px solid "+C.border, borderRadius:16, padding:18, boxShadow:"0 12px 48px rgba(0,0,0,0.6)" } },
          h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:22, letterSpacing:1, color:C.text, marginBottom:2 } }, "PART 107 · " + certEdit.name),
          h("div", { style:{ fontSize:11, color: certEdit.part107 ? certColor(certEdit.part107) : C.dim } }, certEdit.part107 ? ((certDays(certEdit.part107) < 0 ? "Currently expired — was valid to " : "Current — valid to ") + fmtCert(certEdit.part107)) : "Not on file"),
          fieldLabel("Completion / issue date"),
          h("input", { type:"date", value:certInput, onChange: e => setCertInput(e.target.value),
            style:{ width:"100%", boxSizing:"border-box", background:C.bg, color:C.text, border:"1px solid "+C.border, borderRadius:8, padding:"9px 11px", fontSize:13, colorScheme:"dark", textAlign:"left", WebkitAppearance:"none", appearance:"none" } }),
          certInput ? h("div", { style:{ fontSize:12, color:C.green, marginTop:8 } }, "→ Expires " + fmtCert(addYears(certInput, 2)) + "  (24 months)") : null,
          h("div", { style:{ display:"flex", gap:8, marginTop:18 } },
            certEdit.part107 ? h("button", { onClick: clearCert, disabled:busy, style:{ borderRadius:8, padding:"9px 12px", fontSize:13, background:"none", border:"1px solid "+C.border, color:C.red, cursor:"pointer" } }, "Clear") : null,
            h("button", { onClick: () => setCertEdit(null), style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background:C.panel2, border:"1px solid "+C.border, color:C.dim, cursor:"pointer" } }, "Cancel"),
            h("button", { onClick: saveCert, disabled: busy || !certInput,
              style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background: certInput ? "rgba(59,130,246,0.16)" : C.panel2, border:"1px solid "+(certInput?C.blue:C.border), color: certInput?C.blue:C.dim, cursor: certInput?"pointer":"default" } }, busy ? "…" : "Save")))) : null,

      accessEdit ? h("div", { onClick: () => setAccessEdit(null), style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:70, padding:16 } },
        h("div", { onClick: e => e.stopPropagation(), style:{ width:"100%", maxWidth:340, background:C.panel, border:"1px solid "+C.border, borderRadius:16, padding:18, boxShadow:"0 12px 48px rgba(0,0,0,0.6)" } },
          h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:22, letterSpacing:1, color:C.text, marginBottom:2 } }, "ACCESS · " + accessEdit.name),
          h("div", { style:{ fontSize:11, color:C.dim } }, tierLabel(accessEdit.tier) + (accessEdit.pin ? " · PIN on file" : " · no PIN")),
          fieldLabel("Tier"),
          accSelf
            ? h("div", { style:{ fontSize:12, color:C.dim, padding:"4px 0" } }, "Owner (you) — your own tier can't be changed here.")
            : h("div", null,
                h("div", { style:{ display:"flex", gap:8 } },
                  h("button", { onClick: () => setTierDraft("owner"), style: pillBtn(tierDraft === "owner") }, "OWNER"),
                  h("button", { onClick: () => setTierDraft("admin"), style: pillBtn(tierDraft === "admin") }, "ADMIN"),
                  h("button", { onClick: () => setTierDraft("staff"), style: pillBtn(tierDraft === "staff") }, "STAFF")),
                h("div", { style:{ fontSize:11, color:C.dim, marginTop:6 } }, tierHint(tierDraft))),
          fieldLabel("Sign-in PIN"),
          h("input", { value:pinDraft, onChange: e => setPinDraft(e.target.value), inputMode:"numeric", placeholder:"Blank = no sign-in", maxLength:12,
            style:{ width:"100%", boxSizing:"border-box", background:C.bg, color:C.text, border:"1px solid "+(clash?C.red:C.border), borderRadius:8, padding:"9px 11px", fontSize:14, letterSpacing:3, colorScheme:"dark" } }),
          clash
            ? h("div", { style:{ fontSize:12, color:C.red, marginTop:6 } }, "PIN already used by " + clash.name)
            : h("div", { style:{ fontSize:11, color:C.dim, marginTop:6 } }, "Pilots sign in with this. Blank means no access."),
          h("div", { style:{ display:"flex", gap:8, marginTop:18 } },
            (accessEdit.pin || pinDraft) ? h("button", { onClick: () => setPinDraft(""), style:{ borderRadius:8, padding:"9px 12px", fontSize:13, background:"none", border:"1px solid "+C.border, color:C.red, cursor:"pointer" } }, "Clear") : null,
            h("button", { onClick: () => setAccessEdit(null), style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background:C.panel2, border:"1px solid "+C.border, color:C.dim, cursor:"pointer" } }, "Cancel"),
            h("button", { onClick: saveAccess, disabled: busy || !!clash,
              style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background: clash ? C.panel2 : "rgba(59,130,246,0.16)", border:"1px solid "+(clash?C.border:C.blue), color: clash?C.dim:C.blue, cursor: clash?"default":"pointer" } }, busy ? "…" : "Save")))) : null
    );
  }

  // ── Preflight WX overlay (ported from legacy WeatherModal; Increment 7.2, option B) ──
// ── METAR parsing + expandable airfield card (legacy MetarCard) ──
function parseMetar(raw) {
  if (!raw) return null;
  var r = {};
  var wm = raw.match(/\b(\d{3}|VRB)(\d{2,3})(G(\d{2,3}))?KT\b/);
  if (wm) {
    r.windDir = wm[1] === "VRB" ? null : parseInt(wm[1]);
    r.windSpd = parseInt(wm[2]);
    r.windGust = wm[4] ? parseInt(wm[4]) : null;
    r.windVrb = wm[1] === "VRB";
  }
  var vm = raw.match(/\bM?(\d+(?:\/\d+)?)SM\b/);
  if (vm) r.vis = vm[1].includes("/") ? 0.5 : parseFloat(vm[1]);
  var cm = raw.match(/\b(BKN|OVC)(\d{3})\b/);
  if (cm) r.ceiling = parseInt(cm[2]) * 100;
  var tm = raw.match(/\b(M?)(\d{2})\/(M?)(\d{2})\b/);
  if (tm) {
    r.tempC = tm[1] === "M" ? -parseInt(tm[2]) : parseInt(tm[2]);
    r.dewC  = tm[3] === "M" ? -parseInt(tm[4]) : parseInt(tm[4]);
  }
  var am = raw.match(/\bA(\d{4})\b/);
  if (am) r.altim = parseInt(am[1]) / 100;
  var vis = r.vis != null ? r.vis : 10;
  var ceil = r.ceiling != null ? r.ceiling : 99999;
  if      (ceil < 500  || vis < 1) r.cat = "LIFR";
  else if (ceil < 1000 || vis < 3) r.cat = "IFR";
  else if (ceil <= 3000 || vis <= 5) r.cat = "MVFR";
  else r.cat = "VFR";
  return r;
}

function catCol(cat) {
  return cat === "VFR" ? "#34C759" : cat === "MVFR" ? "#4A90D9" : "#FF3B30";
}

function dirLbl(d) {
  if (d == null) return "VRB";
  var dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(d/22.5) % 16];
}

function pad3(n) {
  return n == null ? "VRB" : String(n).padStart(3, "0");
}

    if (w.thunderstorm) reasons.push("Thunderstorm active");

    if (w.visibility < 3) reasons.push("Vis " + w.visibility + "SM < 3SM");
    if (w.ceiling < 300) reasons.push("Ceiling " + w.ceiling + "ft < 300ft");

      h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:22, letterSpacing:1, color:C.text, marginBottom:2 } }, "LINKS"),

  function App() {
    const [defaults, setDefaults]   = useState(null);
    const [dataSource, setDataSource] = useState("loading");
    const [crew, setCrew]           = useState([]);
    const [crewLoaded, setCrewLoaded] = useState(false);
    const migratedRef = useRef(false);   // guards the one-time roster → Firebase migration write
    const [locks, setLocks]         = useState({});

    const [topTab, setTopTab]       = useState("dashboard"); // top nav: dashboard | schedule | links
    const now = new Date();
    const [vYear, setVYear]         = useState(now.getFullYear());
    const [vMonth, setVMonth]       = useState(now.getMonth());
    const [toast, setToast]         = useState("");

    const [busy, setBusy]           = useState(false);
    const [burnBan, setBurnBan]           = useState(null);   // 7.1 live weather (Cloudflare Worker → TFS / NWS)
    const [redFlag, setRedFlag]           = useState(null);
    const [floodWarning, setFloodWarning] = useState(null);
    const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };

    // ── 4.1 access control: PIN → role detection (remember-login via localStorage) ──
    const [authId, setAuthId]     = useState(() => { try { const s = localStorage.getItem("firehawk_dev_session"); return s ? Number(s) : null; } catch (e) { return null; } });
    const [showPin, setShowPin]   = useState(false);
    const [pinInput, setPinInput] = useState("");
    const [pinError, setPinError] = useState(false);
    useEffect(() => {
      try { if (authId == null) localStorage.removeItem("firehawk_dev_session"); else localStorage.setItem("firehawk_dev_session", String(authId)); } catch (e) {}
    }, [authId]);

    // ── 7.1 live weather: Red Flag / Burn Ban / Flood via Cloudflare Worker (fail-silent) ──
    const WX = "https://firehawk-wx.usafsentinel-45e.workers.dev";
    useEffect(() => {   // burn ban — TFS, cached hourly
      const f = async () => { try { const r = await fetch(WX + "/burnban"); if (r.ok) setBurnBan(await r.json()); } catch (e) {} };
      f(); const t = setInterval(f, 3600000); return () => clearInterval(t);
    }, []);
    useEffect(() => {   // red flag warning — NWS, every 30 min
      const f = async () => { try { const r = await fetch(WX + "/redflag"); if (r.ok) setRedFlag(await r.json()); } catch (e) {} };
      f(); const t = setInterval(f, 1800000); return () => clearInterval(t);
    }, []);
    useEffect(() => {   // flood alerts — NWS Bexar zone + FIPS, every 30 min
      const f = async () => {
        try {
          const r = await fetch(WX + "/?url=" + encodeURIComponent("https://api.weather.gov/alerts/active?zone=TXZ205,TXC029"));
          if (!r.ok) return;
          const data = await r.json();
          const floodTypes = ["Flood Warning","Flash Flood Warning","Flood Watch","Flash Flood Watch","Flash Flood Statement"];
          const hit = (data.features || []).find(x => x && x.properties && floodTypes.indexOf(x.properties.event) !== -1);
          setFloodWarning(hit ? {
            active: true,
            event: hit.properties.event,
            ends: hit.properties.ends ? new Date(hit.properties.ends).toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit" }) : "further notice",
            updated: new Date().toISOString()
          } : null);
        } catch (e) {}
      };
      f(); const t = setInterval(f, 1800000); return () => clearInterval(t);
    }, []);

    const me        = crew.find(c => c.id === authId) || null;
    const tier      = me ? me.tier : null;                  // "owner" | "admin" | "staff" | null
    const canEdit   = tier === "owner" || tier === "admin"; // full edit — both ADMIN-level signers
    const isOwner   = tier === "owner";                     // program owner (Sanchez) — additional permissions
    // Schedule sub-tabs only matter signed in; collapse to the read-only calendar when signed out (or on a now-invalid tab).
    const schedTab  = ((tab === "crew" && !canEdit) || (tab === "avail" && !me)) ? "sched" : tab;
    const submitPin = () => {
      const entered = pinInput.trim();
      const found = entered ? crew.find(c => c.pin && c.pin === entered) : null;
      if (found) {
        setAuthId(found.id); setShowPin(false); setPinInput(""); setPinError(false);
        const now = new Date();
        const entry = { name: found.name, tier: found.tier, time: now.toISOString(), ts: now.getTime() };
        fsGet(DEV_COL, "access_log").then(log => {
          const entries = (log && Array.isArray(log.entries)) ? log.entries : [];
          entries.unshift(entry);
          fsSet(DEV_COL, "access_log", { entries: entries.slice(0, 10) });
        }).catch(() => {});
      }
      else { setPinError(true); }
    };
    const logout = () => { setAuthId(null); };

    useEffect(() => {
      fetch("crew_defaults.json?v=" + APP_VERSION)
        .then(r => { if (!r.ok) throw new Error("http " + r.status); return r.json(); })
        .then(j => { setDefaults(j.roster); setDataSource("json"); })
        .catch(() => { setDefaults(FALLBACK_ROSTER); setDataSource("fallback"); });
    }, []);

    useEffect(() => {
      if (!defaults) return;
      const unsubCrew = fsListen(DEV_COL, "crew", data => {
        const fbMembers = (data && Array.isArray(data.members)) ? data.members : [];
        // Full new schema is present once every member carries name + tier; older docs have name but no tier.
        const fbCurrent = fbMembers.length > 0 && fbMembers.every(m => m && m.name && m.tier);
        if (fbCurrent) {
          setCrew(fbMembers.map(m => normalizeMember(m)));   // Firebase crew doc is the source of truth
        } else {
          // One-time migration: defaults order, overlay existing Firebase data (availability), backfill tier/pin, write full records back.
          const seeded = defaults.map(d => normalizeMember({ ...d, ...(fbMembers.find(x => x.id === d.id) || {}) }));
          fbMembers.forEach(m => { if (!defaults.find(d => d.id === m.id)) seeded.push(normalizeMember(m)); });
          setCrew(seeded);
          if (!migratedRef.current) {
            migratedRef.current = true;
            writeCrewDoc(seeded).then(r => { if (r && r.ok) flash("Roster migrated to Firebase"); });
          }
        }
        setCrewLoaded(true); setSync("synced");
      });
      const unsubLocks = fsListen(DEV_COL, "availability_locks", data => { setLocks((data && typeof data === "object") ? data : {}); });
      return () => { unsubCrew(); unsubLocks(); };
    }, [defaults]);

    const navMonth = (delta) => {
      let m = vMonth + delta, y = vYear;
      if (m < 0) { m = 11; y--; } else if (m > 11) { m = 0; y++; }
      setVMonth(m); setVYear(y);
    };

    const saveMemberMonth = async (memberId, mk, rec) => {
      const updated = crew.map(c => c.id === memberId ? { ...c, availMonths: { ...c.availMonths, [mk]: rec } } : c);
      const res = await writeCrewDoc(updated);
      if (res.ok) { setCrew(updated); }
      return res;
    };

    const saveCrew = async (updated) => {
      const res = await writeCrewDoc(updated);
      if (res.ok) setCrew(updated);
      else setLastErr("Crew save failed (" + res.status + "): " + res.detail);
      return res;
    };

    const k = monthKey(vYear, vMonth);
    const locked = !!(locks[k] && locks[k].locked);

    const seed = async () => {
      if (crewLoaded && crew.some(c => c.availMonths && Object.keys(c.availMonths).length)
          && !window.confirm("Re-seed the SANDBOX roster? This wipes availability entered in firehawk_dev (live data is untouched).")) return;
      setBusy(true);
      const fresh = (defaults || FALLBACK_ROSTER).map(d => ({ ...d, availMonths: {} }));
      const res = await writeCrewDoc(fresh);
      setBusy(false);
      if (res.ok) { setLastErr(""); flash("Seeded firehawk_dev/crew"); }
      else { setLastErr("Seed failed (" + res.status + "): " + res.detail); flash("Seed failed — see error below"); }
    };

    const toggleLock = async () => {
      setBusy(true);
      const next = { ...locks };
      next[k] = { locked: !locked, lockedBy: "UAS Manager", lockedAt: new Date().toISOString() };
      const res = await fsSet(DEV_COL, "availability_locks", next);
      setBusy(false);
      if (res.ok) { setLocks(next); setLastErr(""); flash(locked ? "Unlocked " + MONTHS[vMonth] : "Locked " + MONTHS[vMonth]); }
      else { setLastErr("Lock write failed (" + res.status + "): " + res.detail); flash("Lock failed — see error below"); }
    };

    const syncColor = sync === "synced" ? C.green : C.amber;
    const shift = todayShift();
    const shiftHue = SHIFT_COLORS[shift].color;
    const dateStr = DAYS_SHORT[now.getDay()] + ", " + MONTHS[now.getMonth()].slice(0,3) + " " + now.getDate();
    const tabBtn = (id, label) => h("button", { onClick: () => setTab(id),
      style: { flex:1, padding:"10px 0", fontSize:12, letterSpacing:1, borderRadius:9, border:"1px solid "+(tab===id?C.blue:C.border), background: tab===id?"rgba(59,130,246,0.16)":C.panel, color: tab===id?C.blue:C.dim } }, label);
    const topBtn = (id, label) => h("button", { onClick: () => setTopTab(id),
      style: { flex:1, padding:"10px 0", fontSize:12, letterSpacing:1, borderRadius:9, border:"1px solid "+(topTab===id?C.accent:C.border), background: topTab===id?"rgba(255,107,53,0.16)":C.panel, color: topTab===id?C.accent:C.dim } }, label);
    const fmtWxTime = (iso) => { if (!iso) return ""; try { return new Date(iso).toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit" }); } catch (e) { return ""; } };
    const wxBanner = (icon, label, sub, hue, bg, brd, meta) => h("div", {
      style: { display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, background:bg, border:"1px solid "+brd, borderRadius:10, padding:"9px 13px", marginBottom:10 }
    },
      h("div", { style:{ display:"flex", alignItems:"center", gap:10, minWidth:0 } },
        h("span", { style:{ fontSize:16, flexShrink:0 } }, icon),
        h("div", { style:{ minWidth:0 } },
          h("div", { style:{ fontSize:11, fontWeight:700, color:hue, letterSpacing:1.5 } }, label),
          h("div", { style:{ fontSize:9, color:C.dim, letterSpacing:0.5, marginTop:1 } }, sub))),
      meta ? h("div", { style:{ fontSize:8, color:C.dim, letterSpacing:0.5, flexShrink:0, textAlign:"right" } }, meta) : null);
    const monthNav = h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 } },
      h("button", { onClick: () => navMonth(-1), style: navBtn() }, "‹"),
      h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:22, letterSpacing:1 } }, MONTHS[vMonth] + " " + vYear),
      h("button", { onClick: () => navMonth(1), style: navBtn() }, "›"));

    return h("div", { style:{ minHeight:"100vh" } },
      h("div", { className: "fh-wrap" },

        // Header — date/shift (left) · sign-in + sync (right) · shield centered
        h("div", { style:{ marginBottom:12 } },
          h("div", { style:{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" } },
            h("div", null,
              h("div", { style:{ fontSize:12, color:C.text, fontWeight:500, letterSpacing:0.5 } }, dateStr),
              h("div", { style:{ display:"flex", alignItems:"center", gap:5, marginTop:4, fontSize:9, color:C.dim, letterSpacing:1 } },
                "TODAY",
                h("span", { style:{ fontSize:10, fontWeight:700, letterSpacing:1, color:shiftHue, background:shiftHue+"22", border:"1px solid "+shiftHue+"55", borderRadius:5, padding:"1px 7px" } }, shift + " SHIFT"))),
            h("div", { style:{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 } },
              me
                ? h("div", { style:{ display:"flex", alignItems:"center", gap:6 } },
                    h("span", { style:{ fontSize:11, color:C.text } }, me.name),
                    h("span", { style:{ fontSize:9, letterSpacing:1, padding:"1px 6px", borderRadius:10, border:"1px solid "+C.border, color: tier==="staff" ? C.dim : C.accent } }, tier === "staff" ? "STAFF" : "ADMIN"),
                    h("button", { onClick: logout, style:{ fontSize:10, color:C.dim, background:"none", border:"none", textDecoration:"underline", cursor:"pointer", padding:0 } }, "Sign Out"))
                : h("button", { onClick: () => { setPinInput(""); setPinError(false); setShowPin(true); }, style:{ fontSize:11, color:C.accent, background:"rgba(255,107,53,0.12)", border:"1px solid "+C.border, borderRadius:8, padding:"3px 10px", cursor:"pointer" } }, "\uD83D\uDD12 Sign In"),
              h("div", { style:{ display:"flex", alignItems:"center", gap:6, fontSize:10, color:C.dim } },
                h("span", { style:{ width:8, height:8, borderRadius:"50%", background:syncColor, display:"inline-block" } }),
                sync === "synced" ? "SYNCED" : "CONNECTING"))),
          h("img", { src: SHIELD_SRC, alt:"Fire Hawk UAS — BC2FD", style:{ display:"block", width:84, height:84, margin:"6px auto 5px" } }),
          h("div", { style:{ textAlign:"center", fontFamily:"'Bebas Neue', sans-serif", fontSize:25, letterSpacing:2, lineHeight:1, color:C.text } }, "FIREHAWK UAS"),
          h("div", { style:{ textAlign:"center", fontSize:9, color:C.accent, letterSpacing:3, marginTop:3 } }, "BC2FD · DEV SANDBOX")),

        // 7.1 live weather alert banners — show only when active; visible on every tab
        (redFlag && redFlag.active) ? wxBanner("\uD83D\uDEA9", "RED FLAG WARNING", "Extreme fire weather conditions", C.red,
          "linear-gradient(135deg,rgba(255,59,48,0.20),rgba(180,0,0,0.10))", "rgba(255,59,48,0.5)",
          "NWS" + (fmtWxTime(redFlag.updated) ? " · " + fmtWxTime(redFlag.updated) : "")) : null,
        (burnBan && burnBan.underBan) ? wxBanner("\uD83D\uDD25", "BURN BAN IN EFFECT", "Unincorporated Bexar County", C.accent,
          "linear-gradient(135deg,rgba(255,107,53,0.16),rgba(204,32,32,0.10))", "rgba(255,107,53,0.4)",
          "TFS" + (fmtWxTime(burnBan.updated) ? " · " + fmtWxTime(burnBan.updated) : "")) : null,
        (floodWarning && floodWarning.active) ? wxBanner("\uD83D\uDEA7", floodWarning.event ? floodWarning.event.toUpperCase() : "FLOOD WARNING",
          "Bexar County · until " + floodWarning.ends, "#4A90D9",
          "linear-gradient(135deg,rgba(74,144,217,0.20),rgba(0,80,180,0.10))", "rgba(74,144,217,0.5)", "NWS" + (fmtWxTime(floodWarning.updated) ? " · " + fmtWxTime(floodWarning.updated) : "")) : null,

        // Sandbox banner
        h("div", { style:{ background:"rgba(255,193,7,0.10)", border:"1px solid rgba(255,193,7,0.35)", borderRadius:8, padding:"8px 11px", fontSize:11, color:C.amber, marginBottom:14, lineHeight:1.5 } },
          "Reads / writes ", h("b", null, DEV_COL), " only — the live site is untouched. Data file: ",
          h("b", null, dataSource === "json" ? "crew_defaults.json" : dataSource === "fallback" ? "embedded fallback (json not found)" : "loading…")),

        // Top nav (Increment 6 shell)
        h("div", { style:{ display:"flex", gap:8, marginBottom:14 } },
          topBtn("dashboard", "DASHBOARD"), topBtn("schedule", "SCHEDULE"), topBtn("links", "LINKS")),

        // Top-level view switch (Increment 6 shell)
        topTab === "dashboard"
          ? h(DashboardView, { crew, isOwner, flash, me })
          : topTab === "links"
            ? h(LinksView, null)
            : h("div", null,   // SCHEDULE area: sub-nav · month nav · view · dev controls
                me ? h("div", { style:{ display:"flex", gap:8, marginBottom:12 } },
                  tabBtn("sched", "CALENDAR"), canEdit ? tabBtn("crew", "CREW") : null, tabBtn("avail", "AVAILABILITY")) : null,
                schedTab !== "crew" ? monthNav : null,
                schedTab === "avail"
                  ? h(AvailabilityView, { crew, locks, vYear, vMonth, saveMemberMonth, flash, setLastErr, canEdit, me })
                  : (schedTab === "crew" && canEdit)
                    ? h(CrewMgmtView, { crew, saveCrew, flash, isOwner, myId: me ? me.id : null })
                    : h(ScheduleView, { crew, vYear, vMonth, flash, setLastErr, canEdit }),
                canEdit ? h("div", { style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:12, padding:12, marginTop:14, marginBottom:10 } },
                  h("div", { style:{ fontSize:10, color:C.dim, letterSpacing:1, marginBottom:8 } }, "MANAGER / DEV CONTROLS"),
                  h("div", { style:{ display:"flex", gap:8 } },
                    h("button", { onClick: seed, disabled: busy, style: ghostBtn(busy) }, "Seed / Reset Roster"),
                    h("button", { onClick: toggleLock, disabled: busy, style: ghostBtn(busy) }, locked ? "Unlock " + MONTHS[vMonth] + " Avail" : "Lock " + MONTHS[vMonth] + " Avail"))) : null),

        // Error line
        lastErr ? h("div", { style:{ background:"rgba(255,59,48,0.12)", border:"1px solid "+C.red, borderRadius:8, padding:"9px 11px", fontSize:11, color:C.red, marginBottom:10, lineHeight:1.5, wordBreak:"break-word" } }, "⚠ " + lastErr) : null,

        // Footer
        h("div", { style:{ fontSize:10, color:C.dim, textAlign:"center", marginTop:6, lineHeight:1.6 } },
          "increment ", h("b", null, APP_VERSION), " · collection ", h("b", null, DEV_COL)),

        // Toast
        toast ? h("div", { style:{ position:"fixed", left:"50%", bottom:24, transform:"translateX(-50%)", background:C.panel2, border:"1px solid "+C.accent, color:C.text, padding:"9px 16px", borderRadius:20, fontSize:12, boxShadow:"0 6px 24px rgba(0,0,0,0.5)", zIndex:60 } }, toast) : null,

        // PIN modal (4.1 access control)
        showPin ? h("div", { style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:80, padding:16 } },
          h("div", { style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:14, padding:18, width:"100%", maxWidth:300, boxShadow:"0 10px 40px rgba(0,0,0,0.6)" } },
            h("div", { style:{ fontFamily:"'Bebas Neue', sans-serif", fontSize:20, letterSpacing:1, color:C.text, marginBottom:4 } }, "SIGN IN"),
            h("div", { style:{ fontSize:11, color:C.dim, marginBottom:12 } }, "Enter your PIN"),
            h("input", { type:"password", inputMode:"numeric", autoFocus:true, value:pinInput,
              onChange: e => { setPinInput(e.target.value); setPinError(false); },
              onKeyDown: e => { if (e.key === "Enter") submitPin(); },
              style:{ width:"100%", boxSizing:"border-box", background:C.bg, color:C.text, border:"1px solid "+(pinError?C.red:C.border), borderRadius:8, padding:"10px 12px", fontSize:18, letterSpacing:3, textAlign:"center", colorScheme:"dark" } }),
            pinError ? h("div", { style:{ fontSize:11, color:C.red, marginTop:8 } }, "PIN not recognized") : null,
            h("div", { style:{ display:"flex", gap:8, marginTop:14 } },
              h("button", { onClick: () => { setShowPin(false); setPinInput(""); setPinError(false); }, style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background:C.panel2, border:"1px solid "+C.border, color:C.dim } }, "Cancel"),
              h("button", { onClick: submitPin, style:{ flex:1, borderRadius:8, padding:"9px 0", fontSize:13, background:"rgba(255,107,53,0.16)", border:"1px solid "+C.accent, color:C.accent } }, "Sign In")))) : null
      )
    );
  }

  // ── shared button styles ──
  function navBtn() { return { width:40, height:40, borderRadius:8, background:C.panel2, border:"1px solid "+C.border, color:C.text, fontSize:20, lineHeight:1 }; }
  function actionBtn(kind, disabled) {
    const base = { borderRadius:8, padding:"9px 16px", fontSize:13, fontWeight:500, opacity:disabled?0.4:1, border:"1px solid " };
    if (kind === "save") return { ...base, borderColor:C.accent, background:"rgba(255,107,53,0.16)", color:C.accent };
    return { ...base, borderColor:C.red, background:"rgba(255,59,48,0.12)", color:C.red };
  }
  function ghostBtn(disabled) { return { flex:1, borderRadius:8, padding:"9px 10px", fontSize:12, background:C.panel2, border:"1px solid "+C.border, color:C.dim, opacity:disabled?0.5:1 }; }
  function timeInput() { return { background:C.bg, color:C.text, border:"1px solid "+C.border, borderRadius:6, padding:"6px 8px", fontSize:12, colorScheme:"dark" }; }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
