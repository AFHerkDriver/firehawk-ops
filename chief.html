<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Firehawk UAS — Daily Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07090F; color: #CBD5E1; font-family: 'DM Mono', monospace; min-height: 100vh; }
    .header { background: linear-gradient(135deg,rgba(204,32,32,0.18),transparent 55%); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 14px 18px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; backdrop-filter: blur(10px); z-index: 10; }
    .logo { width: 42px; height: 42px; object-fit: contain; border-radius: 9px; }
    .h-title { font-family: 'Bebas Neue'; font-size: 17px; letter-spacing: 4px; color: #CC2020; line-height: 1; }
    .h-sub { font-size: 8px; color: #334155; letter-spacing: 3px; margin-top: 3px; }
    .sync { display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #FFC107; transition: all 0.3s; }
    .dot.synced { background: #34C759; box-shadow: 0 0 6px #34C759; }
    .dot.offline { background: #FF3B30; }
    .content { padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; max-width: 480px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; }
    .label { font-size: 9px; color: #334155; letter-spacing: 3px; margin-bottom: 5px; }
    .date { font-size: 24px; color: #E2E8F0; line-height: 1; font-weight: 700; letter-spacing: 1px; }
    .year { font-size: 10px; color: #475569; margin-top: 3px; }
    .shift-box { border-radius: 10px; padding: 10px 14px; text-align: center; }
    .shift-letter { font-family: 'Bebas Neue'; font-size: 30px; letter-spacing: 2px; line-height: 1; }
    .shift-label { font-size: 8px; letter-spacing: 2px; opacity: 0.7; margin-top: 2px; }
    .outlook { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px 10px; }
    .outlook-label { font-size: 8px; color: #334155; letter-spacing: 3px; margin-bottom: 10px; padding-left: 2px; }
    .week-strip { display: flex; gap: 5px; }
    .day-cell { flex: 1; border-radius: 9px; padding: 7px 3px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; }
    .day-name { font-size: 8px; color: #475569; margin-bottom: 3px; }
    .day-num { font-size: 11px; font-weight: 600; }
    .day-avatar { width: 18px; height: 18px; border-radius: 50%; margin: 5px auto 0; font-size: 6px; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .day-dot { width: 4px; height: 4px; border-radius: 50%; margin: 4px auto 0; }
    .legend { display: flex; gap: 12px; margin-top: 9px; padding-left: 2px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 8px; color: #334155; }
    .legend-dot { width: 5px; height: 5px; border-radius: 50%; }
    .crew-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; overflow: hidden; }
    .crew-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; }
    .crew-header-label { font-size: 8px; color: #475569; letter-spacing: 3px; }
    .status-badge { font-size: 8px; letter-spacing: 1px; border-radius: 4px; padding: 2px 8px; }
    .crew-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
    .crew-name { font-size: 16px; color: #E2E8F0; font-weight: 600; }
    .crew-role { font-size: 9px; letter-spacing: 1px; margin-top: 2px; }
    .role-badge { font-size: 9px; letter-spacing: 1px; border-radius: 5px; padding: 3px 9px; flex-shrink: 0; }
    .contact-btn { display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 9px; padding: 10px; font-size: 11px; letter-spacing: 1px; text-decoration: none; margin: 11px 16px; }
    .oos { background: rgba(255,59,48,0.06); border: 1px solid rgba(255,59,48,0.2); border-radius: 14px; padding: 26px 18px; text-align: center; }
    .oos-title { font-family: 'Bebas Neue'; font-size: 28px; color: #FF3B30; letter-spacing: 3px; margin-bottom: 8px; }
    .oos-text { font-size: 11px; color: #475569; line-height: 1.6; margin-bottom: 14px; }
    .footer { text-align: center; font-size: 8px; color: #1E293B; letter-spacing: 2px; padding-bottom: 24px; }
  </style>
</head>

const SHIFTS = ["A","A","B","B","C","C"];
const ANCHOR = new Date(2026,0,1);
const SC = {
  A:{color:"#FF3B30",bg:"rgba(255,59,48,0.12)",border:"rgba(255,59,48,0.35)",glow:"rgba(255,59,48,0.15)"},
  B:{color:"#4A90D9",bg:"rgba(74,144,217,0.12)",border:"rgba(74,144,217,0.35)",glow:"rgba(74,144,217,0.15)"},
  C:{color:"#34C759",bg:"rgba(52,199,89,0.12)",border:"rgba(52,199,89,0.35)",glow:"rgba(52,199,89,0.15)"},
};

function getShift(d) { return SHIFTS[((Math.round((d-ANCHOR)/86400000)%6)+6)%6]; }

function fromVal(v) {
  if(!v) return null;
  if("stringValue" in v) return v.stringValue;
  if("integerValue" in v) return parseInt(v.integerValue);
  if("doubleValue" in v) return v.doubleValue;
  if("booleanValue" in v) return v.booleanValue;
  if("nullValue" in v) return null;
  if("mapValue" in v) return fromFields(v.mapValue.fields||{});
  if("arrayValue" in v) return (v.arrayValue.values||[]).map(fromVal);
  return null;
}
function fromFields(f) {
  if(!f) return null;
  const o={};
  for(const k in f) o[k]=fromVal(f[k]);
  return o;
}
async function fsGet(col,doc) {
  try {
    const r=await fetch(FS_BASE+"/"+col+"/"+doc+"?key="+FS_API_KEY);
    if(!r.ok) return null;
    const d=await r.json();
    if(!d.fields) return null;
    const result=fromFields(d.fields);
    if(result && typeof result.daysJson==='string') {
      try { result.days=JSON.parse(result.daysJson); } catch(e){}
    }
    return result;
  } catch(e){return null;}
}

function setSync(s) {
  document.getElementById('dot').className='dot '+s;
  document.getElementById('syncText').textContent=s==='synced'?'SYNCED':s==='offline'?'OFFLINE':'CONNECTING...';
}

function clock() {
  document.getElementById('clockEl').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
clock(); setInterval(clock,30000);

function getAssignment(days,day,year,month) {
  if(!days) return HISTORY[year+"_"+month+"_"+day]||null;
  let a=days[day]||days[String(day)]||days["d"+day]||null;
  if(!a) { for(const k in days) { if(parseInt(k.replace(/^d/,''))===day) {a=days[k];break;} } }
  if(!a) a=HISTORY[year+"_"+month+"_"+day]||null;
  return a;
}

let scheduleCache={};
let crewCache=null;
let selectedOffset=0;

async function loadData() {
  setSync('connecting');
  const base=new Date();
  base.setHours(0,0,0,0);

  // Load crew once
  if(!crewCache) crewCache=await fsGet("firehawk","crew");

  // Build 7-day window
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(base);d.setDate(base.getDate()+i);return d;});

  // Load unique month/year combos needed
  const needed=new Set(weekDays.map(d=>d.getFullYear()+"_"+d.getMonth()));
  for(const key of needed) {
    if(!scheduleCache[key]) {
      const [y,m]=key.split("_");
      scheduleCache[key]=await fsGet("firehawk","schedule_"+y+"_"+m);
    }
  }

  setSync('synced');
  render(weekDays,scheduleCache,crewCache);
}

function render(weekDays,schedCache,crewData) {
  let crew=CREW;
  if(crewData&&crewData.members) {
    crew=CREW.map(c=>{const m=crewData.members.find(x=>x.id===c.id||x.id===String(c.id));return m?{...c,...m}:c;});
  }

  const selDay=weekDays[selectedOffset];
  const shift=getShift(selDay);
  const sc=SC[shift];
  const m=selDay.getMonth(),y=selDay.getFullYear(),d=selDay.getDate();
  const schedDoc=schedCache[y+"_"+m];
  const days=schedDoc?.days||schedDoc?.daysJson&&JSON.parse(schedDoc.daysJson)||null;
  const a=getAssignment(days,d,y,m);
  if(a&&!a.confirmed&&HISTORY[y+"_"+m+"_"+d]) a.confirmed=true;
  const rpic=a?.rpic?crew.find(c=>c.id===a.rpic||c.id===parseInt(a.rpic)):null;
  const vo=a?.vo?crew.find(c=>c.id===a.vo||c.id===parseInt(a.vo)):null;
  const extra=(a?.extra||[]).map(eid=>crew.find(c=>c.id===eid||c.id===parseInt(eid))).filter(Boolean);
  const dayLabel=selectedOffset===0?"TODAY":selDay.toLocaleDateString('en-US',{weekday:'long'}).toUpperCase();

  let html='';

  // Date + shift
  html+=`<div class="card">
    <div>
      <div class="label">${dayLabel}</div>
      <div class="date">${selDay.toLocaleDateString('en-US',{month:'long',day:'numeric'})}</div>
      <div class="year">${y}</div>
    </div>
    <div class="shift-box" style="background:${sc.bg};border:1px solid ${sc.border};box-shadow:0 0 18px ${sc.glow}">
      <div class="shift-letter" style="color:${sc.color}">${shift}</div>
      <div class="shift-label" style="color:${sc.color}">SHIFT</div>
    </div>
  </div>`;

  // 7-day strip
  html+=`<div class="outlook"><div class="outlook-label">7-DAY OUTLOOK</div><div class="week-strip">`;
  weekDays.forEach((wd,i)=>{
    const ws=getShift(wd);
    const wsc=SC[ws];
    const wm=wd.getMonth(),wy=wd.getFullYear(),wdd=wd.getDate();
    const wdoc=schedCache[wy+"_"+wm];
    const wdays=wdoc?.days||wdoc?.daysJson&&JSON.parse(wdoc.daysJson)||null;
    const wa=getAssignment(wdays,wdd,wy,wm);
    const wcr=wa?.rpic?crew.find(c=>c.id===wa.rpic||c.id===parseInt(wa.rpic)):null;
    const isSel=i===selectedOffset;
    html+=`<div class="day-cell" onclick="selectDay(${i})" style="background:${isSel?wsc.bg:'rgba(255,255,255,0.03)'};border:1px solid ${isSel?wsc.border:'rgba(255,255,255,0.06)'}">
      ${i===0?`<div style="position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:${wsc.color}"></div>`:''}<div class="day-name">${wd.toLocaleDateString('en-US',{weekday:'narrow'})}</div>
      <div class="day-num" style="color:${isSel?wsc.color:'#94A3B8'}">${wdd}</div>
      <div class="day-avatar" style="background:${wcr?wcr.color:'rgba(255,59,48,0.15)'};border:${wcr?'none':'1px solid rgba(255,59,48,0.25)'};font-size:${wcr?'6px':'9px'};color:${wcr?'white':'#FF3B30'}">${wcr?wcr.initials:'—'}</div>
      ${wa?`<div class="day-dot" style="background:${wa.confirmed?'#34C759':'#FFC107'}"></div>`:''}
    </div>`;
  });
  html+=`</div><div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#34C759"></div>Confirmed</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFC107"></div>Pending</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FF3B30;opacity:0.6"></div>No Coverage</div>
  </div></div>`;

  // Crew card
  if(a&&rpic) {
    html+=`<div class="crew-card">
      <div class="crew-header">
        <span class="crew-header-label">${dayLabel}'S CREW</span>
        <span class="status-badge" style="color:${a.confirmed?'#34C759':'#FFC107'};background:${a.confirmed?'rgba(52,199,89,0.1)':'rgba(255,193,7,0.1)'};border:1px solid ${a.confirmed?'rgba(52,199,89,0.3)':'rgba(255,193,7,0.3)'}">
          ${a.confirmed?'✓ CONFIRMED':'PENDING'}
        </span>
      </div>
      <div class="crew-row">
        <div class="avatar" style="background:linear-gradient(135deg,${rpic.color},${rpic.color}88);box-shadow:0 0 14px ${rpic.color}40;border:2px solid ${rpic.color}55">${rpic.initials}</div>
        <div style="flex:1"><div class="crew-name">${rpic.name}</div><div class="crew-role" style="color:#4A90D9">REMOTE PILOT IN COMMAND</div></div>
        <div class="role-badge" style="background:rgba(74,144,217,0.12);border:1px solid rgba(74,144,217,0.3);color:#4A90D9">RPIC</div>
      </div>`;
    if(vo) {
      html+=`<div class="crew-row">
        <div class="avatar" style="background:linear-gradient(135deg,${vo.color},${vo.color}88);box-shadow:0 0 14px ${vo.color}40;border:2px solid ${vo.color}55">${vo.initials}</div>
        <div style="flex:1"><div class="crew-name">${vo.name}</div><div class="crew-role" style="color:#34C759">VISUAL OBSERVER</div></div>
        <div class="role-badge" style="background:rgba(52,199,89,0.12);border:1px solid rgba(52,199,89,0.3);color:#34C759">VO</div>
      </div>`;
    }
    extra.forEach(em=>{
      html+=`<div class="crew-row">
        <div class="avatar" style="background:linear-gradient(135deg,${em.color},${em.color}88);box-shadow:0 0 14px ${em.color}40;border:2px solid ${em.color}55">${em.initials}</div>
        <div style="flex:1"><div class="crew-name">${em.name}</div><div class="crew-role" style="color:#D4AF37">UPSTAFF</div></div>
        <div class="role-badge" style="background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.3);color:#D4AF37">${em.role}</div>
      </div>`;
    });
    html+=`<a href="tel:+12108616643" class="contact-btn" style="background:rgba(74,144,217,0.07);border:1px solid rgba(74,144,217,0.18);color:#4A90D9">
      📞 Contact UAS Program Manager
    </a></div>`;
  } else {
    html+=`<div class="oos">
      <div class="oos-title">NO UAS COVERAGE</div>
      <div class="oos-text">No UAS crew assigned for this day.<br>Contact UAS Program Manager.</div>
      <a href="tel:+12108616643" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);border-radius:8px;padding:8px 16px;color:#FF3B30;font-size:10px;text-decoration:none;letter-spacing:1px">
        📞 Contact Program Manager
      </a>
    </div>`;
  }

  html+=`<div class="footer">AUTO-REFRESHES EVERY 5 MIN</div>`;
  document.getElementById('content').innerHTML=html;
}

function selectDay(i) {
  selectedOffset=i;
  const base=new Date();
  base.setHours(0,0,0,0);
  const weekDays=Array.from({length:7},(_,j)=>{const d=new Date(base);d.setDate(base.getDate()+j);return d;});
  render(weekDays,scheduleCache,crewCache);
}

loadData();
