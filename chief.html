  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D1117; color: #E6EDF3; font-family: 'DM Mono', monospace; min-height: 100vh; }
    .header { padding: 14px 18px 14px; position: relative; }
    .banners { max-width: 480px; margin: 0 auto; padding: 0 14px; }
    .banner { align-items: center; justify-content: space-between; gap: 10px; border-radius: 10px; padding: 9px 13px; margin-top: 12px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .logo { width: 62px; height: 62px; object-fit: contain; border-radius: 9px; }
    .logo-shield { width: 84px; height: 84px; object-fit: contain; display: block; margin: 8px auto 5px; }
    .h-title { font-family: 'Bebas Neue'; font-size: 25px; letter-spacing: 2px; color: #E6EDF3; line-height: 1; text-align: center; }
    .h-sub { font-size: 9px; color: #FF6B35; letter-spacing: 3px; margin-top: 3px; text-align: center; }
    .sync { display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #FFC107; transition: all 0.3s; }
    .dot.synced { background: #34C759; box-shadow: 0 0 6px #34C759; }
    .dot.offline { background: #FF3B30; }
    .content { padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; max-width: 480px; margin: 0 auto; }
    .card { background: #161B22; border: 1px solid #30363D; border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; }
    .label { font-size: 9px; color: #8B949E; letter-spacing: 3px; margin-bottom: 5px; }
    .date { font-size: 24px; color: #E6EDF3; line-height: 1; font-weight: 700; letter-spacing: 1px; }
    .year { font-size: 10px; color: #8B949E; margin-top: 3px; }
    .shift-box { border-radius: 10px; padding: 10px 14px; text-align: center; }
    .shift-letter { font-family: 'Bebas Neue'; font-size: 30px; letter-spacing: 2px; line-height: 1; }
    .shift-label { font-size: 8px; letter-spacing: 2px; opacity: 0.7; margin-top: 2px; }
    .outlook { background: #161B22; border: 1px solid #30363D; border-radius: 14px; padding: 12px 10px; }
    .outlook-label { font-size: 8px; color: #8B949E; letter-spacing: 3px; margin-bottom: 10px; padding-left: 2px; }
    .week-strip { display: flex; gap: 5px; }
    .day-cell { flex: 1; border-radius: 9px; padding: 7px 3px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; }
    .day-name { font-size: 8px; color: #8B949E; margin-bottom: 3px; }
    .day-num { font-size: 11px; font-weight: 600; }
    .day-avatar { width: 18px; height: 18px; border-radius: 50%; margin: 5px auto 0; font-size: 6px; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .day-dot { width: 4px; height: 4px; border-radius: 50%; margin: 4px auto 0; }
    .legend { display: flex; gap: 12px; margin-top: 9px; padding-left: 2px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 8px; color: #8B949E; }
    .legend-dot { width: 5px; height: 5px; border-radius: 50%; }
    .crew-card { background: #161B22; border: 1px solid #30363D; border-radius: 14px; overflow: hidden; }
    .crew-header { background: #1C2230; border-bottom: 1px solid #30363D; padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; }
    .crew-header-label { font-size: 8px; color: #8B949E; letter-spacing: 3px; }
    .status-badge { font-size: 8px; letter-spacing: 1px; border-radius: 4px; padding: 2px 8px; }
    .crew-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
    .crew-name { font-size: 16px; color: #E6EDF3; font-weight: 600; }
    .crew-role { font-size: 9px; letter-spacing: 1px; margin-top: 2px; }
    .role-badge { font-size: 9px; letter-spacing: 1px; border-radius: 5px; padding: 3px 9px; flex-shrink: 0; }
    .contact-btn { display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 9px; padding: 10px; font-size: 11px; letter-spacing: 1px; text-decoration: none; margin: 11px 16px; }
    .oos { background: rgba(255,59,48,0.06); border: 1px solid rgba(255,59,48,0.2); border-radius: 14px; padding: 26px 18px; text-align: center; }
    .oos-title { font-family: 'Bebas Neue'; font-size: 28px; color: #FF3B30; letter-spacing: 3px; margin-bottom: 8px; }
    .oos-text { font-size: 11px; color: #8B949E; line-height: 1.6; margin-bottom: 14px; }
    .footer { text-align: center; font-size: 8px; color: #8B949E; letter-spacing: 2px; padding-bottom: 24px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="sync">
      <div class="dot" id="dot"></div>
      <span style="font-size:8px;color:#8B949E;letter-spacing:2px" id="syncText">CONNECTING...</span>
    </div>

  <div style="text-align:center;padding:60px;color:#8B949E;font-size:11px;letter-spacing:2px">LOADING...</div>
</div>

<script>
const FS_PROJECT = "firehawk-scheduler";
const FS_API_KEY = "AIzaSyAWbzE0k8p4WDyrUaBfIRDqyLoklkfu8nQ";
const FS_BASE = "https://firestore.googleapis.com/v1/projects/" + FS_PROJECT + "/databases/(default)/documents";

// Fetch burn ban status
async function fetchBurnBan() {
  try {
    const r = await fetch("https://firehawk-wx.usafsentinel-45e.workers.dev/burnban");
    if (r.ok) {
      const data = await r.json();
      const bar = document.getElementById("burnBanBar");
      if (data.underBan) {
        bar.style.display = "flex";
        const t = data.updated ? new Date(data.updated).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : "";
        document.getElementById("burnBanTime").textContent = "TFS · " + t;
      } else {
        bar.style.display = "none";
      }
    }
  } catch(e) {}
}

// Fetch flood warnings
async function fetchFlood() {
  try {
    const workerBase = "https://firehawk-wx.usafsentinel-45e.workers.dev/?url=";
    const alertResp = await fetch(workerBase + encodeURIComponent("https://api.weather.gov/alerts/active?zone=TXZ205,TXC029"));
    const alertData = await alertResp.json();
    const floodEvents = ["Flood Warning","Flash Flood Warning","Flood Watch","Flash Flood Watch","Flash Flood Statement"];
    const flood = (alertData.features || []).find(f => floodEvents.includes(f.properties.event));
    const floodBar = document.getElementById("floodBar");
    if (flood) {
      document.getElementById("floodEvent").textContent = flood.properties.event.toUpperCase();
      const ends = flood.properties.ends
        ? new Date(flood.properties.ends).toLocaleTimeString("en-US", {hour:"2-digit",minute:"2-digit"})
        : "Until further notice";
      document.getElementById("floodEnds").textContent = "BEXAR COUNTY \u00B7 " + ends;
      document.getElementById("floodTime").textContent = "NWS";
      floodBar.style.display = "flex";
    } else {
      floodBar.style.display = "none";
    }
  } catch(e) {}
}

// Fetch Red Flag Warning status
async function fetchRedFlag() {
  try {
    const r = await fetch("https://firehawk-wx.usafsentinel-45e.workers.dev/redflag");
    if (r.ok) {
      const data = await r.json();

      const bar = document.getElementById("redFlagBar");
      if (data.active) {
        bar.style.display = "flex";
        const t = data.updated ? new Date(data.updated).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : "";
        document.getElementById("redFlagTime").textContent = "NWS · " + t;
        // If red flag is active push burn ban bar down
        document.getElementById("burnBanBar").style.top = "100px";
      } else {
        bar.style.display = "none";
        document.getElementById("burnBanBar").style.top = "64px";
      }
    }
  } catch(e) {}
}

fetchBurnBan();
fetchRedFlag();
fetchFlood();
setInterval(fetchBurnBan, 3600000);
setInterval(fetchRedFlag, 1800000);
setInterval(fetchFlood, 1800000);

const CREW = [
  {id:1,name:"Sanchez",  role:"RPIC",color:"#4A90D9",initials:"AS"},
  {id:3,name:"Bauchman", role:"RPIC",color:"#E67E22",initials:"RB"},
  {id:4,name:"Thomas",   role:"RPIC",color:"#7D3C98",initials:"MT"},
  {id:2,name:"Goddu",    role:"VO",  color:"#C0392B",initials:"BG"},
  {id:5,name:"Rodriguez",role:"VO",  color:"#C8A84B",initials:"JR"},
  {id:6,name:"Rait",     role:"RPIC",color:"#8B4513",initials:"CR",reserve:true},
];

const HISTORY = {
  "2026_4_1":{rpic:1},"2026_4_2":{rpic:1},"2026_4_3":{rpic:1},"2026_4_4":{rpic:1},
  "2026_4_5":{rpic:1,vo:2},"2026_4_7":{rpic:4},"2026_4_8":{rpic:4},"2026_4_9":{rpic:4},"2026_4_10":{rpic:4},
  "2026_4_11":{rpic:3},"2026_4_12":{rpic:3},"2026_4_13":{rpic:3},
  "2026_4_14":{rpic:3,vo:2},"2026_4_15":{rpic:3,vo:2},"2026_4_16":{rpic:3},
  "2026_4_17":{rpic:1,extra:[3]},"2026_4_18":{rpic:1,vo:2,extra:[3,4,5]},
  "2026_4_19":{rpic:1,vo:2,extra:[3,4,5]},"2026_4_20":{rpic:1,vo:2,extra:[3,4,5]},
  "2026_4_21":{rpic:1,vo:2,extra:[3,4]},"2026_4_22":{rpic:1},
  "2026_4_23":{rpic:1,extra:[4]},"2026_4_24":{rpic:1,extra:[4]},"2026_4_25":{rpic:1,extra:[4]},
  "2026_4_26":{rpic:1,extra:[3]},"2026_4_27":{rpic:1,extra:[3]},"2026_4_28":{rpic:1,extra:[3]},
  "2026_4_29":{rpic:3},"2026_4_30":{rpic:3},"2026_4_31":{rpic:3},
};

const SHIFTS = ["A","A","B","B","C","C"];
const ANCHOR = Date.UTC(2026,0,1);
const SC = {
  A:{color:"#FF3B30",bg:"rgba(255,59,48,0.12)",border:"rgba(255,59,48,0.35)",glow:"rgba(255,59,48,0.15)"},
  B:{color:"#4A90D9",bg:"rgba(74,144,217,0.12)",border:"rgba(74,144,217,0.35)",glow:"rgba(74,144,217,0.15)"},
  C:{color:"#34C759",bg:"rgba(52,199,89,0.12)",border:"rgba(52,199,89,0.35)",glow:"rgba(52,199,89,0.15)"},
};

function getShift(d) {
  const utcDay = Date.UTC(d.getFullYear(), d.getMonth(), d.getDate());
  return SHIFTS[((Math.floor((utcDay-ANCHOR)/86400000)%6)+6)%6];
}

function fromVal(v) {
  if(!v) return null;
  if("stringValue" in v) return v.stringValue;
  if("integerValue" in v) return parseInt(v.integerValue);
  if("doubleValue" in v) return v.doubleValue;
  if("booleanValue" in v) return v.booleanValue;
  if("nullValue" in v) return null;
  if("mapValue" in v) return fromFields(v.mapValue.fields||{});
  if("arrayValue" in v) return (v.arrayValue.values||[]).map(fromVal);
  return null;
}
function fromFields(f) {
  if(!f) return null;
  const o={};
  for(const k in f) o[k]=fromVal(f[k]);
  return o;
}
async function fsGet(col,doc) {
  try {
    const r=await fetch(FS_BASE+"/"+col+"/"+doc+"?key="+FS_API_KEY);
    if(!r.ok) return null;
    const d=await r.json();
    if(!d.fields) return null;
    const result=fromFields(d.fields);
    if(result && typeof result.daysJson==='string') {
      try { result.days=JSON.parse(result.daysJson); } catch(e){}
    }
    return result;
  } catch(e){return null;}
}

function setSync(s) {
  document.getElementById('dot').className='dot '+s;
  document.getElementById('syncText').textContent=s==='synced'?'SYNCED':s==='offline'?'OFFLINE':'CONNECTING...';
}

function clock() {
  document.getElementById('clockEl').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
clock(); setInterval(clock,30000);

function getAssignment(days,day,year,month) {
  if(!days) return HISTORY[year+"_"+month+"_"+day]||null;
  let a=days[day]||days[String(day)]||days["d"+day]||null;
  if(!a) { for(const k in days) { if(parseInt(k.replace(/^d/,''))===day) {a=days[k];break;} } }
  if(!a) a=HISTORY[year+"_"+month+"_"+day]||null;
  return a;
}

let scheduleCache={};
let crewCache=null;
let selectedOffset=0;

async function loadData() {
  setSync('connecting');
  // Shift changes at 0700 CST — before 0700 still show previous day's shift
  const now = new Date();
  const shiftNow = new Date(now.getTime() - 7 * 3600000);
  const base = new Date(shiftNow.getFullYear(), shiftNow.getMonth(), shiftNow.getDate());
  base.setHours(0,0,0,0);

  // Load crew once
  if(!crewCache) crewCache=await fsGet("firehawk","crew");

  // Build 7-day window
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(base);d.setDate(base.getDate()+i);return d;});

  // Load unique month/year combos needed
  const needed=new Set(weekDays.map(d=>d.getFullYear()+"_"+d.getMonth()));
  for(const key of needed) {
    if(!scheduleCache[key]) {
      const [y,m]=key.split("_");
      scheduleCache[key]=await fsGet("firehawk","schedule_"+y+"_"+m);
    }
  }

  setSync('synced');
  render(weekDays,scheduleCache,crewCache);
}

function render(weekDays,schedCache,crewData) {
  let crew=CREW;
  if(crewData&&crewData.members) {
    crew=CREW.map(c=>{const m=crewData.members.find(x=>x.id===c.id||x.id===String(c.id));return m?{...c,...m}:c;});
  }

  const selDay=weekDays[selectedOffset];
  const shift=getShift(selDay);
  const sc=SC[shift];
  const m=selDay.getMonth(),y=selDay.getFullYear(),d=selDay.getDate();
  const schedDoc=schedCache[y+"_"+m];
  const days=schedDoc?.days||schedDoc?.daysJson&&JSON.parse(schedDoc.daysJson)||null;
  const a=getAssignment(days,d,y,m);
  if(a&&!a.confirmed&&HISTORY[y+"_"+m+"_"+d]) a.confirmed=true;
  const rpic=a?.rpic?crew.find(c=>c.id===a.rpic||c.id===parseInt(a.rpic)):null;
  const vo=a?.vo?crew.find(c=>c.id===a.vo||c.id===parseInt(a.vo)):null;
  const vo2=a?.vo2?crew.find(c=>c.id===a.vo2||c.id===parseInt(a.vo2)):null;
  const extra=(a?.extra||[]).map(eid=>crew.find(c=>c.id===eid||c.id===parseInt(eid))).filter(Boolean);
  const dayLabel=selectedOffset===0?"TODAY":"";
  const crewDayLabel=selectedOffset===0?"TODAY":selDay.toLocaleDateString('en-US',{weekday:'long'}).toUpperCase();

  let html='';

  // Date + shift
  html+=`<div class="card">
    <div>
      ${dayLabel?`<div class="label">${dayLabel}</div>`:''}
      <div class="date">${selDay.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
      <div class="year">${y}</div>
    </div>
    <div class="shift-box" style="background:${sc.bg};border:1px solid ${sc.border};box-shadow:0 0 18px ${sc.glow}">
      <div class="shift-letter" style="color:${sc.color}">${shift}</div>
      <div class="shift-label" style="color:${sc.color}">SHIFT</div>
    </div>
  </div>`;

  // 7-day strip
  html+=`<div class="outlook"><div class="outlook-label">7-DAY OUTLOOK</div><div class="week-strip">`;
  weekDays.forEach((wd,i)=>{
    const ws=getShift(wd);
    const wsc=SC[ws];
    const wm=wd.getMonth(),wy=wd.getFullYear(),wdd=wd.getDate();
    const wdoc=schedCache[wy+"_"+wm];
    const wdays=wdoc?.days||wdoc?.daysJson&&JSON.parse(wdoc.daysJson)||null;
    const wa=getAssignment(wdays,wdd,wy,wm);
    const wcr=wa?.rpic?crew.find(c=>c.id===wa.rpic||c.id===parseInt(wa.rpic)):null;
    const isSel=i===selectedOffset;
    html+=`<div class="day-cell" onclick="selectDay(${i})" style="background:${isSel?wsc.bg:'rgba(255,255,255,0.03)'};border:1px solid ${isSel?wsc.border:'rgba(255,255,255,0.06)'}">
      ${i===0?`<div style="position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:${wsc.color}"></div>`:''}<div class="day-name">${wd.toLocaleDateString('en-US',{weekday:'narrow'})}</div>
      <div class="day-num" style="color:${isSel?wsc.color:'#8B949E'}">${wdd}</div>
      <div class="day-avatar" style="background:${wcr?wcr.color:'rgba(255,59,48,0.15)'};border:${wcr?'none':'1px solid rgba(255,59,48,0.25)'};font-size:${wcr?'6px':'9px'};color:${wcr?'white':'#FF3B30'}">${wcr?wcr.initials:'—'}</div>
      ${wa?`<div class="day-dot" style="background:${wa.confirmed?'#34C759':'#FFC107'}"></div>`:''}
    </div>`;
  });
  html+=`</div><div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#34C759"></div>Confirmed</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFC107"></div>Pending</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FF3B30;opacity:0.6"></div>No Coverage</div>
  </div></div>`;

  // Crew card — grouped by unit
  if(a&&rpic) {
    // Sanchez (id:1) = UAV121, everyone else = UAV124
    const SANCHEZ_ID = 1;
    const rpicIsManager = rpic.id === SANCHEZ_ID;

    // Build unit groups
    // extra array may contain additional RPICs or crew
    // VO pairs to primary RPIC (rpic field)
    // extra members: if Sanchez is primary, extras go to UAV124; otherwise extras are upstaff on UAV124

    const uav121 = [];
    const uav124 = [];

    if(rpicIsManager) {
      // Sanchez is primary RPIC — UAV121
      uav121.push({ person: rpic, role: 'RPIC', roleColor: '#4A90D9', badge: 'RPIC' });
      if(vo) uav121.push({ person: vo, role: 'VISUAL OBSERVER', roleColor: '#34C759', badge: 'VO' });
      // extras go to UAV124
      extra.forEach(em => {
        uav124.push({ person: em, role: em.role === 'RPIC' ? 'REMOTE PILOT IN COMMAND' : 'UPSTAFF', roleColor: em.role === 'RPIC' ? '#4A90D9' : '#D4AF37', badge: em.role });
      });
      // vo2 pairs to UAV124 (extra RPIC)
      if(vo2) uav124.push({ person: vo2, role: 'VISUAL OBSERVER', roleColor: '#34C759', badge: 'VO' });
    } else {
      // Someone else is primary RPIC — UAV124
      uav124.push({ person: rpic, role: 'RPIC', roleColor: '#4A90D9', badge: 'RPIC' });
      if(vo) uav124.push({ person: vo, role: 'VISUAL OBSERVER', roleColor: '#34C759', badge: 'VO' });
      // check if Sanchez is in extras — he goes to UAV121
      extra.forEach(em => {
        if(em.id === SANCHEZ_ID) {
          uav121.push({ person: em, role: 'RPIC', roleColor: '#4A90D9', badge: 'RPIC' });
        } else {
          uav124.push({ person: em, role: em.role === 'RPIC' ? 'REMOTE PILOT IN COMMAND' : 'UPSTAFF', roleColor: em.role === 'RPIC' ? '#4A90D9' : '#D4AF37', badge: em.role });
        }
      });
      // vo2 pairs to Sanchez on UAV121
      if(vo2) uav121.push({ person: vo2, role: 'VISUAL OBSERVER', roleColor: '#34C759', badge: 'VO' });
    }

    // Per-unit temporary out-of-service flags, set from the scheduler.
    // Shape: a.oos = { UAV121: {reason, from, to, note}, UAV124: {...} }
    // from/to are "HH:MM" 24-hr CST strings.
    // Display rule: on TODAY, only show while the window is active (auto-clears
    // after the back-in-service time and stays hidden before the start time).
    // On any other day in the outlook, show whenever it's set.
    const oosData = a.oos || {};
    const fmtHM = t => (t && /^\d{1,2}:\d{2}$/.test(t)) ? t.replace(':', '').padStart(4, '0') : t;
    const toMins = t => { const mm = /^(\d{1,2}):(\d{2})$/.exec(t || ''); return mm ? parseInt(mm[1]) * 60 + parseInt(mm[2]) : null; };
    // Current time in US Central, as minutes-since-midnight (handles CST/CDT automatically).
    const nowCentralMins = () => {
      try {
        const parts = new Intl.DateTimeFormat('en-US', { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', hour12: false }).formatToParts(new Date());
        const h = parseInt(parts.find(p => p.type === 'hour').value) % 24;
        const mi = parseInt(parts.find(p => p.type === 'minute').value);
        return h * 60 + mi;
      } catch (e) { return null; }
    };
    const isToday = selectedOffset === 0;
    // Whether a given OOS window should be visible right now for the displayed day.
    const oosActive = o => {
      if (!o || !o.from || !o.to) return false;
      if (!isToday) return true; // future/other days: show whenever set
      const now = nowCentralMins(), f = toMins(o.from), t = toMins(o.to);
      if (now === null || f === null || t === null) return true; // fail open
      return t >= f ? (now >= f && now < t) : (now >= f || now < t); // handle past-midnight windows
    };
    const renderOOS = o => {
      if(!oosActive(o)) return '';
      const reason = (o.reason || '').toUpperCase();
      return `<div style="background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.4);border-left:3px solid #D4AF37;border-radius:8px;margin:10px 16px 12px;padding:10px 14px">
        <div style="font-size:11px;letter-spacing:1.5px;color:#D4AF37;font-weight:700;display:flex;align-items:center;gap:7px">⚠ TEMPORARILY OUT OF SERVICE${reason?` <span style="font-size:9px;letter-spacing:1px;background:rgba(212,175,55,0.2);border:1px solid rgba(212,175,55,0.4);color:#D4AF37;border-radius:4px;padding:2px 7px">${reason}</span>`:''}</div>
        <div style="font-size:14px;color:#E6EDF3;font-family:monospace;margin-top:5px">${fmtHM(o.from)} – ${fmtHM(o.to)} CST</div>
        ${o.note?`<div style="font-size:10px;color:#8B949E;margin-top:3px">${o.note}</div>`:''}
      </div>`;
    };
    const renderUnit = (unit, members) => {
      if(members.length === 0) return '';
      const oos = oosData[unit];
      const dim = oosActive(oos) ? 'opacity:0.4' : '';
      return `<div style="margin-bottom:12px">
        <div style="font-size:8px;color:#8B949E;letter-spacing:3px;padding:8px 16px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06)">${unit}</div>
        ${renderOOS(oos)}
        ${members.map(m => `<div class="crew-row" style="${dim}">
          <div class="avatar" style="background:linear-gradient(135deg,${m.person.color},${m.person.color}88);box-shadow:0 0 14px ${m.person.color}40;border:2px solid ${m.person.color}55">${m.person.initials}</div>
          <div style="flex:1"><div class="crew-name">${m.person.name}</div><div class="crew-role" style="color:${m.roleColor}">${m.role}</div></div>
          <div class="role-badge" style="background:${m.roleColor}18;border:1px solid ${m.roleColor}44;color:${m.roleColor}">${m.badge}</div>
        </div>`).join('')}
      </div>`;
    };

    html+=`<div class="crew-card">
      <div class="crew-header">
        <span class="crew-header-label">${crewDayLabel}'S CREW</span>
        <span class="status-badge" style="color:${a.confirmed?'#34C759':'#FFC107'};background:${a.confirmed?'rgba(52,199,89,0.1)':'rgba(255,193,7,0.1)'};border:1px solid ${a.confirmed?'rgba(52,199,89,0.3)':'rgba(255,193,7,0.3)'}">
          ${a.confirmed?'✓ CONFIRMED':'PENDING'}
        </span>
      </div>
      ${renderUnit('UAV121', uav121)}
      ${renderUnit('UAV124', uav124)}
      <a href="tel:+12108616643" class="contact-btn" style="background:rgba(74,144,217,0.07);border:1px solid rgba(74,144,217,0.18);color:#4A90D9">
        📞 Contact UAS Program Manager
      </a></div>`;
  } else {
    html+=`<div class="oos">
      <div class="oos-title">NO UAS COVERAGE</div>
      <div class="oos-text">No UAS crew assigned for this day.<br>Contact UAS Program Manager.</div>
      <a href="tel:+12108616643" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);border-radius:8px;padding:8px 16px;color:#FF3B30;font-size:10px;text-decoration:none;letter-spacing:1px">
        📞 Contact Program Manager
      </a>
    </div>`;
  }

  html+=`<div class="footer">AUTO-REFRESHES EVERY 5 MIN</div>`;
  document.getElementById('content').innerHTML=html;
}

function selectDay(i) {
  selectedOffset=i;
  const base=new Date();
  base.setHours(0,0,0,0);
  const weekDays=Array.from({length:7},(_,j)=>{const d=new Date(base);d.setDate(base.getDate()+j);return d;});
  render(weekDays,scheduleCache,crewCache);
}

loadData();
setInterval(loadData,300000);
</script>
