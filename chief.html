<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Firehawk UAS — Daily Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080C18; color: #CBD5E1; font-family: 'DM Mono', monospace; min-height: 100vh; }
    .header { background: linear-gradient(135deg,rgba(204,32,32,0.15),transparent 60%); border-bottom: 1px solid rgba(204,32,32,0.25); padding: 16px 20px; display: flex; align-items: center; gap: 14px; }
    .logo { width: 52px; height: 52px; object-fit: contain; }
    .header-text h1 { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 3px; color: #CC2020; }
    .sub { font-size: 9px; color: #475569; letter-spacing: 2px; margin-top: 2px; }
    .sync { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #FFC107; transition: all 0.3s; }
    .dot.synced { background: #34C759; box-shadow: 0 0 4px #34C759; }
    .dot.offline { background: #FF3B30; }
    .content { padding: 20px; display: flex; flex-direction: column; gap: 16px; max-width: 600px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 20px; }
    .label { font-size: 9px; color: #475569; letter-spacing: 2px; margin-bottom: 8px; }
    .date { font-family: 'Bebas Neue'; font-size: 30px; letter-spacing: 3px; color: #E2E8F0; line-height: 1; }
    .shift-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; letter-spacing: 2px; border-radius: 5px; padding: 4px 12px; margin-top: 10px; }
    .crew-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; overflow: hidden; }
    .crew-header { background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
    .crew-header-label { font-size: 9px; color: #475569; letter-spacing: 2px; }
    .confirmed-badge { font-size: 9px; color: #34C759; background: rgba(52,199,89,0.1); border: 1px solid rgba(52,199,89,0.3); border-radius: 4px; padding: 2px 8px; letter-spacing: 1px; }
    .pending-badge { font-size: 9px; color: #FFC107; background: rgba(255,193,7,0.1); border: 1px solid rgba(255,193,7,0.3); border-radius: 4px; padding: 2px 8px; letter-spacing: 1px; }
    .crew-row { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .crew-row:last-child { border-bottom: none; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.15); }
    .crew-name { font-size: 16px; color: #E2E8F0; font-weight: 600; }
    .crew-role-label { font-size: 9px; letter-spacing: 1px; margin-top: 3px; }
    .role-badge { font-size: 9px; letter-spacing: 1px; border-radius: 4px; padding: 3px 8px; flex-shrink: 0; }
    .oos { background: rgba(255,59,48,0.08); border: 1px solid rgba(255,59,48,0.25); border-radius: 14px; padding: 32px 20px; text-align: center; }
    .oos h2 { font-family: 'Bebas Neue'; font-size: 32px; color: #FF3B30; letter-spacing: 3px; }
    .oos p { font-size: 11px; color: #64748B; margin-top: 8px; line-height: 1.6; }
    .refresh { position: fixed; bottom: 24px; right: 20px; background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.4); border-radius: 50%; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; color: #FF6B35; transition: all 0.2s; }
    .refresh:hover { background: rgba(255,107,53,0.25); }
    .last-updated { text-align: center; font-size: 9px; color: #1E293B; letter-spacing: 1px; padding-bottom: 80px; }
  </style>
</head>

<script>
const FS_PROJECT = "firehawk-scheduler";
const FS_API_KEY = "AIzaSyAWbzE0k8p4WDyrUaBfIRDqyLoklkfu8nQ";
const FS_BASE = "https://firestore.googleapis.com/v1/projects/" + FS_PROJECT + "/databases/(default)/documents";

const CREW = [
  {id:1,name:"Sanchez",  role:"RPIC",color:"#4A90D9",initials:"AS"},
  {id:3,name:"Bauchman", role:"RPIC",color:"#E67E22",initials:"RB"},
  {id:4,name:"Thomas",   role:"RPIC",color:"#7D3C98",initials:"MT"},
  {id:2,name:"Goddu",    role:"VO",  color:"#C0392B",initials:"BG"},
  {id:5,name:"Rodriguez",role:"VO",  color:"#C8A84B",initials:"JR"},
  {id:6,name:"Rait",     role:"RPIC",color:"#8B4513",initials:"CR",reserve:true},
];

const SHIFTS = ["A","A","B","B","C","C"];
const ANCHOR = new Date(2026,0,1);
const SC = {
  A:{color:"#FF3B30",bg:"rgba(255,59,48,0.15)",border:"rgba(255,59,48,0.4)"},
  B:{color:"#4A90D9",bg:"rgba(74,144,217,0.15)",border:"rgba(74,144,217,0.4)"},
  C:{color:"#34C759",bg:"rgba(52,199,89,0.15)",border:"rgba(52,199,89,0.4)"},
};

function getShift(d) {
  return SHIFTS[((Math.round((d-ANCHOR)/86400000)%6)+6)%6];
}

function fromVal(v) {
  if(!v) return null;
  if("stringValue" in v) return v.stringValue;
  if("integerValue" in v) return parseInt(v.integerValue);
  if("doubleValue" in v) return v.doubleValue;
  if("booleanValue" in v) return v.booleanValue;
  if("nullValue" in v) return null;
  if("mapValue" in v) return fromFields(v.mapValue.fields||{});
  if("arrayValue" in v) return (v.arrayValue.values||[]).map(fromVal);
  return null;
}
function fromFields(f) {
  if(!f) return null;
  const o={};
  for(const k in f) o[k]=fromVal(f[k]);
  return o;
}
async function get(col,doc) {
  try {
    const r=await fetch(FS_BASE+"/"+col+"/"+doc+"?key="+FS_API_KEY);
    if(!r.ok) return null;
    const d=await r.json();
    if(!d.fields) return null;
    const result = fromFields(d.fields);
    // If daysJson is a string, parse it
    if(result && typeof result.daysJson === 'string') {
      try { result.days = JSON.parse(result.daysJson); } catch(e){}
    }
    return result;
  } catch(e){return null;}
}

function setSync(s) {
  document.getElementById('dot').className='dot '+s;
  document.getElementById('syncText').textContent=s==='synced'?'SYNCED':s==='offline'?'OFFLINE':'CONNECTING...';
}

async function load() {
  setSync('connecting');
  const today = new Date();
  const month = today.getMonth();
  const year = today.getFullYear();
  const day = today.getDate();
  const shift = getShift(today);
  const sc = SC[shift];

  const [sched, crewData] = await Promise.all([
    get("firehawk","schedule_"+year+"_"+month),
    get("firehawk","crew"),
  ]);

  setSync(sched || crewData ? 'synced' : 'offline');

  // Parse today's assignment — handle both daysJson and legacy formats
  let a = null;
  if(sched) {
    let days = null;
    if(sched.daysJson) {
      try { days = JSON.parse(sched.daysJson); } catch(e){}
    } else if(sched.days) {
      days = sched.days;
    }
    if(days) {
      // Try both string and number keys, and with/without 'd' prefix
      a = days[day] || days[String(day)] || days["d"+day] || null;
    }
  }

  // Merge live crew data
  let crew = CREW;
  if(crewData && crewData.members) {
    crew = CREW.map(c => {
      const m = crewData.members.find(x => x.id===c.id || x.id===String(c.id));
      return m ? {...c,...m} : c;
    });
  }

  const dateStr = today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  let html = '';

  // Date card
  html += `<div class="card">
    <div class="label">TODAY</div>
    <div class="date">${dateStr.toUpperCase()}</div>
    <div class="shift-badge" style="background:${sc.bg};border:1px solid ${sc.border};color:${sc.color}">${shift} SHIFT</div>
  </div>`;

  // Crew card
  if(a && (a.rpic || a.vo)) {
    const findCrew = id => crew.find(c => c.id===id || c.id===parseInt(id));
    const rpic = a.rpic ? findCrew(a.rpic) : null;
    const vo   = a.vo   ? findCrew(a.vo)   : null;
    const extra = (a.extra||[]).map(findCrew).filter(Boolean);

    html += `<div class="crew-card">
      <div class="crew-header">
        <span class="crew-header-label">TODAY\'S UAS CREW</span>
        <span class="${a.confirmed?'confirmed-badge':'pending-badge'}">${a.confirmed?'✓ CONFIRMED':'PENDING'}</span>
      </div>`;

    if(rpic) html += `<div class="crew-row">
      <div class="avatar" style="background:${rpic.color}">${rpic.initials}</div>
      <div style="flex:1">
        <div class="crew-name">${rpic.name}</div>
        <div class="crew-role-label" style="color:#4A90D9">REMOTE PILOT IN COMMAND</div>
      </div>
      <span class="role-badge" style="background:rgba(74,144,217,0.15);border:1px solid rgba(74,144,217,0.4);color:#4A90D9">RPIC</span>
    </div>`;

    if(vo) html += `<div class="crew-row">
      <div class="avatar" style="background:${vo.color}">${vo.initials}</div>
      <div style="flex:1">
        <div class="crew-name">${vo.name}</div>
        <div class="crew-role-label" style="color:#34C759">VISUAL OBSERVER</div>
      </div>
      <span class="role-badge" style="background:rgba(52,199,89,0.15);border:1px solid rgba(52,199,89,0.4);color:#34C759">VO</span>
    </div>`;

    extra.forEach(em => {
      html += `<div class="crew-row">
        <div class="avatar" style="background:${em.color}">${em.initials}</div>
        <div style="flex:1">
          <div class="crew-name">${em.name}</div>
          <div class="crew-role-label" style="color:#D4AF37">UPSTAFF</div>
        </div>
        <span class="role-badge" style="background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.4);color:#D4AF37">${em.role}</span>
      </div>`;
    });

    html += `</div>`;

  } else {
    html += `<div class="oos">
      <h2>NO UAS COVERAGE</h2>
      <p>No UAS crew assigned for today.<br>Contact UAS Program Manager.</p>
    </div>`;
  }

  html += `<div class="last-updated">UPDATED ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>`;

  document.getElementById('content').innerHTML = html;
}

load();
setInterval(load, 300000);
</script>
</body>
</html>
